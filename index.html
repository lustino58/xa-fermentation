<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0e13">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XA Fermentation Pro Ultimate</title>
  <style>
    :root{
      --bg:#0b0f14;
      --bg2:#10161d;
      --panel:#151c25;
      --panel2:#1b2330;
      --line:#324050;
      --text:#eef4fa;
      --muted:#9aacbd;
      --gold:#d2ae6d;
      --gold2:#f0d49b;
      --green:#56df8d;
      --red:#ff6e6e;
      --blue:#7ebcff;
      --teal:#67e6cf;
      --purple:#b58cff;
      --orange:#f2a65a;
      --pink:#ff8fbc;
      --paper:#f3ecd9;
      --paperLine:#d7ccb0;
      --paperInk:#2a241c;
      --lcd:#99ff7e;
      --shadow:0 16px 36px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;padding:0;
      background:linear-gradient(180deg,#0a0e13,#10161d);
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
    }
    body{padding-bottom:92px}
    h1,h2,h3,h4,p{margin:0}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:none}
    img{display:block;max-width:100%}
    canvas{display:block;width:100%}
    .hidden{display:none!important}

    body.mixer-compact .channel{width:116px;min-width:116px}
    body.mixer-compact .track{min-height:180px}
    body.mixer-compact .track input[type=range]{width:160px}
    body.mixer-compact .miniLcd .val{font-size:13px}
    body.mixer-compact .channelFooterName{font-size:10px;min-height:34px}

    .app{max-width:1800px;margin:0 auto;padding:14px}
    .section{display:none}
    .section.active{display:block}
    .page{display:grid;gap:14px}
    .layout2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .statsGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}

    .topbar{
      position:sticky;top:0;z-index:60;
      margin:-14px -14px 14px;
      padding:14px;
      backdrop-filter:blur(12px);
      background:rgba(10,13,17,.94);
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .topbarInner{
      max-width:1800px;margin:0 auto;
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    }

    .brand{display:flex;gap:14px;align-items:center}
    .logo{
      width:62px;height:62px;border-radius:18px;
      display:grid;place-items:center;
      font-size:24px;font-weight:900;color:#111;
      background:radial-gradient(circle at 30% 30%,#f7e3ba 0%,#d9b774 38%,#8f6b36 70%,#3f2d17 100%);
      box-shadow:inset 0 2px 8px rgba(255,255,255,.25),0 8px 20px rgba(0,0,0,.35);
    }
    .brand h1{font-size:24px;font-weight:900;letter-spacing:.14em}
    .brand p{margin-top:4px;font-size:12px;color:var(--muted);letter-spacing:.12em}

    .actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap}

    .btn,.btnGold,.btnDanger,.btnMixer,.typeBtn,.libBtn,.chipBtn,.miniBtn,.starBtn,.groupAction{
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      transition:.15s ease;
    }
    .btn{background:linear-gradient(180deg,#26313e,#171f28);color:var(--text)}
    .btnGold{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#111;border-color:#c8a15a}
    .btnDanger{background:linear-gradient(180deg,#6a2a2a,#431717);color:#ffd3d3;border-color:#7a3131}
    .btnMixer{background:linear-gradient(180deg,#b8fff1,#65e6ce);color:#111;border-color:#62ddc4}
    .libBtn,.chipBtn{background:linear-gradient(180deg,#2e3a49,#1a212b);color:var(--text)}
    .miniBtn{
      padding:8px 8px;
      border-radius:10px;
      font-size:11px;
      background:linear-gradient(180deg,#2a3441,#181f28);
      color:var(--text);
      border:1px solid #475566;
      box-shadow:none;
    }
    .miniBtn.gold{
      background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#111;
      border-color:#c7a15a;
    }
    .groupAction{
      padding:7px 10px;
      font-size:11px;
      color:#111;
      background:linear-gradient(180deg,var(--gold2),var(--gold));
      border-color:#c8a15a;
      box-shadow:none;
    }

    .card{
      background:linear-gradient(180deg,#151c25,#10151c);
      border:1px solid rgba(255,255,255,.06);
      border-radius:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .cardHead{
      padding:14px 16px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.05);
      background:linear-gradient(180deg,#1d2530,#141b24);
    }
    .cardHead h2{font-size:18px;font-weight:900;letter-spacing:.04em}
    .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
    .cardBody{padding:14px}

    .stat{
      border-radius:20px;padding:16px;
      background:linear-gradient(180deg,#1b2330,#121821);
      border:1px solid var(--line);
    }
    .stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
    .stat .v{font-size:30px;font-weight:900;margin-top:6px}
    .stat .s{font-size:11px;color:var(--muted);margin-top:4px}

    .formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .field{display:flex;flex-direction:column;gap:7px}
    .field label{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.05em}
    .input,.select,.textarea{
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      background:#0f141a;
      color:var(--text);
      border:1px solid #313c49;
      outline:none;
    }
    .textarea{min-height:110px;resize:vertical}

    .list{display:grid;gap:10px}
    .item{
      border-radius:18px;padding:14px;
      background:linear-gradient(180deg,#1a212b,#11161d);
      border:1px solid #313c48;
    }
    .itemTitle{font-size:16px;font-weight:900}
    .meta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:5px}
    .itemActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

    .recipeTypeGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
    .typeBtn{background:linear-gradient(180deg,#26313e,#171f28);color:var(--text);text-align:center}
    .typeBtn.active.sidro{background:linear-gradient(180deg,#f0d49b,#d2ae6d);color:#111}
    .typeBtn.active.te{background:linear-gradient(180deg,#b8fff1,#65e6ce);color:#111}
    .typeBtn.active.misto{background:linear-gradient(180deg,#d7c1ff,#9b7cff);color:#111}
    .typeBtn.active.birra{background:linear-gradient(180deg,#ffd97f,#ffb347);color:#111}
    .typeBtn.active.tonica{background:linear-gradient(180deg,#c8fff5,#88e9d8);color:#111}

    .ingredientRow{
      display:grid;
      grid-template-columns:1fr 1.25fr .7fr .7fr 1fr auto;
      gap:8px;
      margin-top:8px;
    }

    .libraryQuickGrid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:12px;
    }

    .liveBar{
      border-radius:18px;padding:12px 14px;
      background:linear-gradient(180deg,#1a2430,#10161d);
      border:1px solid #334050;
      box-shadow:var(--shadow);
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .liveBarMain{display:grid;gap:5px}
    .liveBarTitle{font-size:18px;font-weight:900}
    .liveBarMeta{font-size:12px;color:var(--muted);line-height:1.45}

    .searchBar{
      display:flex;
      align-items:center;
      gap:10px;
      border-radius:18px;
      padding:10px 14px;
      background:linear-gradient(180deg,#18212c,#101720);
      border:1px solid #334050;
      box-shadow:var(--shadow);
    }
    .searchBar .icon{font-size:18px;opacity:.85}
    .searchInput{
      width:100%;
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      font-size:15px;
    }

    .ratingRow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .starBtn{
      padding:8px 12px;
      min-width:44px;
      text-align:center;
      background:linear-gradient(180deg,#26313e,#171f28);
      color:#ffe8a6;
      border-color:#5a4c2a;
    }
    .starBtn.active{
      background:linear-gradient(180deg,#ffe6a0,#d4aa46);
      color:#111;
      border-color:#c89a32;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      border:1px solid #384554;
      background:#11161d;
      color:var(--text);
    }

    .sensoryGrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:10px;
    }
    .sensoryCard{
      border-radius:16px;
      padding:14px;
      background:linear-gradient(180deg,#1a212b,#11161d);
      border:1px solid #334050;
    }
    .sensoryCard h4{
      font-size:14px;
      font-weight:900;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .modal{
      position:fixed;inset:0;background:rgba(0,0,0,.72);
      display:none;align-items:flex-end;justify-content:center;z-index:120;padding:14px;
    }
    .modal.show{display:flex}
    .modalBox{
      width:min(1000px,100%);max-height:92vh;overflow:auto;
      border-radius:24px;background:linear-gradient(180deg,#181f28,#0f141a);
      border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 40px rgba(0,0,0,.38);
    }
    .modalHead{
      position:sticky;top:0;background:rgba(24,31,40,.96);backdrop-filter:blur(10px);
      padding:16px;border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:4;
    }
    .modalBody{padding:16px}
    .libSearch{margin:12px 0}
    .libList{display:grid;gap:8px}
    .libItem{
      display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;
      padding:12px;border-radius:16px;background:linear-gradient(180deg,#202836,#151c24);border:1px solid #334050;
    }
    .libItemTitle{font-weight:900}
    .libItemMeta{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}

    .notesSticky{
      position:sticky;top:0;z-index:3;padding-bottom:12px;
      background:linear-gradient(180deg,#181f28 0%, #181f28 78%, rgba(24,31,40,0));
    }
    .notesCard{
      border-radius:18px;padding:14px;
      background:repeating-linear-gradient(
        180deg,
        var(--paper) 0px,
        var(--paper) 28px,
        var(--paperLine) 29px,
        var(--paper) 30px
      );
      color:var(--paperInk);
      border:1px solid #c8b995;
      box-shadow:0 12px 28px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.35);
    }
    .notesTitle{font-size:20px;font-weight:900;line-height:1.1;margin-bottom:8px}
    .notesMeta{font-size:13px;line-height:1.45;margin-bottom:10px;color:#4c4437;font-weight:700}
    .notesList{display:grid;gap:6px;font-size:14px;line-height:1.45;color:#2a241c}
    .notesRow{display:grid;grid-template-columns:24px 1fr;gap:8px;align-items:flex-start}
    .notesNum{font-weight:900;color:#534a3d}
    .notesEmpty{font-size:14px;color:#6c6253;font-style:italic}

    .previewCard{display:grid;gap:10px}
    .previewImage{
      border-radius:16px;overflow:hidden;border:1px solid #334050;background:#0f141a;
      min-height:140px;display:grid;place-items:center;color:var(--muted);font-size:12px;
    }
    .previewImage img{width:100%;max-height:280px;object-fit:cover}
    .previewNotes{
      border-radius:14px;padding:12px;background:linear-gradient(180deg,#202836,#151c24);
      border:1px solid #334050;font-size:12px;line-height:1.5;
    }

    .mixerOnlyPage,.controlOnlyPage{
      min-height:100vh;
      width:100%;
      background:linear-gradient(180deg,#090d12,#0e141b);
      overflow-x:hidden;
    }
    .mixerTopBar,.controlTopBar{
      position:sticky;top:0;z-index:70;
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      padding:10px 12px;background:rgba(8,11,14,.96);backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .mixerTopLeft,.mixerTopRight,.controlTopLeft,.controlTopRight{display:flex;gap:8px;flex-wrap:wrap}

    .mixerShell,.controlShell{
      display:grid;grid-template-columns:1fr;gap:4px;padding:4px;min-height:calc(100vh - 68px);
    }
    .centerMixer,.centerControl{
      border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);background:linear-gradient(180deg,#1b232d,#121820);
      display:flex;flex-direction:column;min-width:0;
    }
    .mixerHeader,.controlHeader{
      padding:8px;border-bottom:1px solid rgba(255,255,255,.05);
      background:linear-gradient(180deg,#232d39,#171f28);
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
    }
    .lcdPanel{
      border-radius:16px;padding:10px;border:1px solid #355530;
      background:linear-gradient(180deg,#11200f,#0a1608);
      box-shadow:inset 0 0 18px rgba(151,255,123,.08);
    }
    .lcdLabel{font-size:10px;color:#c0ffb0;letter-spacing:.14em;text-transform:uppercase}
    .lcdMain{font-size:24px;font-weight:900;line-height:1;margin-top:6px;color:var(--lcd)}
    .lcdSub{font-size:11px;line-height:1.35;margin-top:6px;color:#c0ffb0;opacity:.92}

    .mixerViewport{
      flex:1;overflow-x:auto;overflow-y:hidden;padding:4px;
      background:linear-gradient(180deg,#0f141b,#0b0f14);
    }
    .mixerViewport::-webkit-scrollbar{height:12px}
    .mixerViewport::-webkit-scrollbar-track{background:#0d1116;border-radius:999px}
    .mixerViewport::-webkit-scrollbar-thumb{background:linear-gradient(90deg,#2a3442,#4a5a6c);border-radius:999px}

    /* ==================== MIXER MIGLIORATO ==================== */
    .mixerBoard {
      display: flex;
      gap: 1px;
      align-items: flex-start;
      min-width: max-content;
      padding-bottom: 4px;
    }
    .mixerGroupChannels {
      display: flex;
      gap: 1px;
      align-items: flex-end;
      min-width: max-content;
    }
    .channel {
      width: 122px;
      min-width: 122px;
      border-radius: 16px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), inset 0 -12px 18px rgba(0,0,0,.3), 0 8px 18px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      color: #f2f7fc;
      transition: transform .2s ease;
    }
    .channel:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,.4);
    }
    .channel.base-1{background:linear-gradient(180deg,#ffe86a,#ffc928 28%,#6b4f0d)}
    .channel.base-2{background:linear-gradient(180deg,#ffdf52,#f2b400 28%,#6f4b00)}
    .channel.fruit-1{background:linear-gradient(180deg,#ff9fd5,#d657a5 28%,#5a1840)}
    .channel.fruit-2{background:linear-gradient(180deg,#ff8bc5,#c24092 28%,#4d1436)}
    .channel.fruit-3{background:linear-gradient(180deg,#ff74b9,#ad2f7f 28%,#431130)}
    .channel.fruit-4{background:linear-gradient(180deg,#f760b0,#92256d 28%,#380d29)}
    .channel.tea-1{background:linear-gradient(180deg,#83d8ff,#2f87bd 28%,#123954)}
    .channel.tea-2{background:linear-gradient(180deg,#5ec6ff,#1f6fa8 28%,#103246)}
    .channel.tea-3{background:linear-gradient(180deg,#4ab6ef,#165f92 28%,#0d293d)}
    .channel.tea-4{background:linear-gradient(180deg,#35a7dc,#104f7b 28%,#0a2233)}
    .channel.botanical-1{background:linear-gradient(180deg,#ffc57a,#ea8c2d 28%,#6a3000)}
    .channel.botanical-2{background:linear-gradient(180deg,#ffb460,#d97818 28%,#5d2800)}
    .channel.botanical-3{background:linear-gradient(180deg,#ffa247,#c76508 28%,#4f2200)}
    .channel.botanical-4{background:linear-gradient(180deg,#ff922e,#b45500 28%,#451b00)}
    .channel.spice-1{background:linear-gradient(180deg,#b7ff9a,#58c533 28%,#1d4b0d)}
    .channel.spice-2{background:linear-gradient(180deg,#9df27e,#45af25 28%,#183f0a)}
    .channel.spice-3{background:linear-gradient(180deg,#87e667,#39931f 28%,#133609)}
    .channel.spice-4{background:linear-gradient(180deg,#74d554,#2f7b19 28%,#102e08)}
    .channel.pepper-1{background:linear-gradient(180deg,#ffb18e,#d2643a 28%,#5c2010)}
    .channel.pepper-2{background:linear-gradient(180deg,#ff9f77,#bc5328 28%,#4c190b)}
    .channel.pepper-3{background:linear-gradient(180deg,#f88b63,#a5441f 28%,#3f1307)}
    .channel.pepper-4{background:linear-gradient(180deg,#ea774f,#8d3716 28%,#331005)}
    .channel.hop-1{background:linear-gradient(180deg,#d8ff73,#87cc21 28%,#2d4f0a)}
    .channel.hop-2{background:linear-gradient(180deg,#c6f85e,#74b815 28%,#264507)}
    .channel.hop-3{background:linear-gradient(180deg,#b1e648,#64a30d 28%,#213b06)}
    .channel.hop-4{background:linear-gradient(180deg,#9ad335,#538a08 28%,#1a3104)}
    .channel.yeast-1{background:linear-gradient(180deg,#9fe8ff,#47b6e6 28%,#124766)}
    .channel.yeast-2{background:linear-gradient(180deg,#88dcff,#35a4d2 28%,#103d58)}
    .channel.yeast-3{background:linear-gradient(180deg,#6fcfff,#2790bc 28%,#0d344b)}
    .channel.yeast-4{background:linear-gradient(180deg,#59c1f2,#1f7ba4 28%,#0b2b40)}
    .channel.lactic-1{background:linear-gradient(180deg,#83ffe8,#27c4a5 28%,#0d4c40)}
    .channel.lactic-2{background:linear-gradient(180deg,#64f2da,#17af92 28%,#0b4136)}
    .channel.lactic-3{background:linear-gradient(180deg,#48e0c9,#0d967d 28%,#09362d)}
    .channel.lactic-4{background:linear-gradient(180deg,#34cdb7,#087f69 28%,#072d25)}
    .channel.add-1{background:linear-gradient(180deg,#dfe7f0,#8b9aab 28%,#33404b)}
    .channel.add-2{background:linear-gradient(180deg,#d0dbe7,#7a8b9d 28%,#2b3741)}
    .channel.add-3{background:linear-gradient(180deg,#c3cfdb,#6a7b8d 28%,#24303a)}
    .channel.add-4{background:linear-gradient(180deg,#b7c4d2,#5d6d7e 28%,#1f2831)}
    .channel.param-1{background:linear-gradient(180deg,#c7a6ff,#7b4fd8 28%,#2d1657)}
    .channel.param-2{background:linear-gradient(180deg,#b78fff,#6a3dca 28%,#26124c)}
    .channel.param-3{background:linear-gradient(180deg,#a87aff,#5b2fc0 28%,#200f42)}
    .channel.param-4{background:linear-gradient(180deg,#9b68f2,#4d26aa 28%,#1b0d39)}

    .channelTop{
      width:100%;display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:5px;
    }
    .channelType{
      font-size:11px;
      color:#ffffff;
      text-transform:uppercase;
      letter-spacing:.04em;
      line-height:1.12;
      min-height:28px;
      font-weight:900;
      text-shadow:0 1px 2px rgba(0,0,0,.7);
      word-break:break-word;
    }
    .tinyIconBtn{
      width:24px;height:24px;border-radius:8px;
      background:linear-gradient(180deg,#2b3642,#1a212b);
      color:#d9e2ec;border:1px solid #4a5868;font-weight:900;font-size:12px;
      flex:0 0 auto;
    }

    .miniLcd{
      width:100%;border-radius:12px;background:linear-gradient(180deg,#12200f,#0b1508);
      border:1px solid #355530;padding:8px 6px;text-align:center;
    }
    .miniLcd .lbl{font-size:9px;color:#baffab;letter-spacing:.08em;text-transform:uppercase}
    .miniLcd .val{font-size:18px;font-weight:900;margin-top:2px;color:var(--lcd)}

    .knob{
      width:58px;height:58px;border-radius:50%;margin:8px 0 6px;
      background:radial-gradient(circle at 32% 32%, #f8f0d8 0%, #d4b56c 35%, #8c6a3c 65%, #2c2c2c 100%);
      border:3px solid #e8d8a8;
      box-shadow:0 0 12px rgba(240,212,155,.6), inset 0 4px 8px rgba(255,255,255,.3);
      position:relative;
    }
    .knob::after{
      content:"";position:absolute;left:50%;top:7px;transform:translateX(-50%);
      width:8px;height:18px;border-radius:999px;
      background:linear-gradient(180deg,#f0d49b,#d2ae6d);
      box-shadow:0 2px 6px rgba(0,0,0,.5);
    }

    .tinyMeter{
      width:92%;height:9px;border-radius:999px;background:#0c1014;
      border:1px solid #4a5a6c;overflow:hidden;margin-bottom:8px;
    }
    .tinyFill{
      height:100%;width:0%;
      background:linear-gradient(90deg,#67e6cf,#a4ff64,#ffd45d,#ff6b6b);
      box-shadow:0 0 8px rgba(103,230,207,.7);
    }

    .faderWrap{
      width:100%;flex:1;display:grid;grid-template-columns:16px 1fr;gap:5px;align-items:stretch;
    }
    .vu{
      border-radius:12px;border:1px solid #344250;background:linear-gradient(180deg,#0d1116,#141a22);
      padding:3px 2px;display:flex;flex-direction:column-reverse;gap:2px;align-items:center;
    }
    .vuSeg{width:7px;height:11px;border-radius:3px;background:#242c35;border:1px solid #313b46}
    .vuSeg.g{background:linear-gradient(180deg,#8dffba,#31d872)}
    .vuSeg.a{background:linear-gradient(180deg,#ffe5a0,#ffc74d)}
    .vuSeg.r{background:linear-gradient(180deg,#ffb4b4,#ff5e5e)}

    .track{
      border-radius:14px;border:1px solid #455567;background:linear-gradient(180deg,#1a212b,#10151c);
      min-height:208px;display:flex;justify-content:center;align-items:center;position:relative;padding:6px 0;
    }
    .track::before{
      content:"";position:absolute;top:14px;bottom:14px;left:50%;transform:translateX(-50%);
      width:7px;border-radius:999px;background:#11161c;border:1px solid #3a4a5e;
    }
    .track input[type=range]{
      -webkit-appearance:none;appearance:none;width:196px;height:28px;transform:rotate(-90deg);
      background:transparent;position:relative;z-index:2;
    }
    .track input[type=range]::-webkit-slider-runnable-track{
      height:11px;border-radius:999px;background:linear-gradient(90deg,#1e2836,#0f141a);border:1px solid #4a5a6c;
    }
    .track input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;appearance:none;width:38px;height:24px;border-radius:10px;
      background:linear-gradient(180deg,#f0e8d0,#c8b080);border:2px solid #8c6a3c;
      box-shadow:0 4px 10px rgba(0,0,0,.4);
    }

    .channelButtons{
      width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px;
    }
    .channelFooterName{
      width:100%;margin-top:6px;border-radius:12px;padding:7px 5px;
      background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);
      font-size:9.5px;font-weight:900;line-height:1.15;text-align:center;min-height:32px;
      display:grid;place-items:center;word-break:break-word;
    }
    .channelEditWide{
      width:100%;margin-top:5px;border-radius:10px;padding:7px 5px;font-size:10px;font-weight:900;
      background:linear-gradient(180deg,#ecf2f8,#a8b4bf 46%,#717d89 47%,#d2dce5 100%);
      color:#111;border:1px solid #7e8a95;
    }

    .monitorWrap{
      padding:12px;display:grid;gap:12px;background:linear-gradient(180deg,#0f141b,#0b0f14);
    }
    .chartWrap{
      border-radius:18px;padding:14px;background:linear-gradient(180deg,#111722,#151f2a);
      border:1px solid #334050;min-height:380px;
      box-shadow:inset 0 0 28px rgba(126,188,255,.06), inset 0 0 55px rgba(86,223,141,.04);
    }
    .chartLegend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;color:var(--muted);font-size:12px}
    .dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:middle}

    .metricPanelGrid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
    }
    .metricDual{
      border-radius:18px;padding:14px;border:1px solid rgba(255,255,255,.08);
      box-shadow:0 0 24px rgba(0,0,0,.18), inset 0 0 16px rgba(255,255,255,.04);
    }
    .metricDual h4{
      font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;
    }
    .metricSplit{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    .metricMini{
      border-radius:14px;padding:10px;border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
    }
    .metricMini .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;opacity:.92}
    .metricMini .big{font-size:24px;font-weight:900;line-height:1;margin-top:6px}
    .metricMini .small{font-size:11px;margin-top:6px;line-height:1.35;opacity:.95}
    .metric-yellow{background:linear-gradient(180deg,#5f4c12,#2d2307);color:#ffe17f}
    .metric-green{background:linear-gradient(180deg,#114f30,#072815);color:#9dffbe}
    .metric-blue{background:linear-gradient(180deg,#143d67,#0a223a);color:#a9d6ff}
    .metric-purple{background:linear-gradient(180deg,#44206a,#220f36);color:#d7b8ff}
    .metric-orange{background:linear-gradient(180deg,#6d3d10,#351c07);color:#ffcb8e}
    .metric-pink{background:linear-gradient(180deg,#6a1f45,#330f22);color:#ffc0df}

    .printSheet{
      border-radius:18px;background:#fffdf8;color:#111;padding:18px;border:1px solid #d8cba7;
    }
    .printSheet h3{font-size:22px;font-weight:900;margin-bottom:10px}
    .printSheet .line{font-size:14px;line-height:1.6;margin-bottom:6px}

    @media print{
      body *{visibility:hidden}
      #printArea, #printArea *{visibility:visible}
      #printArea{position:absolute;left:0;top:0;width:100%;background:#fff;padding:20px}
    }

    @media (max-width:1100px){
      .layout2,.statsGrid,.recipeTypeGrid,.libraryQuickGrid,.sensoryGrid,.mixerHeader,.controlHeader,.metricPanelGrid{grid-template-columns:1fr}
      .metricSplit{grid-template-columns:1fr}
    }
    @media (max-width:860px){
      .formGrid,.ingredientRow{grid-template-columns:1fr}
      body{padding-bottom:120px}
    }
    @media (max-width:900px){
      .mixerViewport{padding:3px}
      .mixerBoard{gap:1px}
      .mixerGroupChannels{gap:1px}
      .channel{width:118px;min-width:118px}
      .track{min-height:192px}
      .track input[type=range]{width:170px}
      .channelType{font-size:10px}
      .mixerTopBar{padding:8px}
      .mixerTopLeft,.mixerTopRight{gap:6px}
    }
    @media (orientation:portrait){
      .mixerBoard{gap:1px}
      .mixerGroupChannels{gap:1px}
      .channel{width:112px;min-width:112px}
      .track{min-height:182px}
      .track input[type=range]{width:160px}
      .knob{width:50px;height:50px}
      .miniLcd .val{font-size:16px}
      .channelFooterName{font-size:10px;min-height:34px}
    }
  </style>
</head>
