<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  background:#071629;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.title{
  margin-top:40px;
  font-size:28px;
  letter-spacing:2px;
}

.value{
  font-size:64px;
  margin-top:20px;
}

.sub{
  color:#9aa7b3;
}

svg{
  width:90%;
  max-width:380px;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="title">PH</div>

<svg viewBox="0 0 300 300">

<!-- ghiera -->
<circle cx="150" cy="150" r="120"
fill="radial-gradient(circle at 30% 30%, #ddd, #555)"/>

<!-- quadrante -->
<circle cx="150" cy="150" r="100"
fill="radial-gradient(circle, #1a1f25, #000)"/>

<!-- arco scala -->
<path d="M50 190 A100 100 0 0 1 250 190"
stroke="#d8d0b5"
stroke-width="4"
fill="none"/>

<!-- TACCHETTE (angoli reali) -->
<g stroke="#d8d0b5" stroke-width="4" stroke-linecap="round">
  <line x1="60" y1="190" x2="45" y2="205"/>
  <line x1="95" y1="150" x2="80" y2="140"/>
  <line x1="135" y1="130" x2="130" y2="110"/>
  <line x1="150" y1="125" x2="150" y2="105"/>
  <line x1="165" y1="130" x2="170" y2="110"/>
  <line x1="205" y1="150" x2="220" y2="140"/>
  <line x1="240" y1="190" x2="255" y2="205"/>
</g>

<!-- NUMERI FUORI -->
<g fill="#d8d0b5" font-size="16" text-anchor="middle">
  <text x="60" y="225">2.8</text>
  <text x="120" y="115">3.5</text>
  <text x="180" y="115">4.2</text>
  <text x="240" y="225">5.0</text>
</g>

<!-- lancetta -->
<g transform="rotate(35 150 150)">
  <polygon points="147,150 153,150 150,70"
  fill="#e22"/>
</g>

<!-- perno -->
<circle cx="150" cy="150" r="12"
fill="radial-gradient(circle, #fff, #888)"/>

</svg>

<div class="value">3.50</div>
<div class="sub">ultima misurazione</div>

</body>
</html>
