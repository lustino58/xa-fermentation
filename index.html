<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#09111a;
      --text:#eef5fb;
      --muted:#b8c4cf;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(70,120,180,.14), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:84px;
      height:84px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f3f8fc;
      background:
        linear-gradient(145deg, rgba(210,220,228,.18), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1c2732, #0c131b);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.42),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    /* SOLO BASE ACCIAIO SATINATO */
    .steel-panel{
      position:relative;
      min-height:620px;
      border-radius:36px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.28);

      background:
        linear-gradient(180deg,
          rgba(255,255,255,.34) 0%,
          rgba(255,255,255,.14) 6%,
          rgba(0,0,0,.04) 14%,
          rgba(255,255,255,.10) 24%,
          rgba(255,255,255,.02) 34%,
          rgba(0,0,0,.06) 48%,
          rgba(255,255,255,.10) 60%,
          rgba(255,255,255,.03) 74%,
          rgba(0,0,0,.10) 88%,
          rgba(255,255,255,.12) 100%
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.085) 0px,
          rgba(255,255,255,.025) 2px,
          rgba(0,0,0,.030) 4px,
          rgba(255,255,255,.020) 6px,
          rgba(0,0,0,.025) 8px
        ),
        linear-gradient(180deg,
          #f8fbfd 0%,
          #dbe2e8 10%,
          #a5afb9 24%,
          #f2f6f9 38%,
          #7f8993 56%,
          #d0d7dd 72%,
          #6f7984 88%,
          #c7d0d7 100%
        );

      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.26),
        inset 0 -22px 34px rgba(0,0,0,.18),
        0 16px 38px rgba(0,0,0,.24);
    }

    .steel-panel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:36px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.06) 0%,
          transparent 10%,
          rgba(255,255,255,.04) 22%,
          transparent 36%,
          rgba(255,255,255,.05) 48%,
          transparent 60%,
          rgba(0,0,0,.04) 74%,
          transparent 86%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
      opacity:.95;
    }

    .steel-panel::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 -12px 22px rgba(0,0,0,.10);
      pointer-events:none;
    }

    .screw{
      position:absolute;
      width:24px;
      height:24px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0%, #dce3e9 18%, #99a3ad 46%, #5f6973 72%, #363d45 100%);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.42),
        0 2px 4px rgba(0,0,0,.35);
      z-index:3;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:11px;
      height:1.6px;
      background:#2f3740;
      transform:rotate(-18deg);
      border-radius:2px;
    }

    .screw.tl{ top:12px; left:12px; }
    .screw.tr{ top:12px; right:12px; }
    .screw.bl{ bottom:12px; left:12px; }
    .screw.br{ bottom:12px; right:12px; }

    .center-note{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      color:rgba(255,255,255,.72);
      font-size:28px;
      font-weight:700;
      letter-spacing:2px;
      text-shadow:0 1px 0 rgba(0,0,0,.12);
    }

    .bottom-note{
      margin-top:18px;
      text-align:center;
      color:#d7e3ee;
      font-size:14px;
      line-height:1.4;
      opacity:.92;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        border-radius:22px;
        font-size:34px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .steel-panel{
        min-height:520px;
      }

      .center-note{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Test solo base pannello: acciaio satinato brillante</p>
      </div>
    </div>

    <div class="steel-panel">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="center-note">
        BASE ACCIAIO SATINATO
      </div>
    </div>

    <div class="bottom-note">
      Qui stiamo controllando solo il metallo. Quando questo va bene, aggiungiamo il primo quadrante.
    </div>
  </div>
</body>
</html>
