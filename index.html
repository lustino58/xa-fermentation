<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#05090f,#0b1622);
  color:white;
  padding:20px;
}

/* HEADER */
.header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
.logo{
  width:80px;height:80px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:bold;
  background:linear-gradient(#1e2a36,#0c131b);
}
h1{margin:0;font-size:28px}
.sub{font-size:14px;color:#9fb0c0}

/* PANNELLO */
.panel{
  position:relative;
  border-radius:30px;
  padding:30px;
  background:
    repeating-linear-gradient(90deg,#ffffff10 0px,#00000008 3px),
    linear-gradient(#f0f4f7,#b8c0c7,#e4e9ee,#8d98a3);
  box-shadow:
    inset 0 2px 6px #ffffff50,
    inset 0 -20px 30px #00000030,
    0 20px 40px #00000050;
}

/* VITI */
.screw{
  position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(#fff,#999,#444);
}
.tl{top:10px;left:10px}
.tr{top:10px;right:10px}
.bl{bottom:10px;left:10px}
.br{bottom:10px;right:10px}

/* CARD */
.card{
  background:linear-gradient(#5b646f,#20262d);
  border-radius:30px;
  padding:30px 20px 30px;
  text-align:center;
  box-shadow:
    inset 0 2px 4px #ffffff20,
    inset 0 -30px 40px #00000070;
}

.title{
  letter-spacing:8px;
  margin-bottom:10px;
  color:#dfe6ee;
}

/* QUADRANTE GRANDE */
.dial{
  width:100%;
  max-width:420px;
  aspect-ratio:1;
  margin:0 auto;
}

/* TESTO */
.value{
  font-size:60px;
  margin-top:10px;
}
.subtext{
  color:#aebbc7;
}

/* MOBILE */
@media(max-width:600px){
  .value{font-size:50px}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">XA</div>
  <div>
    <h1>XA Fermentation</h1>
    <div class="sub">Step 8: proporzioni reali strumento</div>
  </div>
</div>

<div class="panel">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="card">
    <div class="title">P H</div>

    <div class="dial">
      <svg viewBox="0 0 400 400" width="100%" height="100%">
        
        <!-- GHIERA -->
        <circle cx="200" cy="200" r="150" fill="url(#bezelGrad)"/>
        
        <!-- INTERNO -->
        <circle cx="200" cy="200" r="125" fill="url(#faceGrad)"/>

        <!-- LANCETTA -->
        <g transform="rotate(32 200 200)">
          <polygon points="195,200 205,200 202,80 198,80" fill="#e53935"/>
          <rect x="199" y="85" width="2" height="100" fill="#fff"/>
        </g>

        <!-- PERNO -->
        <circle cx="200" cy="200" r="30" fill="url(#hubGrad)"/>

      </svg>
    </div>

    <div class="value">3.50</div>
    <div class="subtext">ultima misurazione</div>
  </div>
</div>

</body>
</html>
