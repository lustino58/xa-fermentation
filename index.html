<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body {
  background:#05080c;
  color:white;
  font-family:sans-serif;
  margin:0;
  padding:20px;
}

h1 {
  font-size:32px;
}

button {
  width:100%;
  padding:18px;
  margin:15px 0;
  border:none;
  border-radius:16px;
  background:#2a3f52;
  color:white;
  font-size:18px;
}

.card {
  background:#0b1118;
  padding:20px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,150,255,0.15);
}

.name {
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>XA Fermentation</h1>

<button onclick="addBatch()">+ New Batch</button>

<div id="list"></div>

<script>
let batches = JSON.parse(localStorage.getItem("batches")) || [];

function save(){
  localStorage.setItem("batches", JSON.stringify(batches));
}

function formatTemp(t){
  if(!t) return "-";
  return t + "°C";
}

function formatValue(v){
  if(!v) return "-";
  return v;
}

function render(){
  let html = "";

  batches.forEach((b,i)=>{
    html += `
    <div class="card" onclick="manageBatch(${i})">
      <div class="name">${b.name}</div>
      Type: ${b.type.toUpperCase()}<br>
      pH: ${formatValue(b.ph)}<br>
      Gravity: ${formatValue(b.gravity)}<br>
      Temp: ${formatTemp(b.temp)}
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function addBatch(){
  let name = prompt("Nome batch:");
  if(!name) return;

  let type = prompt("Tipo:");
  let ph = prompt("pH:");
  let gravity = prompt("Gravity:");
  let temp = prompt("Temperatura °C:");

  batches.push({ name, type, ph, gravity, temp });

  save();
  render();
}

function manageBatch(i){
  let action = prompt("Scrivi:\n1 = modifica\n2 = cancella");

  if(action == "1"){
    let b = batches[i];

    b.name = prompt("Nome:", b.name);
    b.type = prompt("Tipo:", b.type);
    b.ph = prompt("pH:", b.ph);
    b.gravity = prompt("Gravity:", b.gravity);
    b.temp = prompt("Temp:", b.temp);

  } else if(action == "2"){
    if(confirm("Sicuro di cancellare?")){
      batches.splice(i,1);
    }
  }

  save();
  render();
}

render();
</script>

</body>
</html>
