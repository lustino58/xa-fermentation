<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(180deg,#071629,#0a223a);
}

.app{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.title{
  font-size:32px;
  text-align:center;
  margin-bottom:20px;
  letter-spacing:3px;
}

.card{
  background:#0f2742;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.metric{
  background:#0c1f33;
  border-radius:16px;
  padding:12px;
  text-align:center;
}

.metric h3{
  font-size:12px;
  color:#8fa6bf;
  margin-bottom:5px;
}

.metric .value{
  font-size:34px;
  font-weight:700;
}

.ph{color:#4da3ff;}
.temp{color:#ff8a3d;}
.abv{color:#b86bff;}
.og{color:#ffd166;}
.fg{color:#41d39f;}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#ff4b4b;
  color:#fff;
}
</style>
</head>

<body>

<div class="app">

<div class="title">XA</div>

<div class="card grid">
  <div class="metric ph">
    <h3>PH</h3>
    <div class="value" id="phVal">3.50</div>
  </div>

  <div class="metric temp">
    <h3>TEMP</h3>
    <div class="value" id="tempVal">20°</div>
  </div>

  <div class="metric abv">
    <h3>ABV</h3>
    <div class="value" id="abvVal">5.2%</div>
  </div>

  <div class="metric og">
    <h3>OG</h3>
    <div class="value" id="ogVal">1.050</div>
  </div>

  <div class="metric fg">
    <h3>FG</h3>
    <div class="value" id="fgVal">1.010</div>
  </div>
</div>

<div class="card">
  <input id="ricetta" placeholder="Nome ricetta">
  <input id="lotto" placeholder="Numero lotto">
  <input id="ph" type="number" step="0.01" placeholder="pH">
  <input id="temp" type="number" step="0.1" placeholder="Temperatura">
  <input id="og" type="number" step="0.001" placeholder="OG">
  <input id="fg" type="number" step="0.001" placeholder="FG">
  <textarea id="ingredienti" placeholder="Ingredienti"></textarea>
  <textarea id="note" placeholder="Note"></textarea>

  <button onclick="salva()">SALVA</button>
</div>

</div>

<script>
function salva(){

let ph=parseFloat(document.getElementById("ph").value)||3.5;
let temp=parseFloat(document.getElementById("temp").value)||20;
let og=parseFloat(document.getElementById("og").value)||1.05;
let fg=parseFloat(document.getElementById("fg").value)||1.01;

let abv=(og-fg)*131;

document.getElementById("phVal").innerText=ph.toFixed(2);
document.getElementById("tempVal").innerText=temp.toFixed(1)+"°";
document.getElementById("ogVal").innerText=og.toFixed(3);
document.getElementById("fgVal").innerText=fg.toFixed(3);
document.getElementById("abvVal").innerText=abv.toFixed(2)+"%";

localStorage.setItem("xa_data",JSON.stringify({
ph,temp,og,fg,
ricetta:document.getElementById("ricetta").value,
lotto:document.getElementById("lotto").value,
ingredienti:document.getElementById("ingredienti").value,
note:document.getElementById("note").value
}));

}

function carica(){
let d=JSON.parse(localStorage.getItem("xa_data")||"{}");
if(!d)return;

document.getElementById("ricetta").value=d.ricetta||"";
document.getElementById("lotto").value=d.lotto||"";
document.getElementById("ingredienti").value=d.ingredienti||"";
document.getElementById("note").value=d.note||"";

if(d.ph) document.getElementById("ph").value=d.ph;
if(d.temp) document.getElementById("temp").value=d.temp;
if(d.og) document.getElementById("og").value=d.og;
if(d.fg) document.getElementById("fg").value=d.fg;

salva();
}

carica();
</script>

</body>
</html>
