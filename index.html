<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1622;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:320px;
  text-align:center;
}

.title{
  margin-bottom:20px;
}

svg{
  width:100%;
}

.value{
  font-size:48px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">PH</div>

<svg viewBox="0 0 400 400">

<defs>
<radialGradient id="bezel">
<stop offset="0%" stop-color="#fff"/>
<stop offset="100%" stop-color="#333"/>
</radialGradient>

<radialGradient id="face">
<stop offset="0%" stop-color="#222"/>
<stop offset="100%" stop-color="#000"/>
</radialGradient>
</defs>

<!-- ghiera -->
<circle cx="200" cy="200" r="160" fill="url(#bezel)"/>

<!-- interno -->
<circle cx="200" cy="200" r="130" fill="url(#face)"/>

<!-- lancetta -->
<g transform="rotate(35 200 200)">
<polygon points="198,200 202,200 200,80" fill="red"/>
</g>

<!-- centro -->
<circle cx="200" cy="200" r="20" fill="white"/>

</svg>

<div class="value">3.50</div>

</div>

</body>
</html>
