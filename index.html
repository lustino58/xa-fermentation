<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#03070c;
      --bg2:#08111a;
      --text:#eef5fb;
      --muted:#a9b8c6;
      --blue:#6cbcff;
      --green:#79f0b6;
      --orange:#ffbf72;
      --purple:#cd92ff;
      --red:#ff717c;
      --yellow:#ffd56f;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(50,110,170,.16), transparent 30%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:1100px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:10px;
    }

    .lang-btn{
      border:none;
      border-radius:16px;
      padding:10px 14px;
      font-size:14px;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(155,173,190,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #3d5f7d, #2b445a);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 12px rgba(70,140,220,.16);
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:86px;
      height:86px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      font-weight:700;
      color:#eef5fb;
      background:
        linear-gradient(145deg, rgba(180,196,210,.24), rgba(70,80,90,.08)),
        linear-gradient(180deg, #192430, #0b1219);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -8px 14px rgba(0,0,0,.45),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .dashboard,
    .empty,
    .batch-card,
    .detail-card,
    .chart-card,
    .measurements,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card,
    .alert-box{
      border-radius:26px;
      border:1px solid rgba(180,196,210,.10);
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 24px rgba(0,110,210,.08);
    }

    .dashboard{
      padding:18px;
      margin-bottom:20px;
    }

    /* PANNELLO ALLUMINIO SATINATO */
    .metal-panel{
      position:relative;
      border-radius:34px;
      padding:20px 16px 18px;
      margin-bottom:18px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,.16) 0%,
          rgba(255,255,255,.06) 8%,
          rgba(0,0,0,.10) 18%,
          rgba(255,255,255,.05) 34%,
          rgba(0,0,0,.10) 52%,
          rgba(255,255,255,.05) 68%,
          rgba(0,0,0,.12) 86%,
          rgba(255,255,255,.08) 100%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.050) 0px,
          rgba(255,255,255,.022) 2px,
          rgba(0,0,0,.040) 4px,
          rgba(255,255,255,.018) 6px,
          rgba(0,0,0,.035) 8px
        ),
        linear-gradient(180deg,#9aa5af 0%,#55606a 18%,#bcc6cf 48%,#48525c 74%,#87929d 100%);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.18),
        inset 0 -16px 26px rgba(0,0,0,.28),
        0 12px 30px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .metal-panel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          transparent 12%,
          rgba(255,255,255,.05) 24%,
          transparent 38%,
          rgba(0,0,0,.06) 56%,
          transparent 74%,
          rgba(255,255,255,.04) 100%);
      opacity:.9;
      pointer-events:none;
    }

    .screw{
      position:absolute;
      width:20px;
      height:20px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fbfdff 0%, #d0d8df 18%, #8d97a1 46%, #59616a 72%, #333941 100%);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.38),
        0 1px 3px rgba(0,0,0,.45);
      z-index:4;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:9px;
      height:1.5px;
      background:#313841;
      transform:rotate(-20deg);
      border-radius:2px;
    }

    .screw.tl{ top:10px; left:10px; }
    .screw.tr{ top:10px; right:10px; }
    .screw.bl{ bottom:10px; left:10px; }
    .screw.br{ bottom:10px; right:10px; }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      position:relative;
      z-index:2;
    }

    .gauge-card{
      border-radius:30px;
      padding:14px 12px 18px;
      min-width:0;
      text-align:center;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.03), transparent 30%),
        linear-gradient(180deg,#071018,#040a11);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        inset 0 -16px 20px rgba(0,0,0,.48),
        0 6px 18px rgba(0,0,0,.22);
    }

    .gauge-card.alert-warning{
      border-color:rgba(255,213,111,.24);
    }

    .gauge-card.alert-critical{
      border-color:rgba(255,113,124,.24);
    }

    .g-label{
      font-size:11px;
      letter-spacing:5px;
      color:#d9e4ee;
      margin-bottom:8px;
    }

    .dial-wrap{
      width:188px;
      height:188px;
      margin:0 auto 8px;
      position:relative;
    }

    /* QUADRANTE IN RILIEVO */
    .dial-housing{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        linear-gradient(145deg, rgba(210,220,228,.20), rgba(66,76,86,.20)),
        linear-gradient(180deg,#39434d,#1f262d);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.15),
        inset 0 -10px 14px rgba(0,0,0,.42),
        0 4px 14px rgba(0,0,0,.35);
    }

    .dial-bezel{
      position:absolute;
      inset:14px;
      border-radius:50%;
      background:
        linear-gradient(145deg,#c5ced6,#7a8691 42%,#525d67 58%,#b5c0c9);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.22),
        inset 0 -7px 10px rgba(0,0,0,.36),
        0 0 10px rgba(0,0,0,.22);
    }

    .dial{
      position:absolute;
      inset:22px;
      border-radius:50%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 55%, #081018 0 28%, #0b1620 28% 54%, #08111a 54% 100%);
      border:2px solid rgba(200,220,240,.12);
      box-shadow:
        inset 0 12px 22px rgba(0,0,0,.55),
        inset 0 -8px 16px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.03);
    }

    .dial-ring-light{
      position:absolute;
      inset:0;
      border-radius:50%;
      z-index:1;
      pointer-events:none;
    }

    .dial-ring-light::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.36);
      box-shadow:
        0 0 6px rgba(255,255,255,.18),
        0 0 14px rgba(255,255,255,.14),
        0 0 28px rgba(255,255,255,.10),
        inset 0 0 6px rgba(255,255,255,.08);
    }

    .dial-inner-glow{
      position:absolute;
      inset:18px;
      border-radius:50%;
      z-index:1;
      filter:blur(14px);
      opacity:.30;
      pointer-events:none;
    }

    .dial-core{
      position:absolute;
      inset:40px;
      border-radius:50%;
      z-index:2;
      background:
        radial-gradient(circle at 50% 40%, rgba(7,12,18,.98) 0 52%, rgba(2,6,10,1) 52% 100%);
      box-shadow:
        inset 0 8px 18px rgba(0,0,0,.56),
        inset 0 -4px 8px rgba(255,255,255,.02);
    }

    .ticks{
      position:absolute;
      inset:0;
      z-index:3;
      border-radius:50%;
    }

    .tick{
      position:absolute;
      left:50%;
      top:12px;
      width:4px;
      height:20px;
      margin-left:-2px;
      border-radius:6px;
      transform-origin:50% 72px;
      opacity:.95;
    }

    .tick.small{
      height:12px;
      top:16px;
      opacity:.74;
    }

    /* NUMERI DENTRO IL QUADRANTE */
    .dial-numbers{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
    }

    .dial-number{
      position:absolute;
      transform:translate(-50%,-50%);
      font-size:10px;
      font-weight:700;
      color:#eef5fb;
      text-shadow:0 0 6px rgba(255,255,255,.12);
      white-space:nowrap;
      letter-spacing:.2px;
      opacity:.96;
    }

    .needle{
      position:absolute;
      left:50%;
      bottom:50%;
      width:8px;
      height:74px;
      transform-origin:bottom center;
      transform:translateX(-50%) rotate(-60deg);
      border-radius:999px;
      z-index:4;
      transition:transform .95s cubic-bezier(.18,1.3,.34,1);
    }

    .needle::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-13px;
      width:22px;
      height:22px;
      margin-left:-11px;
      border-radius:50%;
      background:#dfefff;
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.45),
        0 0 12px rgba(190,225,255,.18);
    }

    /* VETRO BEN VISIBILE */
    .glass{
      position:absolute;
      inset:0;
      z-index:5;
      border-radius:50%;
      pointer-events:none;
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,.22), transparent 22%),
        linear-gradient(145deg,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,.07) 16%,
          rgba(255,255,255,.00) 34%,
          rgba(255,255,255,.03) 56%,
          rgba(255,255,255,.08) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -1px 0 rgba(255,255,255,.05);
      opacity:.92;
    }

    .glass::before{
      content:"";
      position:absolute;
      left:18%;
      top:8%;
      width:42%;
      height:14%;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.02));
      transform:rotate(-16deg);
      filter:blur(1px);
    }

    .glass::after{
      content:"";
      position:absolute;
      right:16%;
      bottom:18%;
      width:24%;
      height:10%;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.00));
      transform:rotate(22deg);
      filter:blur(1px);
    }

    /* COLORI */
    .ph .dial-ring-light::before{
      border-color:rgba(168,236,255,.72);
      box-shadow:
        0 0 8px rgba(160,230,255,.44),
        0 0 20px rgba(140,220,255,.34),
        0 0 34px rgba(125,210,255,.22),
        inset 0 0 7px rgba(220,248,255,.16);
    }
    .ph .dial-inner-glow{
      background:radial-gradient(circle, rgba(210,246,255,.25) 0%, rgba(180,232,255,.15) 42%, transparent 76%);
    }
    .ph .tick{
      background:rgba(167,235,255,.92);
      box-shadow:0 0 8px rgba(167,235,255,.24);
    }
    .ph .needle{
      background:linear-gradient(180deg,#d7ffe7,var(--green));
      box-shadow:0 0 12px rgba(121,240,182,.18);
    }

    .gravity .dial-ring-light::before{
      border-color:rgba(116,188,255,.78);
      box-shadow:
        0 0 8px rgba(125,193,255,.44),
        0 0 20px rgba(100,182,255,.34),
        0 0 34px rgba(75,156,255,.22),
        inset 0 0 7px rgba(215,241,255,.16);
    }
    .gravity .dial-inner-glow{
      background:radial-gradient(circle, rgba(220,242,255,.22) 0%, rgba(185,225,255,.14) 42%, transparent 76%);
    }
    .gravity .tick{
      background:rgba(108,188,255,.95);
      box-shadow:0 0 8px rgba(108,188,255,.24);
    }
    .gravity .needle{
      background:linear-gradient(180deg,#e8f6ff,var(--blue));
      box-shadow:0 0 12px rgba(108,188,255,.20);
    }

    .temp .dial-ring-light::before{
      border-color:rgba(255,194,108,.76);
      box-shadow:
        0 0 8px rgba(255,202,126,.42),
        0 0 20px rgba(255,184,98,.30),
        0 0 34px rgba(255,166,72,.20),
        inset 0 0 7px rgba(255,241,218,.16);
    }
    .temp .dial-inner-glow{
      background:radial-gradient(circle, rgba(255,239,210,.22) 0%, rgba(255,224,174,.14) 42%, transparent 76%);
    }
    .temp .tick{
      background:rgba(255,192,104,.95);
      box-shadow:0 0 8px rgba(255,192,104,.24);
    }
    .temp .needle{
      background:linear-gradient(180deg,#ffe9cd,var(--orange));
      box-shadow:0 0 12px rgba(255,191,114,.20);
    }

    .count .dial-ring-light::before{
      border-color:rgba(211,158,255,.76);
      box-shadow:
        0 0 8px rgba(220,176,255,.42),
        0 0 20px rgba(205,146,255,.32),
        0 0 34px rgba(186,110,255,.20),
        inset 0 0 7px rgba(226,242,255,.12);
    }
    .count .dial-inner-glow{
      background:radial-gradient(circle, rgba(220,236,255,.20) 0%, rgba(194,222,255,.12) 42%, transparent 76%);
    }
    .count .tick{
      background:rgba(205,146,255,.95);
      box-shadow:0 0 8px rgba(205,146,255,.24);
    }
    .count .needle{
      background:linear-gradient(180deg,#f2ddff,var(--purple));
      box-shadow:0 0 12px rgba(205,146,255,.20);
    }

    .g-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .g-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.25;
    }

    .main-btn,
    .nav-btn,
    .small-btn,
    .template-btn{
      border:none;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(170,188,204,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #4c6780, #2d465c);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 0 18px rgba(70,140,220,.14);
    }

    .main-btn{
      width:100%;
      border-radius:24px;
      padding:18px;
      font-size:22px;
      margin-bottom:12px;
    }

    .nav-btn{
      width:100%;
      border-radius:20px;
      padding:14px;
      font-size:16px;
      margin-bottom:14px;
    }

    .small-btn,
    .template-btn{
      border-radius:18px;
      padding:14px 12px;
      font-size:15px;
      width:100%;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
      line-height:1.3;
    }

    .section-title{
      margin:18px 0 12px;
      color:#dce8f3;
      font-size:13px;
      letter-spacing:5px;
      text-transform:uppercase;
    }

    .empty,
    .batch-card,
    .detail-card,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card,
    .alert-box{
      padding:18px;
      margin-bottom:14px;
    }

    .empty{
      color:var(--muted);
      text-align:center;
      line-height:1.4;
    }

    .alert-box{
      border-radius:18px;
      line-height:1.45;
      font-size:14px;
    }

    .alert-box.ok{ border-color:rgba(121,240,182,.16); }
    .alert-box.warning{ border-color:rgba(255,213,111,.18); }
    .alert-box.critical{ border-color:rgba(255,113,124,.22); }

    .alert-title{
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }

    .batch-card{
      cursor:pointer;
    }

    .batch-card.status-card-critical{
      border-color:rgba(255,113,124,.16);
    }

    .batch-card.status-card-warning{
      border-color:rgba(255,213,111,.14);
    }

    .batch-top,
    .detail-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .batch-name,
    .detail-name{
      font-size:26px;
      font-weight:700;
      line-height:1.05;
      word-break:break-word;
    }

    .right-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    .type-badge,
    .status-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid rgba(164,185,203,.12);
    }

    .type-badge{
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
    }

    .status-active{ color:#dbffe9; background:linear-gradient(180deg, rgba(78,160,112,.22), rgba(30,87,52,.20)); }
    .status-slow{ color:#fff4d1; background:linear-gradient(180deg, rgba(185,142,44,.24), rgba(108,78,18,.20)); }
    .status-critical{ color:#ffe0e0; background:linear-gradient(180deg, rgba(170,66,66,.24), rgba(100,30,30,.20)); }
    .status-complete{ color:#e0f1ff; background:linear-gradient(180deg, rgba(58,110,170,.24), rgba(29,57,94,.20)); }

    .metrics,
    .process-grid,
    .templates-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .metric,
    .process-item{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:84px;
      min-width:0;
    }

    .metric-label,
    .process-label,
    .templates-title,
    .chart-title,
    .measurements-title,
    .process-title,
    .additions-title,
    .filters-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
      margin-bottom:10px;
      line-height:1.25;
      word-break:break-word;
    }

    .metric-value,
    .process-value{
      font-size:20px;
      font-weight:700;
      line-height:1.25;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .detail-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .chart-card,
    .measurements{
      padding:14px 12px;
      margin-bottom:12px;
    }

    .chart-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-chart{
      background:linear-gradient(180deg, #0b131b, #081018);
      border:1px solid rgba(143,164,182,.08);
      border-radius:16px;
      padding:10px;
      min-width:0;
    }

    .mini-chart svg{
      width:100%;
      height:120px;
      display:block;
    }

    .legend{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.25;
    }

    .template-btn{
      text-align:left;
      min-height:92px;
    }

    .template-name{
      display:block;
      font-size:17px;
      font-weight:700;
      margin-bottom:6px;
      word-break:break-word;
    }

    .template-desc{
      display:block;
      font-size:12px;
      color:#d8e6f3;
      opacity:.9;
      line-height:1.35;
      word-break:break-word;
    }

    .filters-grid{
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:10px;
    }

    .filter-input,
    .filter-select{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d1620;
      color:#eef6fd;
      font-size:14px;
      outline:none;
      min-width:0;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;

    function t(key){
      return (i18n[appLang] && i18n[appLang][key]) || key;
    }

    function toggleLanguage(){
      appLang = appLang === "en" ? "it" : "en";
      localStorage.setItem("xa_lang", appLang);
      document.documentElement.lang = appLang;
      render();
    }

    function save(){
      localStorage.setItem("batches", JSON.stringify(batches));
    }

    function formatTemp(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + "°C";
    }

    function formatPressure(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + " bar";
    }

    function formatValue(v){
      if(v === undefined || v === null || v === "") return "-";
      return v;
    }

    function parseNum(v){
      const n = parseFloat(String(v).replace(",", "."));
      return isNaN(n) ? null : n;
    }

    function mapValue(value, inMin, inMax, outMin, outMax){
      if(isNaN(value)) return outMin;
      if(value < inMin) value = inMin;
      if(value > inMax) value = inMax;
      return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }

    function animateNeedle(id, deg){
      const el = document.getElementById(id);
      if(!el) return;
      const current = el.dataset.deg ? parseFloat(el.dataset.deg) : -60;
      const overshoot = deg > current ? Math.min(deg + 6, 66) : Math.max(deg - 6, -66);
      el.style.transform = `translateX(-50%) rotate(${overshoot}deg)`;
      clearTimeout(el._needleTimer);
      el._needleTimer = setTimeout(() => {
        el.style.transform = `translateX(-50%) rotate(${deg}deg)`;
      }, 170);
      el.dataset.deg = deg;
    }

    function buildTicks(containerId){
      const box = document.getElementById(containerId);
      if(!box) return;
      box.innerHTML = "";
      for(let i=0;i<=12;i++){
        const tick = document.createElement("div");
        tick.className = "tick" + ((i % 2 === 0) ? "" : " small");
        tick.style.transform = `rotate(${-60 + i * 10}deg)`;
        box.appendChild(tick);
      }
    }

    function polarPosition(centerX, centerY, radius, angleDeg){
      const rad = angleDeg * Math.PI / 180;
      return {
        x: centerX + Math.cos(rad) * radius,
        y: centerY + Math.sin(rad) * radius
      };
    }

    function buildDialNumbers(containerId, labels){
      const box = document.getElementById(containerId);
      if(!box) return;
      box.innerHTML = "";
      const center = 94;
      const radius = 58;
      labels.forEach(item => {
        const pos = polarPosition(center, center, radius, item.angle);
        const el = document.createElement("div");
        el.className = "dial-number";
        el.style.left = pos.x + "px";
        el.style.top = pos.y + "px";
        el.textContent = item.label;
        box.appendChild(el);
      });
    }

    function getDay(b){
      if(!b.createdAt) return "-";
      const start = new Date(b.createdAt);
      const now = new Date();
      return Math.max(1, Math.floor((now - start) / 86400000) + 1);
    }

    function ensureBatchFields(b){
      if(!b.baseFermentable) b.baseFermentable = "-";
      if(!b.liters) b.liters = "-";
      if(!b.nutrients) b.nutrients = "-";
      if(!b.sugar) b.sugar = "-";
      if(!b.fruit) b.fruit = "-";
      if(!b.botanicals) b.botanicals = "-";
      if(!b.dryAdjunct) b.dryAdjunct = "-";
      if(!b.otherAdditions) b.otherAdditions = "-";
      if(!b.targetPressure) b.targetPressure = "-";
      if(!b.processNotes) b.processNotes = "-";
      if(!b.sensoryNotes) b.sensoryNotes = "-";
      if(!Array.isArray(b.measurements)) b.measurements = [];
      if(!Array.isArray(b.additionsLog)) b.additionsLog = [];
    }

    function getMeasurements(b){
      ensureBatchFields(b);
      return b.measurements;
    }

    function getLatestMeasurement(b){
      const list = getMeasurements(b);
      if(list.length === 0) return null;
      return list[list.length - 1];
    }

    function getABV(b){
      const og = parseNum(b.og);
      const latest = getLatestMeasurement(b);
      const fg = latest ? parseNum(latest.gravity) : null;
      if(og === null || fg === null) return "-";
      return ((og - fg) * 131).toFixed(2) + "%";
    }

    function getStatus(b){
      const latest = getLatestMeasurement(b);
      const og = parseNum(b.og);
      const current = latest ? parseNum(latest.gravity) : null;
      const temp = latest ? parseNum(latest.temp) : null;
      const ph = latest ? parseNum(latest.ph) : null;

      if(temp !== null && (temp < 5 || temp > 40)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };
      if(ph !== null && (ph < 2.8 || ph > 4.6)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };

      if(og !== null && current !== null){
        const diff = og - current;
        if(diff >= 0.030) return { text:t("statusComplete"), cls:"status-complete", key:"complete" };
        if(diff >= 0.010) return { text:t("statusActive"), cls:"status-active", key:"active" };
        return { text:t("statusSlow"), cls:"status-slow", key:"slow" };
      }

      return { text:t("statusActive"), cls:"status-active", key:"active" };
    }

    function getBatchAlerts(b){
      const alerts = [];
      const latest = getLatestMeasurement(b);
      if(!latest){
        return { level:"ok", messages:[t("alertGood")] };
      }

      const temp = parseNum(latest.temp);
      const ph = parseNum(latest.ph);
      const og = parseNum(b.og);
      const gravity = parseNum(latest.gravity);

      if(temp !== null && temp > 35) alerts.push({ level:"critical", text:t("alertTempHigh") });
      else if(temp !== null && temp > 30) alerts.push({ level:"warning", text:t("alertTempHigh") });

      if(temp !== null && temp < 10) alerts.push({ level:"warning", text:t("alertTempLow") });

      if(ph !== null && ph > 4.4) alerts.push({ level:"warning", text:t("alertPhHigh") });
      if(ph !== null && ph < 2.9) alerts.push({ level:"critical", text:t("alertPhLow") });

      if(og !== null && gravity !== null){
        const diff = og - gravity;
        if(diff < 0.008) alerts.push({ level:"warning", text:t("alertSlow") });
        if(diff >= 0.030) alerts.push({ level:"ok", text:t("alertComplete") });
      }

      if(alerts.some(a => a.level === "critical")){
        return { level:"critical", messages:alerts.map(a => a.text) };
      }
      if(alerts.some(a => a.level === "warning")){
        return { level:"warning", messages:alerts.map(a => a.text) };
      }
      return { level:"ok", messages:alerts.length ? alerts.map(a => a.text) : [t("alertGood")] };
    }

    function getGaugeAlertClass(kind, topBatch){
      if(!topBatch) return "alert-ok";
      const latest = getLatestMeasurement(topBatch);
      if(!latest) return "alert-ok";

      if(kind === "ph"){
        const ph = parseNum(latest.ph);
        if(ph === null) return "alert-ok";
        if(ph < 2.9 || ph > 4.6) return "alert-critical";
        if(ph < 3.1 || ph > 4.3) return "alert-warning";
        return "alert-ok";
      }

      if(kind === "temp"){
        const temp = parseNum(latest.temp);
        if(temp === null) return "alert-ok";
        if(temp < 5 || temp > 40) return "alert-critical";
        if(temp < 10 || temp > 30) return "alert-warning";
        return "alert-ok";
      }

      if(kind === "gravity"){
        const status = getStatus(topBatch);
        if(status.key === "critical") return "alert-critical";
        if(status.key === "slow") return "alert-warning";
        return "alert-ok";
      }

      if(kind === "count"){
        return batches.length > 0 ? "alert-ok" : "alert-warning";
      }

      return "alert-ok";
    }

    function matchesArchiveFilters(b){
      const status = getStatus(b);
      const search = archiveSearch.trim().toLowerCase();

      if(archiveTypeFilter){
        const typeValue = String(b.type || "").toLowerCase();
        if(typeValue !== archiveTypeFilter.toLowerCase()) return false;
      }

      if(archiveStatusFilter){
        if(status.key !== archiveStatusFilter) return false;
      }

      if(search){
        const haystack = [
          b.name, b.type, b.culture, b.baseFermentable, b.nutrients, b.sugar, b.fruit,
          b.botanicals, b.dryAdjunct, b.otherAdditions, b.processNotes, b.sensoryNotes
        ].join(" ").toLowerCase();

        if(!haystack.includes(search)) return false;
      }

      return true;
    }

    function makePath(points, width, height, minVal, maxVal){
      if(points.length === 0) return "";
      if(points.length === 1){
        const y = height - ((points[0] - minVal) / (maxVal - minVal)) * height;
        return `M 10 ${y.toFixed(1)} L ${width - 10} ${y.toFixed(1)}`;
      }

      const usableW = width - 20;
      const usableH = height - 20;

      return points.map((val, idx) => {
        const x = 10 + (usableW / (points.length - 1)) * idx;
        const norm = (val - minVal) / (maxVal - minVal);
        const y = 10 + (usableH - (norm * usableH));
        return `${idx === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(" ");
    }

    function renderMiniChart(values, minVal, maxVal, color){
      const nums = values.map(v => parseNum(v)).filter(v => v !== null);
      const width = 280;
      const height = 120;
      const path = makePath(nums, width, height, minVal, maxVal);

      let dots = "";
      if(nums.length > 0){
        const usableW = width - 20;
        const usableH = height - 20;
        nums.forEach((val, idx) => {
          const x = nums.length === 1 ? width / 2 : 10 + (usableW / (nums.length - 1)) * idx;
          const norm = (val - minVal) / (maxVal - minVal);
          const y = 10 + (usableH - (norm * usableH));
          dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${color}" />`;
        });
      }

      return `
        <svg viewBox="0 0 280 120" preserveAspectRatio="none">
          <line x1="10" y1="10" x2="10" y2="110" stroke="rgba(255,255,255,.08)" />
          <line x1="10" y1="110" x2="270" y2="110" stroke="rgba(255,255,255,.08)" />
          <path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${dots}
        </svg>
      `;
    }

      const count = batches.length;
      const topBatch = getTopBatch();

      const topCountEl = document.getElementById("topCount");
      if(topCountEl) topCountEl.textContent = count;
      animateNeedle("needleCount", mapValue(count, 0, 20, -60, 60));

      if(topBatch){
        const latest = getLatestMeasurement(topBatch);
        const ph = latest ? latest.ph : "-";
        const gravity = latest ? latest.gravity : "-";
        const temp = latest ? latest.temp : "-";

        const phEl = document.getElementById("topPh");
        const gravityEl = document.getElementById("topGravity");
        const tempEl = document.getElementById("topTemp");

        if(phEl) phEl.textContent = formatValue(ph);
        if(gravityEl) gravityEl.textContent = formatValue(gravity);
        if(tempEl) tempEl.textContent = formatTemp(temp);

        animateNeedle("needlePh", mapValue(parseNum(ph) ?? 3.5, 2.8, 5.0, -60, 60));
        animateNeedle("needleGravity", mapValue(parseNum(gravity) ?? 1.000, 1.000, 1.060, -60, 60));
        animateNeedle("needleTemp", mapValue(parseNum(temp) ?? 0, 0, 50, -60, 60));
      } else {
        const phEl = document.getElementById("topPh");
        const gravityEl = document.getElementById("topGravity");
        const tempEl = document.getElementById("topTemp");

        if(phEl) phEl.textContent = "-";
        if(gravityEl) gravityEl.textContent = "-";
        if(tempEl) tempEl.textContent = "-";

        animateNeedle("needlePh", -60);
        animateNeedle("needleGravity", -60);
        animateNeedle("needleTemp", -60);
      }
    }

    function buildAllNumbers(){
      buildDialNumbers("numbersPh", [
        {label:"2.8", angle:-132},
        {label:"3.5", angle:-96},
        {label:"4.2", angle:-58},
        {label:"5.0", angle:-20}
      ]);

      buildDialNumbers("numbersGravity", [
        {label:"1.000", angle:-132},
        {label:"1.020", angle:-96},
        {label:"1.040", angle:-58},
        {label:"1.060", angle:-20}
      ]);

      buildDialNumbers("numbersTemp", [
        {label:"0", angle:-132},
        {label:"10", angle:-108},
        {label:"20", angle:-82},
        {label:"30", angle:-56},
        {label:"40", angle:-30},
        {label:"50", angle:-6}
      ]);

      buildDialNumbers("numbersCount", [
        {label:"0", angle:-132},
        {label:"5", angle:-100},
        {label:"10", angle:-66},
        {label:"15", angle:-34},
        {label:"20", angle:-4}
      ]);
    }

    function render(){
      document.documentElement.lang = appLang;
      const app = document.getElementById("appContent");
      const subtitle = document.getElementById("heroSubtitle");
      const langButton = document.getElementById("langButton");

      if(subtitle) subtitle.textContent = t("heroSubtitle");
      if(langButton) langButton.textContent = appLang === "en" ? "IT" : "EN";

      if(selectedBatchIndex === null){
        app.innerHTML = archiveHTML();
      } else {
        app.innerHTML = detailHTML(selectedBatchIndex);
      }

      buildTicks("ticksPh");
      buildTicks("ticksGravity");
      buildTicks("ticksTemp");
      buildTicks("ticksCount");
      buildAllNumbers();
      updateTopPanel();
    }

    function addBatch(){
      const name = prompt(t("batchNamePrompt"));
      if(!name) return;

      const type = prompt(t("typePrompt")) || t("typeUnknown");
      const culture = prompt(t("culturePrompt")) || "-";
      const baseFermentable = prompt(t("basePrompt")) || "-";
      const liters = prompt(t("litersPrompt")) || "-";
      const nutrients = prompt(t("nutrientsPrompt")) || "-";
      const sugar = prompt(t("sugarPrompt")) || "-";
      const fruit = prompt(t("fruitPrompt")) || "-";
      const botanicals = prompt(t("botanicalsPrompt")) || "-";
      const dryAdjunct = prompt(t("dryAdjunctPrompt")) || "-";
      const otherAdditions = prompt(t("otherAdditionsPrompt")) || "-";
      const ph = prompt(t("initialPhPrompt")) || "-";
      const gravity = prompt(t("initialGravityPrompt")) || "-";
      const og = prompt(t("ogPrompt")) || gravity || "-";
      const temp = prompt(t("initialTempPrompt")) || "-";
      const pressure = prompt(t("initialPressurePrompt")) || "-";
      const targetPressure = prompt(t("targetPressurePrompt")) || "-";
      const processNotes = prompt(t("processNotesPrompt")) || "-";
      const sensoryNotes = prompt(t("sensoryNotesPrompt")) || "-";

      const createdAt = new Date().toISOString();

      batches.push({
        name,
        type,
        culture,
        baseFermentable,
        liters,
        nutrients,
        sugar,
        fruit,
        botanicals,
        dryAdjunct,
        otherAdditions,
        targetPressure,
        processNotes,
        sensoryNotes,
        og,
        createdAt,
        additionsLog: [],
        measurements: [{
          day: 1,
          ph,
          gravity,
          temp,
          pressure,
          createdAt
        }]
      });

      save();
      render();
    }

    function addMeasurement(i){
      const b = batches[i];
      const latest = getLatestMeasurement(b) || {};
      if(!Array.isArray(b.measurements)) b.measurements = [];

      const day = prompt(t("dayNumberPrompt"), String(getDay(b))) || String(getDay(b));
      const ph = prompt(t("phPrompt"), latest.ph || "-") || latest.ph || "-";
      const gravity = prompt(t("gravityPrompt"), latest.gravity || "-") || latest.gravity || "-";
      const temp = prompt(t("tempPrompt"), latest.temp || "-") || latest.temp || "-";
      const pressure = prompt(t("pressurePrompt"), latest.pressure || "-") || latest.pressure || "-";

      b.measurements.push({
        day,
        ph,
        gravity,
        temp,
        pressure,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function addAddition(i){
      const b = batches[i];
      ensureBatchFields(b);

      const day = prompt(t("additionDayPrompt"), String(getDay(b))) || String(getDay(b));
      const type = prompt(t("additionTypePrompt")) || "-";
      const ingredient = prompt(t("additionIngredientPrompt")) || "-";
      const quantity = prompt(t("additionQuantityPrompt")) || "-";
      const stage = prompt(t("additionStagePrompt")) || "-";
      const notes = prompt(t("additionNotesPrompt")) || "-";

      b.additionsLog.push({
        day,
        type,
        ingredient,
        quantity,
        stage,
        notes,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function editBatch(i){
      let b = batches[i];
      ensureBatchFields(b);

      b.name = prompt(t("editNamePrompt"), b.name) || b.name;
      b.type = prompt(t("editTypePrompt"), b.type) || b.type;
      b.culture = prompt(t("editCulturePrompt"), b.culture) || b.culture;
      b.baseFermentable = prompt(t("editBasePrompt"), b.baseFermentable) || b.baseFermentable;
      b.liters = prompt(t("editLitersPrompt"), b.liters) || b.liters;
      b.nutrients = prompt(t("editNutrientsPrompt"), b.nutrients) || b.nutrients;
      b.sugar = prompt(t("editSugarPrompt"), b.sugar) || b.sugar;
      b.fruit = prompt(t("editFruitPrompt"), b.fruit) || b.fruit;
      b.botanicals = prompt(t("editBotanicalsPrompt"), b.botanicals) || b.botanicals;
      b.dryAdjunct = prompt(t("editDryAdjunctPrompt"), b.dryAdjunct) || b.dryAdjunct;
      b.otherAdditions = prompt(t("editOtherAdditionsPrompt"), b.otherAdditions) || b.otherAdditions;
      b.og = prompt(t("editOGPrompt"), b.og) || b.og;
      b.targetPressure = prompt(t("editTargetPressurePrompt"), b.targetPressure) || b.targetPressure;
      b.processNotes = prompt(t("editProcessNotesPrompt"), b.processNotes) || b.processNotes;
      b.sensoryNotes = prompt(t("editSensoryNotesPrompt"), b.sensoryNotes) || b.sensoryNotes;

      save();
      render();
    }

    function deleteBatch(i){
      if(confirm(t("deleteConfirm"))){
        batches.splice(i, 1);
        selectedBatchIndex = null;
        save();
        render();
      }
    }

    function openBatch(i){
      selectedBatchIndex = i;
      render();
    }

    function backToArchive(){
      selectedBatchIndex = null;
      render();
    }

    render();
  </script>
</body>
</html>
