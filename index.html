<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#071629;
      --bg2:#081b2f;
      --card1:#10243a;
      --card2:#0b1b2c;
      --stroke:rgba(255,255,255,.06);
      --text:#f4f7fb;
      --muted:#95a8bb;
      --scale:#e6dcc5;
      --needle:#ff3b3b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(70,130,210,.16), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px 16px;
    }

    .app{
      width:min(430px,100%);
      text-align:center;
    }

    .title{
      font-size:28px;
      letter-spacing:6px;
      font-weight:300;
      margin-bottom:22px;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, var(--card1), var(--card2));
      border:1px solid var(--stroke);
      border-radius:30px;
      padding:28px 20px 26px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 20px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(16px);
    }

    svg{
      width:100%;
      max-width:320px;
      height:auto;
      display:block;
      margin:0 auto;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.35));
    }

    .value{
      margin-top:18px;
      font-size:64px;
      line-height:1;
      font-weight:200;
      letter-spacing:1px;
    }

    .sub{
      margin-top:10px;
      font-size:18px;
      color:var(--muted);
    }

    @media (max-width:480px){
      .title{font-size:24px;}
      .value{font-size:56px;}
      .sub{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">PH</div>

    <div class="card">
      <svg viewBox="0 0 320 320" aria-hidden="true">
        <defs>
          <radialGradient id="bezelGrad" cx="30%" cy="26%">
            <stop offset="0%" stop-color="#eef2f5"/>
            <stop offset="30%" stop-color="#a0a8b0"/>
            <stop offset="68%" stop-color="#4c5560"/>
            <stop offset="100%" stop-color="#232830"/>
          </radialGradient>

          <radialGradient id="faceGrad" cx="42%" cy="38%">
            <stop offset="0%" stop-color="#20262d"/>
            <stop offset="58%" stop-color="#101419"/>
            <stop offset="100%" stop-color="#000000"/>
          </radialGradient>

          <radialGradient id="hubGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="38%" stop-color="#d6dce3"/>
            <stop offset="100%" stop-color="#686f78"/>
          </radialGradient>

          <filter id="blurShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8"/>
          </filter>

          <filter id="needleGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="4"/>
          </filter>
        </defs>

        <!-- ombra -->
        <ellipse cx="160" cy="166" rx="122" ry="122" fill="rgba(0,0,0,.34)" filter="url(#blurShadow)"/>

        <!-- ghiera -->
        <circle cx="160" cy="160" r="116" fill="url(#bezelGrad)"/>

        <!-- quadrante -->
        <circle cx="160" cy="160" r="102" fill="#0b1016"/>
        <circle cx="160" cy="160" r="98" fill="url(#faceGrad)"/>
        <circle cx="160" cy="160" r="97" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.2"/>

        <!-- riflessi vetro -->
        <ellipse cx="125" cy="122" rx="56" ry="24" fill="rgba(255,255,255,.07)" transform="rotate(-16 125 122)"/>
        <ellipse cx="205" cy="214" rx="24" ry="8" fill="rgba(255,255,255,.04)" transform="rotate(18 205 214)"/>

        <!-- arco scala -->
        <path d="M 56 208 A 106 106 0 0 1 264 208"
              fill="none"
              stroke="#e6dcc5"
              stroke-width="6"
              stroke-linecap="round"/>

        <!-- tacche grandi -->
        <g stroke="#e6dcc5" stroke-width="5" stroke-linecap="round">
          <line x1="66"  y1="202" x2="48"  y2="216"/>
          <line x1="106" y1="142" x2="90"  y2="130"/>
          <line x1="160" y1="120" x2="160" y2="98"/>
          <line x1="214" y1="142" x2="230" y2="130"/>
          <line x1="254" y1="202" x2="272" y2="216"/>
        </g>

        <!-- tacche piccole -->
        <g stroke="#e6dcc5" stroke-width="2.5" stroke-linecap="round">
          <line x1="82"  y1="175" x2="71"  y2="167"/>
          <line x1="95"  y1="156" x2="84"  y2="147"/>
          <line x1="121" y1="130" x2="115" y2="117"/>
          <line x1="141" y1="122" x2="138" y2="108"/>
          <line x1="179" y1="122" x2="182" y2="108"/>
          <line x1="199" y1="130" x2="205" y2="117"/>
          <line x1="225" y1="156" x2="236" y2="147"/>
          <line x1="238" y1="175" x2="249" y2="167"/>
        </g>

        <!-- numeri: messi a mano nei punti giusti -->
        <g fill="#e6dcc5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">
          <text x="78"  y="228">2.8</text>
          <text x="106" y="112">3.5</text>
          <text x="214" y="112">4.2</text>
          <text x="242" y="228">5.0</text>
        </g>

        <!-- glow lancetta -->
        <line x1="160" y1="160" x2="92" y2="102"
              stroke="rgba(255,59,59,.35)" stroke-width="10" stroke-linecap="round"
              filter="url(#needleGlow)"/>

        <!-- lancetta -->
        <line x1="160" y1="160" x2="92" y2="102"
              stroke="#ff3b3b" stroke-width="5" stroke-linecap="round"/>
        <line x1="161.5" y1="158.5" x2="93.5" y2="100.5"
              stroke="#ffd0d0" stroke-width="1.6" stroke-linecap="round" opacity=".85"/>

        <!-- centro -->
        <circle cx="160" cy="160" r="10" fill="url(#hubGrad)"/>
      </svg>

      <div class="value">3.50</div>
      <div class="sub">ultima misurazione</div>
    </div>
  </div>
</body>
</html>
