<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#07101a;
      --text:#f2f6fa;
      --muted:#aab7c4;
      --blue:#69b8ff;
      --green:#62f2a2;
      --orange:#ffb25c;
      --purple:#c17aff;
      --panel:#0b1218;
      --panel2:#081018;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(45,102,160,.14), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    body{
      padding:20px 14px 34px;
    }

    .app{
      max-width:1080px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:12px;
    }

    .lang-btn{
      border:none;
      border-radius:16px;
      padding:10px 14px;
      font-size:14px;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(155,173,190,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #3d5f7d, #2b445a);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 0 12px rgba(70,140,220,.16);
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:86px;
      height:86px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      font-weight:700;
      color:#eef5fb;
      background:
        linear-gradient(145deg, rgba(150,166,180,.28), rgba(58,68,79,.12)),
        linear-gradient(180deg, #16202b, #0a1118);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 0 22px rgba(70,140,220,.12);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
      letter-spacing:.2px;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--muted);
      line-height:1.35;
    }

    .dashboard,
    .empty,
    .batch-card,
    .detail-card,
    .chart-card,
    .measurements,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card{
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.10);
      border-radius:24px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 24px rgba(0,110,210,.10);
    }

    .dashboard{
      padding:18px;
      margin-bottom:20px;
    }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .gauge-card{
      border-radius:28px;
      padding:14px 12px 16px;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.03), transparent 40%),
        linear-gradient(180deg, #0b131c, #081018);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 18px rgba(20,90,180,.08);
      text-align:center;
      min-width:0;
    }

    .g-label{
      font-size:11px;
      letter-spacing:4px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .dial{
      width:136px;
      height:136px;
      margin:0 auto 10px;
      border-radius:50%;
      position:relative;
      background:
        radial-gradient(circle at center, #02070d 0 36%, #08111a 36% 56%, #0d1823 56% 100%);
      border:2px solid rgba(200,220,240,.08);
      box-shadow:
        inset 0 2px 10px rgba(255,255,255,.04),
        inset 0 -6px 14px rgba(0,0,0,.45),
        0 0 22px rgba(0,100,200,.08);
      overflow:hidden;
    }

    .dial::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.05);
    }

    .dial::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.08);
      opacity:.8;
    }

    .ticks{
      position:absolute;
      inset:0;
      border-radius:50%;
    }

    .tick{
      position:absolute;
      left:50%;
      top:8px;
      width:2px;
      height:12px;
      margin-left:-1px;
      border-radius:2px;
      opacity:.9;
      transform-origin:50% 60px;
    }

    .tick.small{
      height:8px;
      top:10px;
      opacity:.5;
    }

    .needle{
      position:absolute;
      left:50%;
      bottom:50%;
      width:4px;
      height:52px;
      transform-origin:bottom center;
      transform:translateX(-50%) rotate(-60deg);
      border-radius:4px;
      z-index:3;
      transition:transform .45s ease;
    }

    .needle::after{
      content:"";
      position:absolute;
      bottom:-9px;
      left:50%;
      width:18px;
      height:18px;
      margin-left:-9px;
      border-radius:50%;
      background:#dbeffc;
      box-shadow:0 0 10px rgba(180,220,255,.25);
    }

    .ph .needle{
      background:linear-gradient(180deg, #aaffcf, var(--green));
      box-shadow:0 0 14px rgba(98,242,162,.34);
    }

    .gravity .needle{
      background:linear-gradient(180deg, #d2ebff, var(--blue));
      box-shadow:0 0 14px rgba(105,184,255,.34);
    }

    .temp .needle{
      background:linear-gradient(180deg, #ffe0b8, #ffb25c);
      box-shadow:0 0 14px rgba(255,178,92,.34);
    }

    .count .needle{
      background:linear-gradient(180deg, #edd2ff, var(--purple));
      box-shadow:0 0 14px rgba(193,122,255,.34);
    }

    .ph .tick{ background:rgba(98,242,162,.65); }
    .gravity .tick{ background:rgba(105,184,255,.65); }
    .temp .tick{ background:rgba(255,178,92,.65); }
    .count .tick{ background:rgba(193,122,255,.65); }

    .g-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .g-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.25;
    }

    .main-btn,
    .nav-btn,
    .small-btn,
    .template-btn{
      border:none;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(155,173,190,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #3d5f7d, #2b445a);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 0 20px rgba(70,140,220,.16);
    }

    .main-btn{
      width:100%;
      border-radius:24px;
      padding:18px;
      font-size:22px;
      margin-bottom:12px;
    }

    .nav-btn{
      width:100%;
      border-radius:20px;
      padding:14px;
      font-size:16px;
      margin-bottom:14px;
    }

    .small-btn,
    .template-btn{
      border-radius:18px;
      padding:14px 12px;
      font-size:15px;
      width:100%;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
      line-height:1.3;
    }

    .section-title{
      margin:18px 0 12px;
      color:#dce8f3;
      font-size:13px;
      letter-spacing:5px;
      text-transform:uppercase;
    }

    .empty,
    .batch-card,
    .detail-card,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card{
      padding:18px;
      margin-bottom:14px;
    }

    .empty{
      color:var(--muted);
      text-align:center;
      line-height:1.4;
    }

    .batch-card{
      cursor:pointer;
    }

    .batch-top,
    .detail-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .batch-name,
    .detail-name{
      font-size:26px;
      font-weight:700;
      line-height:1.05;
      word-break:break-word;
    }

    .right-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    .type-badge,
    .status-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid rgba(164,185,203,.12);
    }

    .type-badge{
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
    }

    .status-active{
      color:#dbffe9;
      background:linear-gradient(180deg, rgba(78,160,112,.22), rgba(30,87,52,.20));
    }

    .status-slow{
      color:#fff4d1;
      background:linear-gradient(180deg, rgba(185,142,44,.24), rgba(108,78,18,.20));
    }

    .status-critical{
      color:#ffe0e0;
      background:linear-gradient(180deg, rgba(170,66,66,.24), rgba(100,30,30,.20));
    }

    .status-complete{
      color:#e0f1ff;
      background:linear-gradient(180deg, rgba(58,110,170,.24), rgba(29,57,94,.20));
    }

    .metrics,
    .process-grid,
    .templates-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .metric,
    .process-item{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:84px;
      min-width:0;
    }

    .metric-label,
    .process-label,
    .templates-title,
    .chart-title,
    .measurements-title,
    .process-title,
    .additions-title,
    .filters-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
      margin-bottom:10px;
      line-height:1.25;
      word-break:break-word;
    }

    .metric-value,
    .process-value{
      font-size:20px;
      font-weight:700;
      line-height:1.25;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .detail-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .chart-card,
    .measurements{
      padding:14px 12px;
      margin-bottom:12px;
    }

    .chart-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-chart{
      background:linear-gradient(180deg, #0b131b, #081018);
      border:1px solid rgba(143,164,182,.08);
      border-radius:16px;
      padding:10px;
      min-width:0;
    }

    .mini-chart svg{
      width:100%;
      height:120px;
      display:block;
    }

    .legend{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.25;
    }

    .template-btn{
      text-align:left;
      min-height:92px;
    }

    .template-name{
      display:block;
      font-size:17px;
      font-weight:700;
      margin-bottom:6px;
      word-break:break-word;
    }

    .template-desc{
      display:block;
      font-size:12px;
      color:#d8e6f3;
      opacity:.9;
      line-height:1.35;
      word-break:break-word;
    }

    .filters-grid{
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:10px;
    }

    .filter-input,
    .filter-select{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d1620;
      color:#eef6fd;
      font-size:14px;
      outline:none;
      min-width:0;
    }

    /* TABELLE MOBILE-SAFE */
    .table-wrap{
      width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      vertical-align:top;
      text-align:left;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    th{
      color:#dfeaf5;
      font-weight:700;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1.2px;
      line-height:1.2;
    }

    td{
      font-size:14px;
      line-height:1.35;
    }

    tr:last-child td{
      border-bottom:none;
    }

    .muted{
      color:var(--muted);
    }

    .measure-table th:nth-child(1),
    .measure-table td:nth-child(1){ width:14%; }

    .measure-table th:nth-child(2),
    .measure-table td:nth-child(2){ width:18%; }

    .measure-table th:nth-child(3),
    .measure-table td:nth-child(3){ width:22%; }

    .measure-table th:nth-child(4),
    .measure-table td:nth-child(4){ width:20%; }

    .measure-table th:nth-child(5),
    .measure-table td:nth-child(5){ width:26%; }

    .additions-table th:nth-child(1),
    .additions-table td:nth-child(1){ width:12%; }

    .additions-table th:nth-child(2),
    .additions-table td:nth-child(2){ width:18%; }

    .additions-table th:nth-child(3),
    .additions-table td:nth-child(3){ width:20%; }

    .additions-table th:nth-child(4),
    .additions-table td:nth-child(4){ width:14%; }

    .additions-table th:nth-child(5),
    .additions-table td:nth-child(5){ width:16%; }

    .additions-table th:nth-child(6),
    .additions-table td:nth-child(6){ width:20%; }

    @media (max-width:900px){
      .filters-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:700px){
      .chart-box,
      .templates-grid,
      .detail-actions{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      body{
        padding:16px 10px 28px;
      }

      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        font-size:34px;
        border-radius:22px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .gauges{
        grid-template-columns:1fr;
      }

      .dial{
        width:120px;
        height:120px;
      }

      .g-value{
        font-size:28px;
      }

      .batch-top,
      .detail-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .right-stack{
        align-items:flex-start;
      }

      .batch-name,
      .detail-name{
        font-size:22px;
      }

      .metrics,
      .process-grid{
        grid-template-columns:1fr;
      }

      th{
        font-size:11px;
        letter-spacing:1px;
        padding:10px 8px;
      }

      td{
        font-size:13px;
        padding:10px 8px;
      }

      .measure-table{
        min-width:520px;
      }

      .additions-table{
        min-width:700px;
      }
    }
  </style>
</head>

    function t(key){
      return (i18n[appLang] && i18n[appLang][key]) || key;
    }

    function toggleLanguage(){
      appLang = appLang === "en" ? "it" : "en";
      localStorage.setItem("xa_lang", appLang);
      document.documentElement.lang = appLang;
      render();
    }

    function save(){
      localStorage.setItem("batches", JSON.stringify(batches));
    }

    function formatTemp(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + "°C";
    }

    function formatPressure(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + " bar";
    }

    function formatValue(v){
      if(v === undefined || v === null || v === "") return "-";
      return v;
    }

    function parseNum(v){
      const n = parseFloat(String(v).replace(",", "."));
      return isNaN(n) ? null : n;
    }

    function mapValue(value, inMin, inMax, outMin, outMax){
      if(isNaN(value)) return outMin;
      if(value < inMin) value = inMin;
      if(value > inMax) value = inMax;
      return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }

    function setNeedle(id, deg){
      const el = document.getElementById(id);
      if(el) el.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }

    function buildTicks(containerId){
      const box = document.getElementById(containerId);
      if(!box) return;
      box.innerHTML = "";
      for(let i=0;i<=12;i++){
        const tick = document.createElement("div");
        tick.className = "tick" + ((i % 2 === 0) ? "" : " small");
        tick.style.transform = `rotate(${-60 + i * 10}deg)`;
        box.appendChild(tick);
      }
    }

    function getDay(b){
      if(!b.createdAt) return "-";
      const start = new Date(b.createdAt);
      const now = new Date();
      return Math.max(1, Math.floor((now - start) / 86400000) + 1);
    }

    function ensureBatchFields(b){
      if(!b.baseFermentable) b.baseFermentable = "-";
      if(!b.liters) b.liters = "-";
      if(!b.nutrients) b.nutrients = "-";
      if(!b.sugar) b.sugar = "-";
      if(!b.fruit) b.fruit = "-";
      if(!b.botanicals) b.botanicals = "-";
      if(!b.dryAdjunct) b.dryAdjunct = "-";
      if(!b.otherAdditions) b.otherAdditions = "-";
      if(!b.targetPressure) b.targetPressure = "-";
      if(!b.processNotes) b.processNotes = "-";
      if(!b.sensoryNotes) b.sensoryNotes = "-";
      if(!Array.isArray(b.measurements)) b.measurements = [];
      if(!Array.isArray(b.additionsLog)) b.additionsLog = [];
    }

    function getMeasurements(b){
      ensureBatchFields(b);
      return b.measurements;
    }

    function getLatestMeasurement(b){
      const list = getMeasurements(b);
      if(list.length === 0) return null;
      return list[list.length - 1];
    }

    function getABV(b){
      const og = parseNum(b.og);
      const latest = getLatestMeasurement(b);
      const fg = latest ? parseNum(latest.gravity) : null;
      if(og === null || fg === null) return "-";
      return ((og - fg) * 131).toFixed(2) + "%";
    }

    function getStatus(b){
      const latest = getLatestMeasurement(b);
      const og = parseNum(b.og);
      const current = latest ? parseNum(latest.gravity) : null;
      const temp = latest ? parseNum(latest.temp) : null;
      const ph = latest ? parseNum(latest.ph) : null;

      if(temp !== null && (temp < 5 || temp > 40)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };
      if(ph !== null && (ph < 2.8 || ph > 4.6)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };

      if(og !== null && current !== null){
        const diff = og - current;
        if(diff >= 0.030) return { text:t("statusComplete"), cls:"status-complete", key:"complete" };
        if(diff >= 0.010) return { text:t("statusActive"), cls:"status-active", key:"active" };
        return { text:t("statusSlow"), cls:"status-slow", key:"slow" };
      }

      return { text:t("statusActive"), cls:"status-active", key:"active" };
    }

    function matchesArchiveFilters(b){
      const status = getStatus(b);
      const search = archiveSearch.trim().toLowerCase();

      if(archiveTypeFilter){
        const typeValue = String(b.type || "").toLowerCase();
        if(typeValue !== archiveTypeFilter.toLowerCase()) return false;
      }

      if(archiveStatusFilter){
        if(status.key !== archiveStatusFilter) return false;
      }

      if(search){
        const haystack = [
          b.name, b.type, b.culture, b.baseFermentable, b.nutrients, b.sugar, b.fruit,
          b.botanicals, b.dryAdjunct, b.otherAdditions, b.processNotes, b.sensoryNotes
        ].join(" ").toLowerCase();

        if(!haystack.includes(search)) return false;
      }

      return true;
    }

    function makePath(points, width, height, minVal, maxVal){
      if(points.length === 0) return "";
      if(points.length === 1){
        const y = height - ((points[0] - minVal) / (maxVal - minVal)) * height;
        return `M 10 ${y.toFixed(1)} L ${width - 10} ${y.toFixed(1)}`;
      }

      const usableW = width - 20;
      const usableH = height - 20;

      return points.map((val, idx) => {
        const x = 10 + (usableW / (points.length - 1)) * idx;
        const norm = (val - minVal) / (maxVal - minVal);
        const y = 10 + (usableH - (norm * usableH));
        return `${idx === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(" ");
    }

    function renderMiniChart(values, minVal, maxVal, color){
      const nums = values.map(v => parseNum(v)).filter(v => v !== null);
      const width = 280;
      const height = 120;
      const path = makePath(nums, width, height, minVal, maxVal);

      let dots = "";
      if(nums.length > 0){
        const usableW = width - 20;
        const usableH = height - 20;
        nums.forEach((val, idx) => {
          const x = nums.length === 1 ? width / 2 : 10 + (usableW / (nums.length - 1)) * idx;
          const norm = (val - minVal) / (maxVal - minVal);
          const y = 10 + (usableH - (norm * usableH));
          dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${color}" />`;
        });
      }

      return `
        <svg viewBox="0 0 280 120" preserveAspectRatio="none">
          <line x1="10" y1="10" x2="10" y2="110" stroke="rgba(255,255,255,.08)" />
          <line x1="10" y1="110" x2="270" y2="110" stroke="rgba(255,255,255,.08)" />
          <path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${dots}
        </svg>
      `;
    }

      const list = [...getMeasurements(b)].reverse();
      if(list.length === 0){

              <div class="g-sub">${t("stored")}</div>
            </div>
          </div>

          ${selectedBatchIndex === null
            ? `<button class="main-btn" onclick="addBatch()">${t("newBatch")}</button>
               <div class="hint">${t("tapBatchOpen")}</div>`
            : `<button class="nav-btn" onclick="backToArchive()">${t("backArchive")}</button>
               <div class="hint">${t("dashboardSelected")}</div>`
          }
        </div>
      `;
    }

    function archiveHTML(){
      let html = dashboardHTML();
      html += templatesHTML();
      html += filtersHTML();
      html += `<div class="section-title">${t("archive")}</div>`;

      const filtered = batches.filter(matchesArchiveFilters);

      if(batches.length === 0){
        html += `<div class="empty">${t("noBatches")}</div>`;
      } else if(filtered.length === 0){
        html += `<div class="empty">${t("noFilteredBatches")}</div>`;
      } else {
        filtered.forEach((b) => {
          const i = batches.indexOf(b);
          ensureBatchFields(b);
          const status = getStatus(b);
          const latest = getLatestMeasurement(b);

          html += `
            <div class="batch-card" onclick="openBatch(${i})">
              <div class="batch-top">
                <div class="batch-name">${b.name || "Unnamed"}</div>
                <div class="right-stack">
                  <div class="type-badge">${(b.type || t("typeUnknown")).toUpperCase()}</div>
                  <div class="status-badge ${status.cls}">${status.text}</div>
                </div>
              </div>

              <div class="metrics">
                <div class="metric">
                  <div class="metric-label">${t("day")}</div>
                  <div class="metric-value">${getDay(b)}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("culture")}</div>
                  <div class="metric-value">${formatValue(b.culture)}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("latestPh")}</div>
                  <div class="metric-value">${latest ? formatValue(latest.ph) : "-"}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("latestGravity")}</div>
                  <div class="metric-value">${latest ? formatValue(latest.gravity) : "-"}</div>
                </div>
              </div>
            </div>
          `;
        });
      }

      return html;
    }

    function detailHTML(i){
      const b = batches[i];
      if(!b) return archiveHTML();

      ensureBatchFields(b);
      const status = getStatus(b);
      const latest = getLatestMeasurement(b);
      const measures = getMeasurements(b);
      const phValues = measures.map(m => m.ph);
      const gravityValues = measures.map(m => m.gravity);

      return `
        ${dashboardHTML()}

        <div class="section-title">${t("batchDetail")}</div>

        <div class="detail-card">
          <div class="detail-top">
            <div class="detail-name">${b.name || "Unnamed"}</div>
            <div class="right-stack">
              <div class="type-badge">${(b.type || t("typeUnknown")).toUpperCase()}</div>
              <div class="status-badge ${status.cls}">${status.text}</div>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">${t("day")}</div>
              <div class="metric-value">${getDay(b)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("culture")}</div>
              <div class="metric-value">${formatValue(b.culture)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("og")}</div>
              <div class="metric-value">${formatValue(b.og)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("abv")}</div>
              <div class="metric-value">${getABV(b)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestPh")}</div>
              <div class="metric-value">${latest ? formatValue(latest.ph) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestGravity")}</div>
              <div class="metric-value">${latest ? formatValue(latest.gravity) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestTemp")}</div>
              <div class="metric-value">${latest ? formatTemp(latest.temp) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestPressure")}</div>
              <div class="metric-value">${latest ? formatPressure(latest.pressure) : "-"}</div>
            </div>
          </div>

          <div class="detail-actions">
            <button class="small-btn" onclick="addMeasurement(${i})">${t("addMeasurement")}</button>
            <button class="small-btn" onclick="addAddition(${i})">${t("addAddition")}</button>
            <button class="small-btn" onclick="editBatch(${i})">${t("editBatch")}</button>
          </div>

          <div class="detail-actions" style="margin-top:-4px;">
            <button class="small-btn" onclick="deleteBatch(${i})">${t("deleteBatch")}</button>
          </div>

          <div class="chart-card">
            <div class="chart-title">${t("labCharts")}</div>
            <div class="chart-box">
              <div class="mini-chart">
                ${renderMiniChart(phValues, 0, 7, "#62f2a2")}
                <div class="legend">${t("phTrend")}</div>
              </div>
              <div class="mini-chart">
                ${renderMiniChart(gravityValues, 1.000, 1.080, "#69b8ff")}
                <div class="legend">${t("gravityTrend")}</div>
              </div>
            </div>
          </div>

          <div class="process-card">
            <div class="process-title">${t("processIngredients")}</div>
            <div class="process-grid">
              <div class="process-item">
                <div class="process-label">${t("baseFermentable")}</div>
                <div class="process-value">${formatValue(b.baseFermentable)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("liters")}</div>
                <div class="process-value">${formatValue(b.liters)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("nutrients")}</div>
                <div class="process-value">${formatValue(b.nutrients)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("sugar")}</div>
                <div class="process-value">${formatValue(b.sugar)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("fruit")}</div>
                <div class="process-value">${formatValue(b.fruit)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("botanicals")}</div>
                <div class="process-value">${formatValue(b.botanicals)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("dryAdjunct")}</div>
                <div class="process-value">${formatValue(b.dryAdjunct)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("otherAdditions")}</div>
                <div class="process-value">${formatValue(b.otherAdditions)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("targetPressure")}</div>
                <div class="process-value">${formatValue(b.targetPressure)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("processNotes")}</div>
                <div class="process-value">${formatValue(b.processNotes)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("sensoryNotes")}</div>
                <div class="process-value">${formatValue(b.sensoryNotes)}</div>
              </div>
            </div>
          </div>

          <div class="additions-card">
            <div class="additions-title">${t("additionsLog")}</div>
            ${additionsTable(b)}
          </div>

          <div class="measurements">
            <div class="measurements-title">${t("dailyMeasurements")}</div>
            ${measurementTable(b)}
          </div>
        </div>
      `;
    }

    function updateTopPanel(){
      const count = batches.length;
      const topBatch = getTopBatch();

      const topCountEl = document.getElementById("topCount");
      if(topCountEl) topCountEl.textContent = count;
      setNeedle("needleCount", mapValue(count, 0, 20, -60, 60));

      if(topBatch){
        const latest = getLatestMeasurement(topBatch);
        const ph = latest ? latest.ph : "-";
        const gravity = latest ? latest.gravity : "-";
        const temp = latest ? latest.temp : "-";

        const phEl = document.getElementById("topPh");
        const gravityEl = document.getElementById("topGravity");
        const tempEl = document.getElementById("topTemp");

        if(phEl) phEl.textContent = formatValue(ph);
        if(gravityEl) gravityEl.textContent = formatValue(gravity);
        if(tempEl) tempEl.textContent = formatTemp(temp);

        setNeedle("needlePh", mapValue(parseNum(ph) ?? 0, 0, 7, -60, 60));
        setNeedle("needleGravity", mapValue(parseNum(gravity) ?? 1.000, 1.080, -60, 60));
        setNeedle("needleTemp", mapValue(parseNum(temp) ?? 0, 0, 50, -60, 60));
      } else {
        const phEl = document.getElementById("topPh");
        const gravityEl = document.getElementById("topGravity");
        const tempEl = document.getElementById("topTemp");

        if(phEl) phEl.textContent = "-";
        if(gravityEl) gravityEl.textContent = "-";
        if(tempEl) tempEl.textContent = "-";

        setNeedle("needlePh", -60);
        setNeedle("needleGravity", -60);
        setNeedle("needleTemp", -60);
      }
    }

    function render(){
      document.documentElement.lang = appLang;
      const app = document.getElementById("appContent");
      const subtitle = document.getElementById("heroSubtitle");
      const langButton = document.getElementById("langButton");

      if(subtitle) subtitle.textContent = t("heroSubtitle");
      if(langButton) langButton.textContent = appLang === "en" ? "IT" : "EN";

      if(selectedBatchIndex === null){
        app.innerHTML = archiveHTML();
      } else {
        app.innerHTML = detailHTML(selectedBatchIndex);
      }

      buildTicks("ticksPh");
      buildTicks("ticksGravity");
      buildTicks("ticksTemp");
      buildTicks("ticksCount");
      updateTopPanel();
    }

    function addBatch(){
      const name = prompt(t("batchNamePrompt"));
      if(!name) return;

      const type = prompt(t("typePrompt")) || t("typeUnknown");
      const culture = prompt(t("culturePrompt")) || "-";
      const baseFermentable = prompt(t("basePrompt")) || "-";
      const liters = prompt(t("litersPrompt")) || "-";
      const nutrients = prompt(t("nutrientsPrompt")) || "-";
      const sugar = prompt(t("sugarPrompt")) || "-";
      const fruit = prompt(t("fruitPrompt")) || "-";
      const botanicals = prompt(t("botanicalsPrompt")) || "-";
      const dryAdjunct = prompt(t("dryAdjunctPrompt")) || "-";
      const otherAdditions = prompt(t("otherAdditionsPrompt")) || "-";
      const ph = prompt(t("initialPhPrompt")) || "-";
      const gravity = prompt(t("initialGravityPrompt")) || "-";
      const og = prompt(t("ogPrompt")) || gravity || "-";
      const temp = prompt(t("initialTempPrompt")) || "-";
      const pressure = prompt(t("initialPressurePrompt")) || "-";
      const targetPressure = prompt(t("targetPressurePrompt")) || "-";
      const processNotes = prompt(t("processNotesPrompt")) || "-";
      const sensoryNotes = prompt(t("sensoryNotesPrompt")) || "-";

      const createdAt = new Date().toISOString();

      batches.push({
        name,
        type,
        culture,
        baseFermentable,
        liters,
        nutrients,
        sugar,
        fruit,
        botanicals,
        dryAdjunct,
        otherAdditions,
        targetPressure,
        processNotes,
        sensoryNotes,
        og,
        createdAt,
        additionsLog: [],
        measurements: [{
          day: 1,
          ph,
          gravity,
          temp,
          pressure,
          createdAt
        }]
      });

      save();
      render();
    }

    function addMeasurement(i){
      const b = batches[i];
      const latest = getLatestMeasurement(b) || {};
      if(!Array.isArray(b.measurements)) b.measurements = [];

      const day = prompt(t("dayNumberPrompt"), String(getDay(b))) || String(getDay(b));
      const ph = prompt(t("phPrompt"), latest.ph || "-") || latest.ph || "-";
      const gravity = prompt(t("gravityPrompt"), latest.gravity || "-") || latest.gravity || "-";
      const temp = prompt(t("tempPrompt"), latest.temp || "-") || latest.temp || "-";
      const pressure = prompt(t("pressurePrompt"), latest.pressure || "-") || latest.pressure || "-";

      b.measurements.push({
        day,
        ph,
        gravity,
        temp,
        pressure,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function addAddition(i){
      const b = batches[i];
      ensureBatchFields(b);

      const day = prompt(t("additionDayPrompt"), String(getDay(b))) || String(getDay(b));
      const type = prompt(t("additionTypePrompt")) || "-";
      const ingredient = prompt(t("additionIngredientPrompt")) || "-";
      const quantity = prompt(t("additionQuantityPrompt")) || "-";
      const stage = prompt(t("additionStagePrompt")) || "-";
      const notes = prompt(t("additionNotesPrompt")) || "-";

      b.additionsLog.push({
        day,
        type,
        ingredient,
        quantity,
        stage,
        notes,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function editBatch(i){
      let b = batches[i];
      ensureBatchFields(b);

      b.name = prompt(t("editNamePrompt"), b.name) || b.name;
      b.type = prompt(t("editTypePrompt"), b.type) || b.type;
      b.culture = prompt(t("editCulturePrompt"), b.culture) || b.culture;
      b.baseFermentable = prompt(t("editBasePrompt"), b.baseFermentable) || b.baseFermentable;
      b.liters = prompt(t("editLitersPrompt"), b.liters) || b.liters;
      b.nutrients = prompt(t("editNutrientsPrompt"), b.nutrients) || b.nutrients;
      b.sugar = prompt(t("editSugarPrompt"), b.sugar) || b.sugar;
      b.fruit = prompt(t("editFruitPrompt"), b.fruit) || b.fruit;
      b.botanicals = prompt(t("editBotanicalsPrompt"), b.botanicals) || b.botanicals;
      b.dryAdjunct = prompt(t("editDryAdjunctPrompt"), b.dryAdjunct) || b.dryAdjunct;
      b.otherAdditions = prompt(t("editOtherAdditionsPrompt"), b.otherAdditions) || b.otherAdditions;
      b.og = prompt(t("editOGPrompt"), b.og) || b.og;
      b.targetPressure = prompt(t("editTargetPressurePrompt"), b.targetPressure) || b.targetPressure;
      b.processNotes = prompt(t("editProcessNotesPrompt"), b.processNotes) || b.processNotes;
      b.sensoryNotes = prompt(t("editSensoryNotesPrompt"), b.sensoryNotes) || b.sensoryNotes;

      save();
      render();
    }

    function deleteBatch(i){
      if(confirm(t("deleteConfirm"))){
        batches.splice(i, 1);
        selectedBatchIndex = null;
        save();
        render();
      }
    }

    function openBatch(i){
      selectedBatchIndex = i;
      render();
    }

    function backToArchive(){
      selectedBatchIndex = null;
      render();
    }

    render();
  </script>
</body>
</html>
