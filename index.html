<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XA Fermentation</title>

<style>
:root{
  --bg1:#071629;
  --bg2:#081b2f;
  --card1:#10243a;
  --card2:#0b1b2c;
  --text:#f4f7fb;
  --muted:#95a8bb;
}

body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  color:white;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}

.card{
  text-align:center;
  padding:30px;
  border-radius:20px;
  background:linear-gradient(180deg,var(--card1),var(--card2));
}

svg{
  width:260px;
  cursor:pointer;
}

.value{
  font-size:60px;
  margin-top:10px;
}

input{
  margin-top:15px;
  padding:10px;
  font-size:18px;
  width:120px;
  text-align:center;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  font-size:16px;
  border-radius:10px;
  border:none;
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<div class="card">
<h2>PH</h2>

<svg viewBox="0 0 200 120">
  <line id="needle" x1="100" y1="100" x2="100" y2="30"
        stroke="red" stroke-width="4" stroke-linecap="round"/>
</svg>

<div class="value" id="val">3.50</div>

<input id="inputPH" type="number" step="0.01" placeholder="3.50">
<br>
<button onclick="setPH()">SET</button>

</div>

<script>
const min = 2.8;
const max = 5.0;

let current = 3.5;

function valueToAngle(v){
  const ratio = (v-min)/(max-min);
  return -90 + ratio*180;
}

function draw(v){
  const angle = valueToAngle(v);
  document.getElementById("needle")
    .setAttribute("transform","rotate("+angle+" 100 100)");
  document.getElementById("val").innerText = v.toFixed(2);
}

function animate(target){
  let start = current;
  let t = 0;

  function step(){
    t+=0.05;
    let v = start + (target-start)*t;
    draw(v);

    if(t<1) requestAnimationFrame(step);
    else current = target;
  }
  step();
}

function setPH(){
  let v = parseFloat(document.getElementById("inputPH").value);
  if(isNaN(v)) return;

  v = Math.max(min, Math.min(max, v));
  animate(v);
}

draw(current);
</script>

</body>
</html>
