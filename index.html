<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#07101a;
      --text:#f2f6fa;
      --muted:#aab7c4;
      --blue:#69b8ff;
      --green:#62f2a2;
      --orange:#ffb25c;
      --purple:#c17aff;
      --red:#ff7e7e;
      --yellow:#ffd36b;
      --panel:#0b1218;
      --panel2:#081018;
      --card1:#09111a;
      --card2:#060d15;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(45,102,160,.14), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:20px 16px 34px;
    }

    .app{
      max-width:860px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:86px;
      height:86px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      font-weight:700;
      color:#eef5fb;
      background:
        linear-gradient(145deg, rgba(150,166,180,.28), rgba(58,68,79,.12)),
        linear-gradient(180deg, #16202b, #0a1118);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 0 22px rgba(70,140,220,.12);
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
      letter-spacing:.2px;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--muted);
      line-height:1.35;
    }

    .dashboard{
      background:
        linear-gradient(180deg, rgba(130,145,160,.14), rgba(48,59,70,.10)),
        linear-gradient(180deg, var(--panel), var(--panel2));
      border:1px solid rgba(255,255,255,.08);
      border-radius:32px;
      padding:18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 28px rgba(30,100,190,.12);
      margin-bottom:20px;
    }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .gauge-card{
      border-radius:28px;
      padding:14px 12px 16px;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.03), transparent 40%),
        linear-gradient(180deg, #0b131c, #081018);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 18px rgba(20,90,180,.08);
      text-align:center;
    }

    .g-label{
      font-size:11px;
      letter-spacing:4px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .dial{
      width:136px;
      height:136px;
      margin:0 auto 10px;
      border-radius:50%;
      position:relative;
      background:
        radial-gradient(circle at center, #02070d 0 36%, #08111a 36% 56%, #0d1823 56% 100%);
      border:2px solid rgba(200,220,240,.08);
      box-shadow:
        inset 0 2px 10px rgba(255,255,255,.04),
        inset 0 -6px 14px rgba(0,0,0,.45),
        0 0 22px rgba(0,100,200,.08);
      overflow:hidden;
    }

    .dial::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.05);
    }

    .dial::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.08);
      opacity:.8;
    }

    .ticks{
      position:absolute;
      inset:0;
      border-radius:50%;
    }

    .tick{
      position:absolute;
      left:50%;
      top:8px;
      width:2px;
      height:12px;
      margin-left:-1px;
      border-radius:2px;
      opacity:.9;
      transform-origin:50% 60px;
    }

    .tick.small{
      height:8px;
      top:10px;
      opacity:.5;
    }

    .needle{
      position:absolute;
      left:50%;
      bottom:50%;
      width:4px;
      height:52px;
      transform-origin:bottom center;
      transform:translateX(-50%) rotate(-60deg);
      border-radius:4px;
      z-index:3;
      transition:transform .45s ease;
    }

    .needle::after{
      content:"";
      position:absolute;
      bottom:-9px;
      left:50%;
      width:18px;
      height:18px;
      margin-left:-9px;
      border-radius:50%;
      background:#dbeffc;
      box-shadow:0 0 10px rgba(180,220,255,.25);
    }

    .ph .needle{
      background:linear-gradient(180deg, #aaffcf, var(--green));
      box-shadow:0 0 14px rgba(98,242,162,.34);
    }

    .gravity .needle{
      background:linear-gradient(180deg, #d2ebff, var(--blue));
      box-shadow:0 0 14px rgba(105,184,255,.34);
    }

    .temp .needle{
      background:linear-gradient(180deg, #ffe0b8, var(--orange));
      box-shadow:0 0 14px rgba(255,178,92,.34);
    }

    .count .needle{
      background:linear-gradient(180deg, #edd2ff, var(--purple));
      box-shadow:0 0 14px rgba(193,122,255,.34);
    }

    .ph .tick{ background:rgba(98,242,162,.65); }
    .gravity .tick{ background:rgba(105,184,255,.65); }
    .temp .tick{ background:rgba(255,178,92,.65); }
    .count .tick{ background:rgba(193,122,255,.65); }

    .g-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .g-sub{
      font-size:12px;
      color:var(--muted);
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:24px;
      padding:18px;
      font-size:22px;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(155,173,190,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #3d5f7d, #2b445a);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 20px rgba(70,140,220,.16);
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
    }

    .section-title{
      margin:18px 0 12px;
      color:#dce8f3;
      font-size:13px;
      letter-spacing:5px;
      text-transform:uppercase;
    }

    .empty{
      background:
        linear-gradient(180deg, rgba(130,147,163,.10), rgba(47,58,68,.06)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.08);
      padding:20px;
      border-radius:24px;
      color:var(--muted);
      text-align:center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 20px rgba(0,110,210,.07);
    }

    .batch-card{
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.10);
      padding:18px;
      border-radius:24px;
      margin-bottom:14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 24px rgba(0,110,210,.10);
    }

    .batch-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .batch-name{
      font-size:26px;
      font-weight:700;
      line-height:1;
    }

    .right-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
    }

    .type-badge,
    .status-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid rgba(164,185,203,.12);
    }

    .type-badge{
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
    }

    .status-active{
      color:#dbffe9;
      background:linear-gradient(180deg, rgba(78,160,112,.22), rgba(30,87,52,.20));
    }

    .status-slow{
      color:#fff4d1;
      background:linear-gradient(180deg, rgba(185,142,44,.24), rgba(108,78,18,.20));
    }

    .status-critical{
      color:#ffe0e0;
      background:linear-gradient(180deg, rgba(170,66,66,.24), rgba(100,30,30,.20));
    }

    .status-complete{
      color:#e0f1ff;
      background:linear-gradient(180deg, rgba(58,110,170,.24), rgba(29,57,94,.20));
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .metric{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:84px;
    }

    .metric-label{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.3px;
      margin-bottom:8px;
    }

    .metric-value{
      font-size:20px;
      font-weight:700;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .small-btn{
      border:none;
      border-radius:18px;
      padding:14px 12px;
      font-size:15px;
      color:#eff7ff;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(130,150,170,.15), rgba(42,61,78,.10)),
        linear-gradient(180deg, #254055, #1a2e3f);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .chart-card{
      background:linear-gradient(180deg, #0e1721 0%, #0a1118 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:20px;
      padding:14px 12px;
      margin-bottom:12px;
    }

    .chart-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
      margin-bottom:10px;
    }

    .chart-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-chart{
      background:linear-gradient(180deg, #0b131b, #081018);
      border:1px solid rgba(143,164,182,.08);
      border-radius:16px;
      padding:10px;
    }

    .mini-chart svg{
      width:100%;
      height:120px;
      display:block;
    }

    .legend{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

    .measurements{
      background:linear-gradient(180deg, #0e1721 0%, #0a1118 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:20px;
      padding:14px 12px;
    }

    .measurements-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
      margin-bottom:10px;
    }

    .m-row{
      display:grid;
      grid-template-columns:70px 1fr 1fr 1fr;
      gap:8px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
    }

    .m-row:last-child{
      border-bottom:none;
    }

    .m-head{
      color:#dfeaf5;
      font-weight:700;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1.3px;
    }

    .m-muted{
      color:var(--muted);
    }

    @media (max-width:700px){
      .chart-box{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:78px;
        height:78px;
        font-size:36px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .dial{
        width:124px;
        height:124px;
      }

      .g-value{
        font-size:28px;
      }

      .batch-name{
        font-size:22px;
      }

      .m-row{
        grid-template-columns:58px 1fr 1fr 1fr;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Control panel for cider, tea ferments, lactic cultures and experimental batches</p>
      </div>
    </div>

    <div class="dashboard">
      <div class="gauges">

        <div class="gauge-card ph">
          <div class="g-label">PH</div>
          <div class="dial">
            <div class="ticks" id="ticksPh"></div>
            <div class="needle" id="needlePh"></div>
          </div>
          <div class="g-value" id="topPh">-</div>
          <div class="g-sub">latest measurement</div>
        </div>

        <div class="gauge-card gravity">
          <div class="g-label">GRAVITY</div>
          <div class="dial">
            <div class="ticks" id="ticksGravity"></div>
            <div class="needle" id="needleGravity"></div>
          </div>
          <div class="g-value" id="topGravity">-</div>
          <div class="g-sub">latest measurement</div>
        </div>

        <div class="gauge-card temp">
          <div class="g-label">TEMP</div>
          <div class="dial">
            <div class="ticks" id="ticksTemp"></div>
            <div class="needle" id="needleTemp"></div>
          </div>
          <div class="g-value" id="topTemp">-</div>
          <div class="g-sub">0–50°C scale</div>
        </div>

        <div class="gauge-card count">
          <div class="g-label">BATCHES</div>
          <div class="dial">
            <div class="ticks" id="ticksCount"></div>
            <div class="needle" id="needleCount"></div>
          </div>
          <div class="g-value" id="topCount">0</div>
          <div class="g-sub">stored</div>
        </div>

      </div>

      <button class="main-btn" onclick="addBatch()">+ New Batch</button>
      <div class="hint">Use the buttons inside each batch to add measurements, edit or delete</div>
    </div>

    <div class="section-title">Fermentation Archive</div>
    <div id="list"></div>

  </div>

  <script>
    let batches = JSON.parse(localStorage.getItem("batches")) || [];

    function save(){
      localStorage.setItem("batches", JSON.stringify(batches));
    }

    function formatTemp(t){
      if(t === undefined || t === null || t === "") return "-";
      return t + "°C";
    }

    function formatValue(v){
      if(v === undefined || v === null || v === "") return "-";
      return v;
    }

    function formatPressure(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + " bar";
    }

    function parseNum(v){
      const n = parseFloat(String(v).replace(",", "."));
      return isNaN(n) ? null : n;
    }

    function mapValue(value, inMin, inMax, outMin, outMax){
      if(isNaN(value)) return outMin;
      if(value < inMin) value = inMin;
      if(value > inMax) value = inMax;
      return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }

    function setNeedle(id, deg){
      const el = document.getElementById(id);
      if(!el) return;
      el.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }

    function buildTicks(containerId){
      const box = document.getElementById(containerId);
      if(!box) return;
      box.innerHTML = "";
      for(let i=0;i<=12;i++){
        const tick = document.createElement("div");
        tick.className = "tick" + ((i % 2 === 0) ? "" : " small");
        const deg = -60 + (i * 10);
        tick.style.transform = `rotate(${deg}deg)`;
        box.appendChild(tick);
      }
    }

    function getDay(b){
      if(!b.createdAt) return "-";
      const start = new Date(b.createdAt);
      const now = new Date();
      const diff = now - start;
      return Math.max(1, Math.floor(diff / 86400000) + 1);
    }

    function getMeasurements(b){
      if(!Array.isArray(b.measurements)) b.measurements = [];

      if(b.measurements.length === 0){
        const gravity = b.gravity ?? "-";
        const ph = b.ph ?? "-";
        const temp = b.temp ?? "-";
        const pressure = b.pressure ?? "-";

        if(gravity !== "-" || ph !== "-" || temp !== "-" || pressure !== "-"){
          b.measurements.push({
            day: getDay(b),
            gravity: gravity,
            ph: ph,
            temp: temp,
            pressure: pressure,
            createdAt: b.createdAt || new Date().toISOString()
          });
        }
      }

      return b.measurements;
    }

    function getLatestMeasurement(b){
      const list = getMeasurements(b);
      if(list.length === 0) return null;
      return list[list.length - 1];
    }

    function getABV(b){
      const og = parseNum(b.og);
      const latest = getLatestMeasurement(b);
      const current = latest ? parseNum(latest.gravity) : parseNum(b.gravity);

      if(og === null || current === null) return "-";
      const abv = (og - current) * 131;
      if(isNaN(abv)) return "-";
      return abv.toFixed(2) + "%";
    }

    function getStatus(b){
      const latest = getLatestMeasurement(b);
      const og = parseNum(b.og);
      const current = latest ? parseNum(latest.gravity) : parseNum(b.gravity);
      const temp = latest ? parseNum(latest.temp) : parseNum(b.temp);
      const ph = latest ? parseNum(latest.ph) : parseNum(b.ph);

      if(temp !== null && (temp < 5 || temp > 40)) return { text:"Critical", cls:"status-critical" };
      if(ph !== null && (ph < 2.8 || ph > 4.6)) return { text:"Critical", cls:"status-critical" };

      if(og !== null && current !== null){
        const diff = og - current;
        if(diff >= 0.030) return { text:"Complete", cls:"status-complete" };
        if(diff >= 0.010) return { text:"Active", cls:"status-active" };
        return { text:"Slow", cls:"status-slow" };
      }

      return { text:"Active", cls:"status-active" };
    }

    function updateTopPanel(){
      const count = batches.length;
      document.getElementById("topCount").textContent = count;
      setNeedle("needleCount", mapValue(count, 0, 20, -60, 60));

      if(count > 0){
        const b = batches[batches.length - 1];
        const latest = getLatestMeasurement(b);

        const ph = latest ? latest.ph : "-";
        const gravity = latest ? latest.gravity : "-";
        const temp = latest ? latest.temp : "-";

        document.getElementById("topPh").textContent = formatValue(ph);
        document.getElementById("topGravity").textContent = formatValue(gravity);
        document.getElementById("topTemp").textContent = formatTemp(temp);

        setNeedle("needlePh", mapValue(parseNum(ph) ?? 0, 0, 7, -60, 60));
        setNeedle("needleGravity", mapValue(parseNum(gravity) ?? 1.000, 1.000, 1.080, -60, 60));
        setNeedle("needleTemp", mapValue(parseNum(temp) ?? 0, 0, 50, -60, 60));
      } else {
        document.getElementById("topPh").textContent = "-";
        document.getElementById("topGravity").textContent = "-";
        document.getElementById("topTemp").textContent = "-";
        setNeedle("needlePh", -60);
        setNeedle("needleGravity", -60);
        setNeedle("needleTemp", -60);
      }
    }

    function makePath(points, width, height, minVal, maxVal){
      if(points.length === 0) return "";
      if(points.length === 1){
        const y = height - ((points[0] - minVal) / (maxVal - minVal)) * height;
        return `M 10 ${y.toFixed(1)} L ${width - 10} ${y.toFixed(1)}`;
      }

      const usableW = width - 20;
      const usableH = height - 20;

      return points.map((val, idx) => {
        const x = 10 + (usableW / (points.length - 1)) * idx;
        const norm = (val - minVal) / (maxVal - minVal);
        const y = 10 + (usableH - (norm * usableH));
        return `${idx === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(" ");
    }

    function renderMiniChart(values, minVal, maxVal, color){
      const nums = values
        .map(v => parseNum(v))
        .filter(v => v !== null);

      const width = 280;
      const height = 120;
      const path = makePath(nums, width, height, minVal, maxVal);

      let dots = "";
      if(nums.length > 0){
        const usableW = width - 20;
        const usableH = height - 20;
        nums.forEach((val, idx) => {
          const x = nums.length === 1 ? width / 2 : 10 + (usableW / (nums.length - 1)) * idx;
          const norm = (val - minVal) / (maxVal - minVal);
          const y = 10 + (usableH - (norm * usableH));
          dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${color}" />`;
        });
      }

      return `
        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
          <line x1="10" y1="10" x2="10" y2="${height-10}" stroke="rgba(255,255,255,.08)" />
          <line x1="10" y1="${height-10}" x2="${width-10}" y2="${height-10}" stroke="rgba(255,255,255,.08)" />
          <path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${dots}
        </svg>
      `;
    }

    function measurementTable(b){
      const list = [...getMeasurements(b)].reverse();
      if(list.length === 0){
        return `<div class="m-muted">No measurements yet.</div>`;
      }

      let html = `
        <div class="m-row m-head">
          <div>Day</div>
          <div>pH</div>
          <div>Gravity</div>
          <div>Temp</div>
        </div>
      `;

      list.forEach(m => {
        html += `
          <div class="m-row">
            <div>${formatValue(m.day)}</div>
            <div>${formatValue(m.ph)}</div>
            <div>${formatValue(m.gravity)}</div>
            <div>${formatTemp(m.temp)}</div>
          </div>
        `;
      });

      return html;
    }

    function render(){
      let html = "";

      if(batches.length === 0){
        html = `<div class="empty">No batches yet. Tap <b>+ New Batch</b> to add your first fermentation.</div>`;
      } else {
        batches.forEach((b, i) => {
          const status = getStatus(b);
          const latest = getLatestMeasurement(b);
          const measures = getMeasurements(b);
          const phValues = measures.map(m => m.ph);
          const gravityValues = measures.map(m => m.gravity);

          html += `
            <div class="batch-card">
              <div class="batch-top">
                <div class="batch-name">${b.name || "Unnamed"}</div>
                <div class="right-stack">
                  <div class="type-badge">${(b.type || "unknown").toUpperCase()}</div>
                  <div class="status-badge ${status.cls}">${status.text}</div>
                </div>
              </div>

              <div class="metrics">
                <div class="metric">
                  <div class="metric-label">Day</div>
                  <div class="metric-value">${getDay(b)}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">Culture</div>
                  <div class="metric-value">${formatValue(b.culture)}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">Latest pH</div>
                  <div class="metric-value">${latest ? formatValue(latest.ph) : "-"}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">Latest Gravity</div>
                  <div class="metric-value">${latest ? formatValue(latest.gravity) : "-"}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">OG</div>
                  <div class="metric-value">${formatValue(b.og)}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">ABV</div>
                  <div class="metric-value">${getABV(b)}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">Latest Temp</div>
                  <div class="metric-value">${latest ? formatTemp(latest.temp) : "-"}</div>
                </div>

                <div class="metric">
                  <div class="metric-label">Latest Pressure</div>
                  <div class="metric-value">${latest ? formatPressure(latest.pressure) : "-"}</div>
                </div>
              </div>

              <div class="actions">
                <button class="small-btn" onclick="event.stopPropagation(); addMeasurement(${i})">+ Add Measurement</button>
                <button class="small-btn" onclick="event.stopPropagation(); manageBatch(${i})">Edit / Delete</button>
              </div>

              <div class="chart-card">
                <div class="chart-title">Lab Charts</div>
                <div class="chart-box">
                  <div class="mini-chart">
                    ${renderMiniChart(phValues, 0, 7, "#62f2a2")}
                    <div class="legend">pH trend</div>
                  </div>
                  <div class="mini-chart">
                    ${renderMiniChart(gravityValues, 1.000, 1.080, "#69b8ff")}
                    <div class="legend">Gravity trend</div>
                  </div>
                </div>
              </div>

              <div class="measurements">
                <div class="measurements-title">Daily Measurements</div>
                ${measurementTable(b)}
              </div>
            </div>
          `;
        });
      }

      document.getElementById("list").innerHTML = html;
      updateTopPanel();
    }

    function addBatch(){
      const name = prompt("Batch name:");
      if(!name) return;

      const type = prompt("Type (cider, kombucha, lactic, mixed):") || "unknown";
      const culture = prompt("Culture (yeast, kveik, L. plantarum, SCOBY...):") || "-";
      const ph = prompt("Initial pH:") || "-";
      const gravity = prompt("Initial Gravity:") || "-";
      const og = prompt("OG (optional):") || gravity || "-";
      const temp = prompt("Initial Temperature °C (0-50):") || "-";
      const pressure = prompt("Initial Pressure bar (optional):") || "-";

      const createdAt = new Date().toISOString();

      batches.push({
        name,
        type,
        culture,
        og,
        createdAt,
        measurements: [{
          day: 1,
          ph,
          gravity,
          temp,
          pressure,
          createdAt
        }]
      });

      save();
      render();
    }

    function addMeasurement(i){
      const b = batches[i];
      const latest = getLatestMeasurement(b) || {};

      const day = prompt("Day number:", String(getDay(b))) || String(getDay(b));
      const ph = prompt("pH:", latest.ph || "-") || latest.ph || "-";
      const gravity = prompt("Gravity:", latest.gravity || "-") || latest.gravity || "-";
      const temp = prompt("Temperature °C:", latest.temp || "-") || latest.temp || "-";
      const pressure = prompt("Pressure bar:", latest.pressure || "-") || latest.pressure || "-";

      if(!Array.isArray(b.measurements)) b.measurements = [];

      b.measurements.push({
        day,
        ph,
        gravity,
        temp,
        pressure,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function manageBatch(i){
      let action = prompt("Write:\n1 = edit batch\n2 = delete batch");

      if(action == "1"){
        let b = batches[i];
        b.name = prompt("Batch name:", b.name) || b.name;
        b.type = prompt("Type:", b.type) || b.type;
        b.culture = prompt("Culture:", b.culture) || b.culture;
        b.og = prompt("OG:", b.og) || b.og;
      } else if(action == "2"){
        if(confirm("Delete this batch?")){
          batches.splice(i, 1);
        }
      }

      save();
      render();
    }

    buildTicks("ticksPh");
    buildTicks("ticksGravity");
    buildTicks("ticksTemp");
    buildTicks("ticksCount");
    render();
  </script>
</body>
</html>
