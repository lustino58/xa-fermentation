<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation - Bordo Oro Antico</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root{
      --bg1:#020916;
      --bg2:#06142a;
      --steel-light:#f2f4f7;
      --steel-mid:#d5d9df;
      --steel-dark:#b5bcc6;
      --gold-1:#fff1b2;
      --gold-2:#f3d16d;
      --gold-3:#d9a63d;
      --gold-4:#b87716;
      --gold-5:#7d4c05;
      --gold-6:#5d3400;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(33,72,130,0.20), transparent 35%),
        linear-gradient(180deg, #020816 0%, #04101f 45%, #020816 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 14px 40px;
    }

    .page {
      width: 100%;
      max-width: 430px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .logo-box {
      width: 92px;
      height: 92px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 42px;
      letter-spacing: -2px;
      color: #fff;
      background:
        linear-gradient(145deg, #07111d 0%, #12253c 40%, #020915 100%);
      box-shadow:
        inset 0 2px 10px rgba(255,255,255,0.06),
        inset 0 -10px 18px rgba(0,0,0,0.35),
        0 10px 25px rgba(0,0,0,0.35);
    }

    .title-wrap h1 {
      font-size: 42px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -1.5px;
    }

    .title-wrap p {
      margin-top: 8px;
      font-size: 16px;
      color: rgba(255,255,255,0.78);
    }

    .plate-wrap {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    /* STRUTTURA BORDO ORO BOMBATO */
    .frame {
      width: 100%;
      aspect-ratio: 0.72 / 1;
      border-radius: 42px;
      padding: 20px;
      position: relative;
      background:
        linear-gradient(145deg, var(--gold-1) 0%, var(--gold-2) 12%, var(--gold-4) 26%, var(--gold-2) 41%, #f7db87 50%, var(--gold-3) 61%, var(--gold-5) 77%, #f0c95e 90%, #fff1b5 100%);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.85),
        inset 0 14px 22px rgba(255,245,200,0.75),
        inset 0 -14px 22px rgba(111,58,0,0.42),
        inset 10px 0 20px rgba(108,61,0,0.22),
        inset -10px 0 20px rgba(255,240,190,0.22),
        0 8px 18px rgba(0,0,0,0.35),
        0 22px 35px rgba(0,0,0,0.32);
      overflow: hidden;
    }

    /* bombatura esterna più cilindrica */
    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 42px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.65) 0%,
          rgba(255,255,255,0.14) 16%,
          rgba(0,0,0,0.06) 34%,
          rgba(255,219,120,0.04) 50%,
          rgba(0,0,0,0.16) 76%,
          rgba(86,43,0,0.26) 100%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* bordo tondo spinto verso fuori */
    .frame::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 40px;
      box-shadow:
        inset 0 22px 28px rgba(255,255,255,0.42),
        inset 0 -18px 28px rgba(97,55,0,0.36),
        inset 14px 0 18px rgba(255,236,173,0.16),
        inset -14px 0 18px rgba(100,57,0,0.18);
      pointer-events: none;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 30px;
      overflow: hidden;
      background:
        linear-gradient(90deg,
          #e7eaee 0%,
          #f5f7fa 8%,
          #d8dde4 18%,
          #eef2f6 30%,
          #cfd5dd 42%,
          #f4f7fa 55%,
          #d0d6de 69%,
          #eef2f5 83%,
          #c8ced7 100%);
      box-shadow:
        inset 0 16px 22px rgba(255,255,255,0.88),
        inset 0 -18px 28px rgba(118,126,138,0.36),
        inset 10px 0 18px rgba(255,255,255,0.36),
        inset -10px 0 18px rgba(122,132,145,0.18);
    }

    /* satinatura verticale acciaio */
    .inner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.18) 0px,
          rgba(255,255,255,0.18) 1px,
          rgba(180,188,198,0.14) 2px,
          rgba(225,230,236,0.10) 3px,
          rgba(185,192,201,0.08) 4px
        );
      opacity: 0.95;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    /* luce centrale morbida */
    .inner::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.12) 22%, rgba(255,255,255,0.03) 46%, rgba(0,0,0,0.04) 100%);
      pointer-events: none;
    }

    .label {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 300;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.72);
      text-shadow: 0 1px 1px rgba(255,255,255,0.25);
      user-select: none;
    }

    .bottom-shadow {
      width: 82%;
      height: 30px;
      margin: -10px auto 0;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0) 75%);
      filter: blur(8px);
      opacity: 0.8;
    }

    @media (max-width: 380px) {
      .title-wrap h1 {
        font-size: 34px;
      }

      .logo-box {
        width: 80px;
        height: 80px;
        font-size: 36px;
      }

      .frame {
        border-radius: 34px;
        padding: 16px;
      }

      .inner {
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-box">XA</div>
      <div class="title-wrap">
        <h1>Fermentation</h1>
        <p>Step 2: bordo oro antico bombato</p>
      </div>
    </div>

    <div class="plate-wrap">
      <div class="frame">
        <div class="inner">
          <div class="label">ORO ANTICO</div>
        </div>
      </div>
    </div>

    <div class="bottom-shadow"></div>
  </div>
</body>
</html>
