<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>

<style>
body{
  margin:0;
  background:#081b2f;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  text-align:center;
}

.value{
  font-size:60px;
  margin-top:10px;
}

.sub{
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>PH</h1>

  <canvas id="gauge"></canvas>

  <div class="value">3.50</div>
  <div class="sub">ultima misurazione</div>
</div>

<script>
new RadialGauge({
  renderTo: 'gauge',

  width: 300,
  height: 300,

  minValue: 2.8,
  maxValue: 5.0,
  value: 3.5,

  startAngle: 180,   // SINISTRA
  ticksAngle: 180,   // SEMICERCHIO PERFETTO

  majorTicks: ["2.8","3.5","4.2","5.0"],
  minorTicks: 4,

  strokeTicks: true,

  highlights: [],

  colorPlate: "#000",
  colorMajorTicks: "#e6dcc5",
  colorMinorTicks: "#e6dcc5",
  colorNumbers: "#e6dcc5",

  colorNeedle: "#ff3b3b",
  colorNeedleEnd: "#ff3b3b",

  needleType: "arrow",
  needleWidth: 4,

  borders: true,
  borderOuterWidth: 8,
  borderMiddleWidth: 4,
  borderInnerWidth: 2,

  colorBorderOuter: "#555",
  colorBorderMiddle: "#222",
  colorBorderInner: "#000",

  valueBox: false,   // 🔥 TOGLIE IL DISPLAY INTERNO

  animationDuration: 500,
  animationRule: "linear"
}).draw();
</script>

</body>
</html>
