<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XA Fermentation</title>

<style>
:root{
  --bg1:#071629;
  --bg2:#081b2f;
  --card1:#10243a;
  --card2:#0b1b2c;
  --text:#f4f7fb;
  --muted:#95a8bb;
}

body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  color:white;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}

.card{
  text-align:center;
  padding:30px;
  border-radius:20px;
  background:linear-gradient(180deg,var(--card1),var(--card2));
}

.value{
  font-size:60px;
}

input{
  margin-top:15px;
  padding:10px;
  font-size:20px;
  width:120px;
  text-align:center;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  font-size:18px;
  border-radius:10px;
  border:none;
  background:#ff3b3b;
  color:white;
}

.history{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
  max-height:120px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">
<h2>PH</h2>

<div class="value" id="val">3.50</div>

<input id="inputPH" type="number" step="0.01" placeholder="3.50">
<br>
<button onclick="setPH()">SET</button>

<div class="history" id="history"></div>

</div>

<script>
const min = 2.8;
const max = 5.0;

let current = 3.5;

// carica storico
let history = JSON.parse(localStorage.getItem("ph_history")) || [];

function updateHistoryUI(){
  const el = document.getElementById("history");
  el.innerHTML = history
    .slice()
    .reverse()
    .map(v => "• " + v.toFixed(2))
    .join("<br>");
}

function saveHistory(v){
  history.push(v);
  localStorage.setItem("ph_history", JSON.stringify(history));
  updateHistoryUI();
}

function setPH(){
  let v = parseFloat(document.getElementById("inputPH").value);
  if(isNaN(v)) return;

  v = Math.max(min, Math.min(max, v));
  current = v;

  document.getElementById("val").innerText = v.toFixed(2);

  saveHistory(v);
}

updateHistoryUI();
</script>

</body>
</html>
