<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#071629;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:28px;
  letter-spacing:2px;
}

.container{
  margin-top:40px;
}

/* CONTACHILOMETRI */
.gauge{
  width:260px;
  height:260px;
  margin:auto;
  position:relative;
}

/* ESTERNO METALLO */
.outer{
  width:100%;
  height:100%;
  border-radius:50%;
  background:linear-gradient(145deg,#999,#444);
  box-shadow:
    inset 0 3px 10px rgba(255,255,255,0.2),
    inset 0 -6px 20px rgba(0,0,0,0.8),
    0 10px 30px rgba(0,0,0,0.8);
}

/* VETRO */
.glass{
  position:absolute;
  top:10px;
  left:10px;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #1b1b1b, #000);
  box-shadow:
    inset 0 10px 20px rgba(255,255,255,0.1),
    inset 0 -10px 25px rgba(0,0,0,0.9);
}

/* RIFLESSO VETRO */
.glass:after{
  content:"";
  position:absolute;
  top:25px;
  left:40px;
  width:120px;
  height:50px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  transform:rotate(-20deg);
}

/* SCALA */
.scale{
  position:absolute;
  width:100%;
  height:100%;
  transform:rotate(-90deg);
}

/* LINEA ARCO */
.arc{
  fill:none;
  stroke:#e7dcc0;
  stroke-width:4;
  stroke-linecap:round;
}

/* TACCHETTE */
.tick{
  stroke:#e7dcc0;
  stroke-width:3;
  stroke-linecap:round;
}

/* NUMERI */
.num{
  fill:#e7dcc0;
  font-size:14px;
  transform:rotate(90deg);
}

/* LANCETTA */
.needle{
  position:absolute;
  width:4px;
  height:100px;
  background:#e53935;
  top:80px;
  left:128px;
  transform-origin:bottom center;
  transform:rotate(35deg);
  box-shadow:0 0 10px rgba(255,0,0,0.6);
}

/* PERNO */
.center{
  position:absolute;
  width:26px;
  height:26px;
  border-radius:50%;
  background:radial-gradient(circle,#ddd,#555);
  top:117px;
  left:117px;
  box-shadow:0 0 8px black;
}

/* TESTO */
.value{
  margin-top:30px;
  font-size:42px;
  font-weight:300;
}

.sub{
  color:#9fb3c8;
}
</style>
</head>

<body>

<h1>PH</h1>

<div class="container">

<div class="gauge">

<div class="outer"></div>

<div class="glass"></div>

<svg class="scale" viewBox="0 0 200 200">

<!-- arco -->
<path d="M20 150 A80 80 0 0 1 180 150" class="arc"/>

<!-- tacche -->
<line x1="40" y1="140" x2="35" y2="150" class="tick"/>
<line x1="70" y1="120" x2="65" y2="130" class="tick"/>
<line x1="100" y1="115" x2="100" y2="130" class="tick"/>
<line x1="130" y1="120" x2="135" y2="130" class="tick"/>
<line x1="160" y1="140" x2="165" y2="150" class="tick"/>

<!-- numeri -->
<text x="28" y="160" class="num">2.8</text>
<text x="78" y="110" class="num">3.5</text>
<text x="115" y="110" class="num">4.2</text>
<text x="150" y="160" class="num">5.0</text>

</svg>

<div class="needle"></div>
<div class="center"></div>

</div>

<div class="value">3.50</div>
<div class="sub">ultima misurazione</div>

</div>

</body>
</html>
