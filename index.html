<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg:#071629;
      --text:#f3f4f6;
      --muted:#cfd5db;
      --scale:#ddd4b7;
      --num:#e8dec3;
      --needle:#d92c2c;
      --needle-hi:#ffb3b3;
      --bezel-hi:#efefef;
      --bezel-mid:#8f9399;
      --bezel-lo:#2b2f35;
      --face-hi:#2a2f35;
      --face-mid:#12161b;
      --face-lo:#050708;
      --hub-hi:#ffffff;
      --hub-mid:#b9bcc2;
      --hub-lo:#555b62;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      padding:28px 16px 40px;
    }

    .app{
      width:min(430px,100%);
      text-align:center;
    }

    .title{
      font-size:26px;
      letter-spacing:2px;
      margin:6px 0 20px;
    }

    .gauge-wrap{
      width:100%;
      max-width:390px;
      margin:0 auto;
    }

    .gauge{
      width:100%;
      height:auto;
      display:block;
      filter:drop-shadow(0 18px 24px rgba(0,0,0,.38));
    }

    .value{
      margin-top:18px;
      font-size:64px;
      line-height:1;
      font-weight:300;
      letter-spacing:1px;
    }

    .sub{
      margin-top:10px;
      font-size:18px;
      color:var(--muted);
    }

    @media (max-width:480px){
      .title{font-size:24px}
      .value{font-size:56px}
      .sub{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">PH</div>

    <div class="gauge-wrap">
      <svg class="gauge" viewBox="0 0 400 400" aria-hidden="true">
        <defs>
          <radialGradient id="bezelGrad" cx="30%" cy="26%">
            <stop offset="0%" stop-color="var(--bezel-hi)"/>
            <stop offset="30%" stop-color="#bfc3c8"/>
            <stop offset="68%" stop-color="var(--bezel-mid)"/>
            <stop offset="100%" stop-color="var(--bezel-lo)"/>
          </radialGradient>

          <radialGradient id="faceGrad" cx="42%" cy="38%">
            <stop offset="0%" stop-color="var(--face-hi)"/>
            <stop offset="55%" stop-color="var(--face-mid)"/>
            <stop offset="100%" stop-color="var(--face-lo)"/>
          </radialGradient>

          <radialGradient id="hubGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="var(--hub-hi)"/>
            <stop offset="38%" stop-color="var(--hub-mid)"/>
            <stop offset="100%" stop-color="var(--hub-lo)"/>
          </radialGradient>

          <filter id="bigShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8"/>
          </filter>

          <filter id="needleShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.4"/>
          </filter>
        </defs>

        <!-- ombra -->
        <ellipse cx="200" cy="216" rx="132" ry="132" fill="rgba(0,0,0,.32)" filter="url(#bigShadow)"/>

        <!-- ghiera -->
        <circle cx="200" cy="200" r="150" fill="url(#bezelGrad)"/>

        <!-- interno -->
        <circle cx="200" cy="200" r="126" fill="#101419"/>
        <circle cx="200" cy="200" r="122" fill="url(#faceGrad)"/>
        <circle cx="200" cy="200" r="121" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.2"/>

        <!-- arco scala -->
        <path
          d="M 74 250 A 130 130 0 0 1 326 250"
          fill="none"
          stroke="var(--scale)"
          stroke-width="4"
          stroke-linecap="round"
        />

        <!-- tacche principali -->
        <g stroke="var(--scale)" stroke-width="5" stroke-linecap="round">
          <line x1="82"  y1="244" x2="58"  y2="262"/>
          <line x1="124" y1="197" x2="104" y2="183"/>
          <line x1="173" y1="168" x2="164" y2="143"/>
          <line x1="200" y1="162" x2="200" y2="134"/>
          <line x1="227" y1="168" x2="236" y2="143"/>
          <line x1="276" y1="197" x2="296" y2="183"/>
          <line x1="318" y1="244" x2="342" y2="262"/>
        </g>

        <!-- numeri -->
        <g fill="var(--num)" font-size="18" font-weight="700" text-anchor="middle">
          <text x="82"  y="285">2.8</text>
          <text x="145" y="160">3.5</text>
          <text x="255" y="160">4.2</text>
          <text x="318" y="285">5.0</text>
        </g>

        <!-- ombra lancetta -->
        <g transform="rotate(34 200 200)">
          <polygon
            points="196,200 204,200 202,88 198,88"
            fill="rgba(0,0,0,.45)"
            filter="url(#needleShadow)"
            transform="translate(3,2)"
          />
        </g>

        <!-- lancetta -->
        <g transform="rotate(34 200 200)">
          <polygon points="194,200 206,200 202,90 198,90" fill="var(--needle)"/>
          <rect x="199.2" y="94" width="1.6" height="95" rx="0.8" fill="var(--needle-hi)" opacity=".8"/>
        </g>

        <!-- base -->
        <circle cx="200" cy="200" r="34" fill="#171b20"/>

        <!-- perno -->
        <circle cx="200" cy="200" r="28" fill="url(#hubGrad)"/>
        <circle cx="200" cy="200" r="28" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="200" cy="200" r="8" fill="rgba(255,255,255,.18)"/>

        <!-- riflessi vetro -->
        <ellipse cx="145" cy="124" rx="54" ry="17" fill="rgba(255,255,255,.14)" transform="rotate(-18 145 124)"/>
        <ellipse cx="258" cy="288" rx="22" ry="7" fill="rgba(255,255,255,.05)" transform="rotate(20 258 288)"/>
      </svg>
    </div>

    <div class="value">3.50</div>
    <div class="sub">ultima misurazione</div>
  </div>
</body>
</html>
