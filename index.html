<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg:#03070c;
      --panel:#0a121b;
      --panel-2:#101a25;
      --steel-1:#7f8b97;
      --steel-2:#3b4650;
      --line:#1f6ea8;
      --glow:rgba(44,150,255,.22);
      --text:#f2f6fa;
      --muted:#aebbc7;
      --accent:#5faee3;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(35,87,133,.16), transparent 28%),
        linear-gradient(180deg, #02060b 0%, #050a10 100%);
      padding:24px 18px 40px;
    }

    .app{
      max-width:720px;
      margin:0 auto;
    }

    .header{
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .xa-badge{
      width:72px;
      height:72px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:30px;
      color:#eef5fb;
      background:
        linear-gradient(145deg, rgba(142,157,171,.28), rgba(55,66,77,.18)),
        linear-gradient(180deg, #14202b 0%, #0b1219 100%);
      border:1px solid rgba(173,193,211,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 0 20px rgba(35,125,210,.16);
    }

    .title-wrap h1{
      margin:0;
      font-size:28px;
      line-height:1;
      letter-spacing:.3px;
    }

    .title-wrap p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
    }

    .top-panel{
      background:
        linear-gradient(180deg, rgba(123,139,154,.18), rgba(50,62,73,.10)),
        linear-gradient(180deg, #0b1219 0%, #081018 100%);
      border:1px solid rgba(169,187,205,.14);
      border-radius:28px;
      padding:18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 30px rgba(0,100,200,.10);
      margin-bottom:18px;
    }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .gauge{
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.05), transparent 38%),
        linear-gradient(180deg, #0d161f 0%, #0a1118 100%);
      border-radius:24px;
      padding:14px 12px;
      border:1px solid rgba(140,159,176,.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 22px rgba(0,120,255,.08);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .gauge::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:50%;
      border:1px solid rgba(140,170,200,.08);
      pointer-events:none;
    }

    .gauge .label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .dial{
      width:120px;
      height:120px;
      margin:0 auto 8px;
      border-radius:50%;
      position:relative;
      background:
        radial-gradient(circle at center, #0b141d 0 42%, #101a25 42% 58%, #0a1118 58% 100%);
      border:1px solid rgba(171,191,209,.12);
      box-shadow:
        inset 0 1px 10px rgba(255,255,255,.05),
        0 0 18px rgba(0,110,255,.10);
    }

    .dial::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:50%;
      border:1px dashed rgba(160,185,210,.10);
    }

    .needle{
      position:absolute;
      left:50%;
      bottom:50%;
      width:3px;
      height:42px;
      background:linear-gradient(180deg, #a9d8ff 0%, #3b98dc 100%);
      transform-origin:bottom center;
      border-radius:3px;
      box-shadow:0 0 12px rgba(95,174,227,.45);
    }

    .needle::after{
      content:"";
      position:absolute;
      bottom:-7px;
      left:50%;
      width:14px;
      height:14px;
      margin-left:-7px;
      border-radius:50%;
      background:#d9edf9;
      box-shadow:0 0 10px rgba(160,220,255,.35);
    }

    .value{
      font-size:28px;
      font-weight:700;
      line-height:1;
      margin-bottom:4px;
    }

    .sub{
      color:var(--muted);
      font-size:12px;
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:20px;
      padding:18px 16px;
      font-size:20px;
      color:#eef6fd;
      background:
        linear-gradient(180deg, rgba(120,140,160,.18), rgba(35,55,72,.16)),
        linear-gradient(180deg, #243d53 0%, #1b3043 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 20px rgba(60,140,220,.16);
    }

    .section-title{
      margin:18px 0 12px;
      color:#dfeaf5;
      font-size:13px;
      letter-spacing:3px;
      text-transform:uppercase;
      opacity:.9;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.10);
      padding:18px;
      border-radius:24px;
      margin-bottom:14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 24px rgba(0,110,210,.10);
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .name{
      font-size:28px;
      font-weight:700;
      line-height:1;
    }

    .type-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.6px;
      text-transform:uppercase;
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
      border:1px solid rgba(164,185,203,.12);
      white-space:nowrap;
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .metric{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:86px;
    }

    .metric-label{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.3px;
      margin-bottom:8px;
    }

    .metric-value{
      font-size:20px;
      font-weight:700;
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>

      <div class="brand">
        <div class="xa-badge">XA</div>
        <div class="title-wrap">
          <h1>XA Fermentation</h1>
          <p>Control panel for cider, tea ferments, lactic cultures and experimental batches</p>
        </div>
      </div>
    </div>
