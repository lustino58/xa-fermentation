<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
:root{
  --bg:#071629;
  --glass:rgba(255,255,255,0.05);
  --text:#f3f4f6;
  --muted:#9aa3ad;
  --tick:#e6dcc5;
  --needle:#ff3b3b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:radial-gradient(circle at center, #0a223d, #071629 70%);
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:var(--text);
}

.container{
  text-align:center;
  width:100%;
  max-width:420px;
}

h1{
  letter-spacing:6px;
  font-weight:300;
  margin-bottom:30px;
}

.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.7),
    inset 0 0 40px rgba(255,255,255,0.03);
}

canvas{
  width:100%;
  max-width:300px;
}

.value{
  font-size:64px;
  margin-top:20px;
  font-weight:200;
}

.sub{
  color:var(--muted);
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>PH</h1>

  <div class="card">
    <canvas id="gauge" width="300" height="300"></canvas>
    <div class="value">3.50</div>
    <div class="sub">ultima misurazione</div>
  </div>
</div>

<script>
const canvas = document.getElementById("gauge");
const ctx = canvas.getContext("2d");

const cx = canvas.width/2;
const cy = canvas.height/2;
const r = 110;

const min = 2.8;
const max = 5.0;

// ⚠️ NON TOCCO PIÙ QUESTA (scala giusta)
const startAngle = -135;
const endAngle = 135;

const value = 3.5;

function toRad(deg){ return deg*Math.PI/180; }

function valueToAngle(v){
  const ratio = (v-min)/(max-min);
  return toRad(startAngle + ratio*(endAngle-startAngle));
}

function draw(){

  ctx.clearRect(0,0,300,300);

  // base nera
  const grad = ctx.createRadialGradient(cx,cy,20,cx,cy,r);
  grad.addColorStop(0,"#0a0a0a");
  grad.addColorStop(1,"#000");
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  // vetro riflesso
  ctx.beginPath();
  ctx.ellipse(cx-30,cy-40,60,30,0,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.05)";
  ctx.fill();

  // arco scala
  ctx.beginPath();
  ctx.arc(cx,cy,r-10,toRad(startAngle),toRad(endAngle));
  ctx.strokeStyle="#e6dcc5";
  ctx.lineWidth=6;
  ctx.lineCap="round";
  ctx.stroke();

  // tacche
  for(let i=0;i<=20;i++){
    let a = toRad(startAngle + i*(endAngle-startAngle)/20);

    ctx.beginPath();
    ctx.moveTo(cx+(r-20)*Math.cos(a),cy+(r-20)*Math.sin(a));
    ctx.lineTo(cx+(r-10)*Math.cos(a),cy+(r-10)*Math.sin(a));

    ctx.strokeStyle="#e6dcc5";
    ctx.lineWidth = (i%5===0)?5:2;
    ctx.stroke();
  }

  // numeri
  [2.8,3.5,4.2,5.0].forEach(v=>{
    let a = valueToAngle(v);

    ctx.fillStyle="#e6dcc5";
    ctx.font="bold 16px Arial";
    ctx.textAlign="center";

    ctx.fillText(v,cx+(r-38)*Math.cos(a),cy+(r-38)*Math.sin(a)+5);
  });

  // lancetta glow
  let a = valueToAngle(value);

  ctx.shadowColor="#ff3b3b";
  ctx.shadowBlur=10;

  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+(r-30)*Math.cos(a),cy+(r-30)*Math.sin(a));
  ctx.strokeStyle="#ff3b3b";
  ctx.lineWidth=5;
  ctx.stroke();

  ctx.shadowBlur=0;

  // centro metallico
  const metal = ctx.createRadialGradient(cx,cy,2,cx,cy,10);
  metal.addColorStop(0,"#fff");
  metal.addColorStop(1,"#777");

  ctx.beginPath();
  ctx.arc(cx,cy,9,0,Math.PI*2);
  ctx.fillStyle=metal;
  ctx.fill();
}

draw();
</script>

</body>
</html>
