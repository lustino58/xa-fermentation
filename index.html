<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#03070c;
      --bg2:#08111a;
      --text:#eef5fb;
      --muted:#aab7c4;

      --steel-1:#d7dde3;
      --steel-2:#a9b2bb;
      --steel-3:#7f8994;
      --steel-4:#5a636d;
      --steel-5:#303840;

      --ph-needle:#8cf0b9;
      --ph-ring:#a9ecff;
      --ph-glow:#c8f6ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(60,120,180,.15), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:84px;
      height:84px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f3f8fc;
      background:
        linear-gradient(145deg, rgba(210,220,228,.18), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1c2732, #0c131b);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.42),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .panel-shell{
      position:relative;
      border-radius:34px;
      padding:24px 18px 22px;
      overflow:hidden;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,.10) 7%,
          rgba(0,0,0,.06) 16%,
          rgba(255,255,255,.05) 32%,
          rgba(0,0,0,.10) 52%,
          rgba(255,255,255,.04) 72%,
          rgba(0,0,0,.12) 88%,
          rgba(255,255,255,.08) 100%
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.060) 0px,
          rgba(255,255,255,.022) 2px,
          rgba(0,0,0,.034) 4px,
          rgba(255,255,255,.016) 6px,
          rgba(0,0,0,.026) 8px
        ),
        linear-gradient(180deg,
          var(--steel-1) 0%,
          var(--steel-2) 16%,
          #edf2f6 34%,
          var(--steel-3) 55%,
          #c7d0d7 74%,
          var(--steel-4) 100%
        );
      border:1px solid rgba(255,255,255,.24);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.20),
        inset 0 -18px 28px rgba(0,0,0,.18),
        0 14px 34px rgba(0,0,0,.22);
    }

    .panel-shell::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          transparent 10%,
          rgba(255,255,255,.04) 22%,
          transparent 38%,
          rgba(0,0,0,.04) 54%,
          transparent 70%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
      opacity:.95;
    }

    .screw{
      position:absolute;
      width:21px;
      height:21px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fcfeff 0%, #d3dbe2 18%, #909ba5 46%, #5a636d 72%, #343a42 100%);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.38),
        0 1px 3px rgba(0,0,0,.45);
      z-index:4;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:9px;
      height:1.5px;
      background:#2f3640;
      transform:rotate(-18deg);
      border-radius:2px;
    }

    .screw.tl{ top:10px; left:10px; }
    .screw.tr{ top:10px; right:10px; }
    .screw.bl{ bottom:10px; left:10px; }
    .screw.br{ bottom:10px; right:10px; }

    .instrument-card{
      position:relative;
      z-index:2;
      border-radius:30px;
      padding:18px 14px 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(28,36,44,.78), rgba(10,15,20,.84));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -18px 26px rgba(0,0,0,.28),
        0 5px 14px rgba(0,0,0,.14);
      text-align:center;
    }

    .instrument-label{
      font-size:12px;
      letter-spacing:6px;
      color:#e3edf5;
      margin-bottom:8px;
    }

    .dial-wrap{
      width:min(82vw, 360px);
      aspect-ratio:1/1;
      margin:0 auto 12px;
      position:relative;
    }

    .dial-svg{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 18px 18px rgba(0,0,0,.18));
    }

    .value{
      font-size:clamp(42px, 9vw, 64px);
      font-weight:700;
      line-height:1;
      margin-bottom:8px;
    }

    .sub{
      font-size:clamp(18px, 3.8vw, 28px);
      color:var(--muted);
      line-height:1.2;
    }

    .note{
      margin-top:18px;
      text-align:center;
      color:#d7e3ee;
      font-size:14px;
      line-height:1.4;
      opacity:.9;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        border-radius:22px;
        font-size:34px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .panel-shell{
        padding:22px 14px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Passo 1: test quadrante PH con pannello acciaio satinato, incasso, vetro e lancetta</p>
      </div>
    </div>

    <div class="panel-shell">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="instrument-card">
        <div class="instrument-label">P H</div>

        <div class="dial-wrap">
          <svg class="dial-svg" viewBox="0 0 360 360" aria-hidden="true">
            <defs>
              <radialGradient id="bezelGrad" cx="36%" cy="28%">
                <stop offset="0%" stop-color="#edf2f6"/>
                <stop offset="16%" stop-color="#c6ced6"/>
                <stop offset="42%" stop-color="#7d8791"/>
                <stop offset="72%" stop-color="#4c555f"/>
                <stop offset="100%" stop-color="#2f353b"/>
              </radialGradient>

              <radialGradient id="faceGrad" cx="50%" cy="40%">
                <stop offset="0%" stop-color="#0e1923"/>
                <stop offset="50%" stop-color="#08121a"/>
                <stop offset="100%" stop-color="#04090e"/>
              </radialGradient>

              <radialGradient id="innerCoreGrad" cx="50%" cy="42%">
                <stop offset="0%" stop-color="#0c141a"/>
                <stop offset="58%" stop-color="#05090d"/>
                <stop offset="100%" stop-color="#010408"/>
              </radialGradient>

              <radialGradient id="innerGlowGrad" cx="50%" cy="50%">
                <stop offset="0%" stop-color="#d8fbff" stop-opacity=".20"/>
                <stop offset="38%" stop-color="#bcefff" stop-opacity=".10"/>
                <stop offset="100%" stop-color="#bcefff" stop-opacity="0"/>
              </radialGradient>

              <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#eefdf6"/>
                <stop offset="34%" stop-color="#b3ffd7"/>
                <stop offset="100%" stop-color="#8cf0b9"/>
              </linearGradient>

              <filter id="ringGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5.5" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.6"/>
              </filter>
            </defs>

            <!-- cornice esterna incassata -->
            <circle cx="180" cy="180" r="146" fill="url(#bezelGrad)"/>
            <circle cx="180" cy="180" r="132" fill="#1f2730" opacity=".55"/>
            <circle cx="180" cy="180" r="122" fill="url(#faceGrad)"/>

            <!-- anello illuminato -->
            <circle cx="180" cy="180" r="118" fill="none" stroke="#a9ecff" stroke-width="4.2" filter="url(#ringGlow)"/>
            <circle cx="180" cy="180" r="118" fill="url(#innerGlowGrad)" opacity=".95"/>

            <!-- tacche -->
            <g stroke="#a9ecff" stroke-linecap="round" filter="url(#ringGlow)">
              <line x1="118" y1="126" x2="97" y2="108" stroke-width="8"/>
              <line x1="134" y1="111" x2="120" y2="92" stroke-width="6"/>
              <line x1="154" y1="100" x2="145" y2="78" stroke-width="8"/>
              <line x1="176" y1="95" x2="175" y2="72" stroke-width="6"/>
              <line x1="199" y1="97" x2="205" y2="75" stroke-width="8"/>
              <line x1="220" y1="106" x2="232" y2="86" stroke-width="6"/>
              <line x1="239" y1="120" x2="257" y2="104" stroke-width="8"/>
              <line x1="252" y1="138" x2="274" y2="128" stroke-width="6"/>
              <line x1="260" y1="160" x2="283" y2="156" stroke-width="8"/>
              <line x1="261" y1="183" x2="284" y2="186" stroke-width="6"/>
              <line x1="255" y1="205" x2="277" y2="214" stroke-width="8"/>
              <line x1="243" y1="224" x2="260" y2="240" stroke-width="6"/>
            </g>

            <!-- numeri -->
            <g fill="#eef5fb" font-size="16" font-weight="700" text-anchor="middle">
              <text x="202" y="112">2.8</text>
              <text x="227" y="145">3.5</text>
              <text x="236" y="188">4.2</text>
              <text x="217" y="228">5.0</text>
            </g>

            <!-- fondo interno -->
            <circle cx="180" cy="180" r="58" fill="url(#innerCoreGrad)"/>
            <circle cx="180" cy="180" r="30" fill="#060b10"/>

            <!-- lancetta -->
            <g transform="rotate(-26 180 180)">
              <line x1="180" y1="180" x2="180" y2="84" stroke="url(#needleGrad)" stroke-width="12" stroke-linecap="round" filter="url(#ringGlow)"/>
            </g>

            <!-- mozzo -->
            <circle cx="180" cy="180" r="28" fill="#dcecff"/>
            <circle cx="180" cy="180" r="28" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.2"/>

            <!-- vetro -->
            <ellipse cx="152" cy="104" rx="62" ry="22" fill="rgba(255,255,255,.20)" transform="rotate(-18 152 104)" filter="url(#glassBlur)"/>
            <ellipse cx="228" cy="226" rx="34" ry="12" fill="rgba(255,255,255,.06)" transform="rotate(22 228 226)" filter="url(#glassBlur)"/>
            <circle cx="180" cy="180" r="121" fill="none" stroke="rgba(255,255,255,.11)" stroke-width="1.4"/>
          </svg>
        </div>

        <div class="value">3.50</div>
        <div class="sub">ultima misurazione</div>
      </div>
    </div>

    <div class="note">
      Se questo quadrante ti piace, nel passo dopo faccio uguali anche
      <b>Densità</b>, <b>Temperatura</b> e <b>Lotti</b>.
    </div>
  </div>
</body>
</html>
