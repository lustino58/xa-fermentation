<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: #0b0f14;
  color: white;
}

.container {
  padding:20px;
}

h1 {
  font-size:28px;
  margin-bottom:20px;
}

.card {
  background: #111a22;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow: 0 0 15px rgba(0,150,255,0.2);
}

.badge {
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background:#1f3a4d;
  margin-right:5px;
  font-size:12px;
}

.button {
  margin-bottom:20px;
  padding:15px;
  text-align:center;
  border-radius:12px;
  background: #1f3a4d;
}

.small {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>XA Fermentation</h1>

<div class="button" onclick="newBatch()">+ New Batch</div>

<div id="list"></div>

</div>

<script>

let batches = JSON.parse(localStorage.getItem("xa_batches")) || [];

function save(){
  localStorage.setItem("xa_batches", JSON.stringify(batches));
}

function daysPassed(date){
  let start = new Date(date);
  let now = new Date();
  let diff = now - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function render(){
  let html = "";

  batches.forEach(b => {

    let day = daysPassed(b.date);

    html += `
      <div class="card">
        <b>${b.name}</b><br>
        <div class="small">Day ${day}</div>

        <div class="badge">${b.type}</div>

        <br><br>

        pH: ${b.ph}<br>
        Gravity: ${b.gravity}<br>
        Temp: ${b.temp}°C
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function newBatch(){
  let name = prompt("Batch name:") || "Unnamed";
  let type = prompt("Type (cider, lactic, kombucha):") || "unknown";
  let ph = prompt("pH:") || "-";
  let gravity = prompt("Gravity:") || "-";
  let temp = prompt("Temperature:") || "-";

  batches.push({
    name,
    type,
    ph,
    gravity,
    temp,
    date: new Date()
  });

  save();
  render();
}

render();

</script>

</body>
</html>
