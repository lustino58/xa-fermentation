<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#071629,#081b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.value{
  font-size:60px;
  margin-top:20px;
}

.sub{
  color:#aaa;
}
</style>
</head>

<body>

<div class="card">
<h2>PH</h2>

<svg viewBox="0 0 300 300" width="300">

<!-- cerchio -->
<circle cx="150" cy="150" r="110" fill="#000"/>

<!-- 🔥 ARCO SPOSTATO PIÙ IN ALTO -->
<path d="M 40 190 A 110 110 0 0 1 260 190"
      stroke="#e6dcc5"
      stroke-width="6"
      fill="none"
      stroke-linecap="round"/>

<!-- tacche -->
<line x1="60" y1="180" x2="45" y2="190" stroke="#e6dcc5" stroke-width="4"/>
<line x1="100" y1="130" x2="90" y2="115" stroke="#e6dcc5" stroke-width="4"/>
<line x1="150" y1="115" x2="150" y2="95" stroke="#e6dcc5" stroke-width="4"/>
<line x1="200" y1="130" x2="210" y2="115" stroke="#e6dcc5" stroke-width="4"/>
<line x1="240" y1="180" x2="255" y2="190" stroke="#e6dcc5" stroke-width="4"/>

<!-- 🔥 NUMERI PIÙ IN ALTO -->
<text x="60" y="205" fill="#e6dcc5">2.8</text>
<text x="100" y="105" fill="#e6dcc5">3.5</text>
<text x="200" y="105" fill="#e6dcc5">4.2</text>
<text x="240" y="205" fill="#e6dcc5">5.0</text>

<!-- lancetta -->
<line x1="150" y1="150" x2="100" y2="110"
      stroke="red"
      stroke-width="4"
      stroke-linecap="round"/>

<!-- centro -->
<circle cx="150" cy="150" r="8" fill="white"/>

</svg>

<div class="value">3.50</div>
<div class="sub">ultima misurazione</div>

</div>

</body>
</html>
