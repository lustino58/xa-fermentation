<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#07101a;
      --panel:#0a121b;
      --panel2:#0d1823;
      --steel1:#7f8c98;
      --steel2:#3a4651;
      --text:#f2f6fa;
      --muted:#aab7c4;
      --blue:#69b8ff;
      --green:#62f2a2;
      --orange:#ffb25c;
      --purple:#c17aff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(45,102,160,.14), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:20px 16px 34px;
    }

    .app{
      max-width:760px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:86px;
      height:86px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      font-weight:700;
      color:#eef5fb;
      background:
        linear-gradient(145deg, rgba(150,166,180,.28), rgba(58,68,79,.12)),
        linear-gradient(180deg, #16202b, #0a1118);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 0 22px rgba(70,140,220,.12);
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
      letter-spacing:.2px;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--muted);
      line-height:1.35;
    }

    .dashboard{
      background:
        linear-gradient(180deg, rgba(130,145,160,.14), rgba(48,59,70,.10)),
        linear-gradient(180deg, #0b1218, #081018);
      border:1px solid rgba(255,255,255,.08);
      border-radius:32px;
      padding:18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 28px rgba(30,100,190,.12);
      margin-bottom:20px;
    }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .gauge-card{
      border-radius:28px;
      padding:14px 12px 16px;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.03), transparent 40%),
        linear-gradient(180deg, #0b131c, #081018);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 18px rgba(20,90,180,.08);
      text-align:center;
    }

    .g-label{
      font-size:11px;
      letter-spacing:4px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .dial{
      width:136px;
      height:136px;
      margin:0 auto 10px;
      border-radius:50%;
      position:relative;
      background:
        radial-gradient(circle at center, #02070d 0 36%, #08111a 36% 56%, #0d1823 56% 100%);
      border:2px solid rgba(200,220,240,.08);
      box-shadow:
        inset 0 2px 10px rgba(255,255,255,.04),
        inset 0 -6px 14px rgba(0,0,0,.45),
        0 0 22px rgba(0,100,200,.08);
      overflow:hidden;
    }

    .dial::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.05);
    }

    .dial::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.08);
      opacity:.8;
    }

    .ticks{
      position:absolute;
      inset:0;
      border-radius:50%;
    }

    .tick{
      position:absolute;
      left:50%;
      top:8px;
      width:2px;
      height:12px;
      margin-left:-1px;
      border-radius:2px;
      opacity:.9;
      transform-origin:50% 60px;
    }

    .tick.small{
      height:8px;
      top:10px;
      opacity:.5;
    }

    .needle{
      position:absolute;
      left:50%;
      bottom:50%;
      width:4px;
      height:52px;
      transform-origin:bottom center;
      transform:translateX(-50%) rotate(-60deg);
      border-radius:4px;
      z-index:3;
      transition:transform .45s ease;
    }

    .needle::after{
      content:"";
      position:absolute;
      bottom:-9px;
      left:50%;
      width:18px;
      height:18px;
      margin-left:-9px;
      border-radius:50%;
      background:#dbeffc;
      box-shadow:0 0 10px rgba(180,220,255,.25);
    }

    .ph .needle{
      background:linear-gradient(180deg, #aaffcf, var(--green));
      box-shadow:0 0 14px rgba(98,242,162,.34);
    }

    .gravity .needle{
      background:linear-gradient(180deg, #d2ebff, var(--blue));
      box-shadow:0 0 14px rgba(105,184,255,.34);
    }

    .temp .needle{
      background:linear-gradient(180deg, #ffe0b8, var(--orange));
      box-shadow:0 0 14px rgba(255,178,92,.34);
    }

    .count .needle{
      background:linear-gradient(180deg, #edd2ff, var(--purple));
      box-shadow:0 0 14px rgba(193,122,255,.34);
    }

    .ph .tick{ background:rgba(98,242,162,.65); }
    .gravity .tick{ background:rgba(105,184,255,.65); }
    .temp .tick{ background:rgba(255,178,92,.65); }
    .count .tick{ background:rgba(193,122,255,.65); }

    .g-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .g-sub{
      font-size:12px;
      color:var(--muted);
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:24px;
      padding:18px;
      font-size:22px;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(155,173,190,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #3d5f7d, #2b445a);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 20px rgba(70,140,220,.16);
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
    }

    .section-title{
      margin:18px 0 12px;
      color:#dce8f3;
      font-size:13px;
      letter-spacing:5px;
      text-transform:uppercase;
    }

    .empty{
      background:
        linear-gradient(180deg, rgba(130,147,163,.10), rgba(47,58,68,.06)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.08);
      padding:20px;
      border-radius:24px;
      color:var(--muted);
      text-align:center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 20px rgba(0,110,210,.07);
    }

    .batch-card{
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      border:1px solid rgba(167,187,204,.10);
      padding:18px;
      border-radius:24px;
      margin-bottom:14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 24px rgba(0,110,210,.10);
      cursor:pointer;
    }

    .batch-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .batch-name{
      font-size:26px;
      font-weight:700;
      line-height:1;
    }

    .type-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
      border:1px solid rgba(164,185,203,.12);
      white-space:nowrap;
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .metric{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:84px;
    }

    .metric-label{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.3px;
      margin-bottom:8px;
    }

    .metric-value{
      font-size:20px;
      font-weight:700;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:78px;
        height:78px;
        font-size:36px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .dial{
        width:124px;
        height:124px;
      }

      .g-value{
        font-size:28px;
      }

      .batch-name{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Control panel for cider, tea ferments, lactic cultures and experimental batches</p>
      </div>
    </div>

    <div class="dashboard">
      <div class="gauges">

        <div class="gauge-card ph">
          <div class="g-label">PH</div>
          <div class="dial">
            <div class="ticks" id="ticksPh"></div>
            <div class="needle" id="needlePh"></div>
          </div>
          <div class="g-value" id="topPh">-</div>
          <div class="g-sub">0–7 scale</div>
        </div>

        <div class="gauge-card gravity">
          <div class="g-label">GRAVITY</div>
          <div class="dial">
            <div class="ticks" id="ticksGravity"></div>
            <div class="needle" id="needleGravity"></div>
          </div>
          <div class="g-value" id="topGravity">-</div>
          <div class="g-sub">1.000–1.080</div>
        </div>

        <div class="gauge-card temp">
          <div class="g-label">TEMP</div>
          <div class="dial">
            <div class="ticks" id="ticksTemp"></div>
            <div class="needle" id="needleTemp"></div>
          </div>
          <div class="g-value" id="topTemp">-</div>
          <div class="g-sub">0–50°C scale</div>
        </div>

        <div class="gauge-card count">
          <div class="g-label">BATCHES</div>
          <div class="dial">
            <div class="ticks" id="ticksCount"></div>
            <div class="needle" id="needleCount"></div>
          </div>
          <div class="g-value" id="topCount">0</div>
          <div class="g-sub">stored</div>
        </div>

      </div>

      <button class="main-btn" onclick="addBatch()">+ New Batch</button>
      <div class="hint">Tap a batch card to edit or delete it</div>
    </div>

    <div class="section-title">Fermentation Archive</div>
    <div id="list"></div>

  </div>

  <script>
    let batches = JSON.parse(localStorage.getItem("batches")) || [];

    function save(){
      localStorage.setItem("batches", JSON.stringify(batches));
    }

    function formatTemp(t){
      if(t === undefined || t === null || t === "") return "-";
      return t + "°C";
    }

    function formatValue(v){
      if(v === undefined || v === null || v === "") return "-";
      return v;
    }

    function mapValue(value, inMin, inMax, outMin, outMax){
      if(isNaN(value)) return outMin;
      if(value < inMin) value = inMin;
      if(value > inMax) value = inMax;
      return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }

    function setNeedle(id, deg){
      const el = document.getElementById(id);
      if(!el) return;
      el.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }

    function buildTicks(containerId){
      const box = document.getElementById(containerId);
      if(!box) return;
      box.innerHTML = "";
      for(let i=0;i<=12;i++){
        const tick = document.createElement("div");
        tick.className = "tick" + ((i % 2 === 0) ? "" : " small");
        const deg = -60 + (i * 10);
        tick.style.transform = `rotate(${deg}deg)`;
        box.appendChild(tick);
      }
    }

    function updateTopPanel(){
      const count = batches.length;
      document.getElementById("topCount").textContent = count;
      const countDeg = mapValue(count, 0, 20, -60, 60);
      setNeedle("needleCount", countDeg);

      if(count > 0){
        const b = batches[batches.length - 1];

        document.getElementById("topPh").textContent = formatValue(b.ph);
        document.getElementById("topGravity").textContent = formatValue(b.gravity);
        document.getElementById("topTemp").textContent = formatTemp(b.temp);

        const ph = parseFloat(String(b.ph).replace(",", ".")) || 0;
        const gravity = parseFloat(String(b.gravity).replace(",", ".")) || 1.000;
        const temp = parseFloat(String(b.temp).replace(",", ".")) || 0;

        const phDeg = mapValue(ph, 0, 7, -60, 60);
        const gravityDeg = mapValue(gravity, 1.000, 1.080, -60, 60);
        const tempDeg = mapValue(temp, 0, 50, -60, 60);

        setNeedle("needlePh", phDeg);
        setNeedle("needleGravity", gravityDeg);
        setNeedle("needleTemp", tempDeg);
      } else {
        document.getElementById("topPh").textContent = "-";
        document.getElementById("topGravity").textContent = "-";
        document.getElementById("topTemp").textContent = "-";
        setNeedle("needlePh", -60);
        setNeedle("needleGravity", -60);
        setNeedle("needleTemp", -60);
      }
    }

    function render(){
      let html = "";

      if(batches.length === 0){
        html = `<div class="empty">No batches yet. Tap <b>+ New Batch</b> to add your first fermentation.</div>`;
      } else {
        batches.forEach((b, i) => {
          html += `
            <div class="batch-card" onclick="manageBatch(${i})">
              <
