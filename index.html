<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA PH</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#081b2f;
  font-family:Arial;
  color:white;
}

.card{
  text-align:center;
}

.value{
  font-size:60px;
  margin-top:20px;
}

input{
  margin-top:15px;
  padding:10px;
  font-size:20px;
  width:120px;
  text-align:center;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  font-size:18px;
  border-radius:10px;
  border:none;
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<div class="card">
<h2>PH</h2>

<svg viewBox="0 0 200 120" width="260">
  <line id="needle"
        x1="100" y1="100"
        x2="100" y2="30"
        stroke="red"
        stroke-width="4"
        stroke-linecap="round"/>
</svg>

<div class="value" id="val">3.50</div>

<input id="inputPH" type="number" step="0.01" placeholder="3.50">
<br>
<button onclick="setPH()">SET</button>

</div>

<script>
const min = 2.8;
const max = 5.0;

let current = 3.5;

function valueToAngle(v){
  const ratio = (v-min)/(max-min);
  return -90 + ratio*180;
}

function draw(v){
  const angle = valueToAngle(v);
  document.getElementById("needle")
    .setAttribute("transform","rotate("+angle+" 100 100)");
  document.getElementById("val").innerText = v.toFixed(2);
}

function animate(target){
  let start = current;
  let t = 0;

  function step(){
    t += 0.05;
    let v = start + (target-start)*t;
    draw(v);

    if(t < 1){
      requestAnimationFrame(step);
    } else {
      current = target;
    }
  }
  step();
}

function setPH(){
  let v = parseFloat(document.getElementById("inputPH").value);
  if(isNaN(v)) return;

  v = Math.max(min, Math.min(max, v));
  animate(v);
}

draw(current);
</script>

</body>
</html>
