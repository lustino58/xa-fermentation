<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#03070c;
      --bg2:#0a121b;
      --steel1:#eef2f5;
      --steel2:#cfd6dc;
      --steel3:#9ca6af;
      --steel4:#6c7580;
      --steel5:#3f4750;
      --card1:#3e454d;
      --card2:#1e242b;
      --face1:#191610;
      --face2:#0f1012;
      --tick:#e7d4a9;
      --needle:#d65a45;
      --needle2:#ff8e78;
      --text:#f3f6f9;
      --muted:#bcc7d1;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(70,120,180,.14), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:82px;
      height:82px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f4f8fb;
      background:
        linear-gradient(145deg, rgba(210,220,228,.18), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1c2732, #0c131b);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.42),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .subhead{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .panel{
      position:relative;
      border-radius:36px;
      padding:26px 16px 30px;
      min-height:720px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.18);
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.05) 0px,
          rgba(0,0,0,.03) 3px
        ),
        linear-gradient(180deg,#eef2f5,#aeb7c0,#dde3e8,#8a949f);
      box-shadow:
        inset 0 2px 5px rgba(255,255,255,.22),
        inset 0 -24px 36px rgba(0,0,0,.18),
        0 18px 38px rgba(0,0,0,.28);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:36px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.06) 0%,
          transparent 12%,
          rgba(255,255,255,.03) 24%,
          transparent 42%,
          rgba(0,0,0,.04) 56%,
          transparent 74%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
    }

    .screw{
      position:absolute;
      width:22px;
      height:22px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0%, #dce3e9 18%, #99a3ad 46%, #5f6973 72%, #363d45 100%);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.42),
        0 2px 4px rgba(0,0,0,.35);
      z-index:3;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:11px;
      height:1.6px;
      background:#2f3740;
      transform:rotate(-18deg);
      border-radius:2px;
    }

    .tl{top:12px;left:12px}
    .tr{top:12px;right:12px}
    .bl{bottom:12px;left:12px}
    .br{bottom:12px;right:12px}

    .meter-card{
      position:relative;
      z-index:2;
      max-width:620px;
      margin:0 auto;
      padding:26px 16px 28px;
      border-radius:34px;
      text-align:center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        linear-gradient(180deg, var(--card1), var(--card2));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -20px 28px rgba(0,0,0,.28),
        0 10px 20px rgba(0,0,0,.16);
    }

    .meter-title{
      margin:0 0 14px;
      font-size:18px;
      letter-spacing:8px;
      color:#eadab8;
    }

    .dial-wrap{
      width:min(88vw, 500px);
      aspect-ratio:1 / 1;
      margin:0 auto 18px;
    }

    .dial-svg{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 16px 18px rgba(0,0,0,.30));
    }

    .value{
      font-size:clamp(48px, 10vw, 78px);
      line-height:1;
      font-weight:700;
      margin-bottom:8px;
    }

    .value-sub{
      font-size:clamp(18px, 4vw, 30px);
      color:var(--muted);
      line-height:1.2;
    }

    .bottom-note{
      margin-top:18px;
      text-align:center;
      font-size:14px;
      color:#d4e0ea;
      opacity:.92;
      line-height:1.4;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:72px;
        height:72px;
        font-size:34px;
        border-radius:22px;
      }

      h1{
        font-size:28px;
      }

      .subhead{
        font-size:13px;
      }

      .panel{
        min-height:640px;
        padding:24px 12px 24px;
      }

      .meter-card{
        padding:22px 10px 24px;
      }

      .meter-title{
        font-size:16px;
        letter-spacing:6px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="xa-logo">XA</div>
      <div>
        <h1>XA Fermentation</h1>
        <div class="subhead">Test singolo strumento tondo vintage, rifatto pulito da zero</div>
      </div>
    </div>

    <div class="panel">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="meter-card">
        <div class="meter-title">P H</div>

        <div class="dial-wrap">
          <svg class="dial-svg" viewBox="0 0 500 500" aria-hidden="true">
            <defs>
              <radialGradient id="bezelGrad" cx="34%" cy="28%">
                <stop offset="0%" stop-color="#f1f4f7"/>
                <stop offset="18%" stop-color="#d2d9df"/>
                <stop offset="54%" stop-color="#8e98a2"/>
                <stop offset="80%" stop-color="#525b64"/>
                <stop offset="100%" stop-color="#2f353b"/>
              </radialGradient>

              <radialGradient id="faceGrad" cx="50%" cy="42%">
                <stop offset="0%" stop-color="#231d14"/>
                <stop offset="55%" stop-color="#111115"/>
                <stop offset="100%" stop-color="#090b0e"/>
              </radialGradient>

              <radialGradient id="warmGlow" cx="50%" cy="44%">
                <stop offset="0%" stop-color="rgba(255,210,130,.10)"/>
                <stop offset="42%" stop-color="rgba(255,210,130,.04)"/>
                <stop offset="100%" stop-color="rgba(255,210,130,0)"/>
              </radialGradient>

              <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffd2c8"/>
                <stop offset="48%" stop-color="#ff8d77"/>
                <stop offset="100%" stop-color="#d65a45"/>
              </linearGradient>

              <filter id="needleGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="3.8" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.6"/>
              </filter>
            </defs>

            <!-- ghiera -->
            <circle cx="250" cy="250" r="182" fill="url(#bezelGrad)"/>
            <circle cx="250" cy="250" r="166" fill="#242a31" opacity=".42"/>
            <circle cx="250" cy="250" r="152" fill="url(#faceGrad)"/>

            <!-- luce -->
            <circle cx="250" cy="250" r="146" fill="url(#warmGlow)"/>

            <!-- filetto interno -->
            <circle cx="250" cy="250" r="145" fill="none" stroke="rgba(255,240,210,.10)" stroke-width="2.4"/>

            <!-- tacche principali -->
            <g stroke="#e7d4a9" stroke-linecap="round">
              <line x1="122" y1="172" x2="96" y2="156" stroke-width="10"/>
              <line x1="160" y1="130" x2="142" y2="107" stroke-width="10"/>
              <line x1="208" y1="103" x2="201" y2="75" stroke-width="10"/>
              <line x1="260" y1="96" x2="260" y2="66" stroke-width="10"/>
              <line x1="312" y1="104" x2="320" y2="76" stroke-width="10"/>
              <line x1="359" y1="132" x2="377" y2="109" stroke-width="10"/>
              <line x1="396" y1="174" x2="423" y2="159" stroke-width="10"/>
              <line x1="417" y1="225" x2="447" y2="220" stroke-width="10"/>
            </g>

            <!-- tacche secondarie -->
            <g stroke="#d8c49a" stroke-linecap="round" opacity=".92">
              <line x1="140" y1="150" x2="123" y2="132" stroke-width="6"/>
              <line x1="183" y1="115" x2="171" y2="91" stroke-width="6"/>
              <line x1="234" y1="98" x2="231" y2="70" stroke-width="6"/>
              <line x1="286" y1="98" x2="290" y2="70" stroke-width="6"/>
              <line x1="336" y1="115" x2="349" y2="91" stroke-width="6"/>
              <line x1="379" y1="149" x2="398" y2="131" stroke-width="6"/>
              <line x1="408" y1="198" x2="435" y2="188" stroke-width="6"/>
            </g>

            <!-- numeri -->
            <g fill="#efe2c4" font-size="24" font-weight="700" text-anchor="middle">
              <text x="112" y="154">2.8</text>
              <text x="212" y="72">3.5</text>
              <text x="319" y="74">4.2</text>
              <text x="433" y="164">5.0</text>
            </g>

            <!-- lancetta -->
            <g transform="rotate(-32 250 250)">
              <line x1="250" y1="250" x2="250" y2="118" stroke="url(#needleGrad)" stroke-width="12" stroke-linecap="round" filter="url(#needleGlow)"/>
            </g>

            <!-- mozzo -->
            <circle cx="250" cy="250" r="74" fill="#14181d"/>
            <circle cx="250" cy="250" r="42" fill="#e5ebf2"/>
            <circle cx="250" cy="250" r="42" fill="none" stroke="rgba(0,0,0,.16)" stroke-width="1.4"/>

            <!-- vetro -->
            <ellipse cx="196" cy="153" rx="78" ry="24" fill="rgba(255,255,255,.14)" transform="rotate(-18 196 153)" filter="url(#glassBlur)"/>
            <ellipse cx="316" cy="334" rx="38" ry="12" fill="rgba(255,255,255,.05)" transform="rotate(20 316 334)" filter="url(#glassBlur)"/>
            <circle cx="250" cy="250" r="152" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.4"/>
          </svg>
        </div>

        <div class="value">3.50</div>
        <div class="value-sub">ultima misurazione</div>
      </div>
    </div>

    <div class="bottom-note">
      Se la base di questo strumento finalmente ti convince, nel passo dopo lo trasformo in versione definitiva XA.
    </div>
  </div>
</body>
</html>
