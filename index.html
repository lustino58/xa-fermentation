<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: #0b0f14;
  color: white;
}

.container {
  padding:20px;
}

h1 {
  font-size:28px;
}

.card {
  background: #111a22;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow: 0 0 10px rgba(0,150,255,0.2);
}

.button {
  margin-top:20px;
  padding:15px;
  text-align:center;
  border-radius:12px;
  background: #1f3a4d;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h1>XA Fermentation</h1>

<div class="button" onclick="newBatch()">+ New Batch</div>

<div id="list"></div>

</div>

<script>

let batches = JSON.parse(localStorage.getItem("xa_batches")) || [];

function save(){
  localStorage.setItem("xa_batches", JSON.stringify(batches));
}

function render(){
  let html = "";
  batches.forEach(b => {
    html += `
      <div class="card">
        <b>${b.name}</b><br>
        Type: ${b.type}<br>
        pH: ${b.ph}<br>
        Gravity: ${b.gravity}<br>
        Temp: ${b.temp}°C
      </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function newBatch(){
  let name = prompt("Batch name:");
  let type = prompt("Type (cider, lactic, kombucha):");
  let ph = prompt("pH:");
  let gravity = prompt("Gravity:");
  let temp = prompt("Temperature:");

  batches.push({name, type, ph, gravity, temp});
  save();
  render();
}

render();

</script>

</body>
</html>
