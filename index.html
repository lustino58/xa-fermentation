<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  background:#071629;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.title{
  margin-top:40px;
  font-size:28px;
  letter-spacing:2px;
}

.value{
  font-size:64px;
  margin-top:20px;
}

.sub{
  color:#9aa7b3;
}

svg{
  width:90%;
  max-width:360px;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="title">PH</div>

<svg viewBox="0 0 300 300">

<!-- ghiera -->
<circle cx="150" cy="150" r="130"
fill="radial-gradient(circle at 30% 30%, #ddd, #444)"/>

<!-- quadrante -->
<circle cx="150" cy="150" r="110"
fill="radial-gradient(circle, #1a1f25, #000)"/>

<!-- tacche -->
<g stroke="#d8d0b5" stroke-width="4" stroke-linecap="round">
  <line x1="150" y1="40" x2="150" y2="60"/>
  <line x1="220" y1="70" x2="205" y2="85"/>
  <line x1="250" y1="150" x2="230" y2="150"/>
  <line x1="220" y1="230" x2="205" y2="215"/>
  <line x1="150" y1="260" x2="150" y2="240"/>
  <line x1="80" y1="230" x2="95" y2="215"/>
  <line x1="50" y1="150" x2="70" y2="150"/>
  <line x1="80" y1="70" x2="95" y2="85"/>
</g>

<!-- numeri -->
<g fill="#d8d0b5" font-size="18" text-anchor="middle">
  <text x="150" y="35">3.5</text>
  <text x="265" y="155">5.0</text>
  <text x="35" y="155">2.8</text>
  <text x="220" y="70">4.2</text>
</g>

<!-- lancetta -->
<g transform="rotate(35 150 150)">
  <polygon points="147,150 153,150 150,60"
  fill="#e22"/>
</g>

<!-- perno -->
<circle cx="150" cy="150" r="12"
fill="radial-gradient(circle, #fff, #888)"/>

</svg>

<div class="value">3.50</div>
<div class="sub">ultima misurazione</div>

</body>
</html>
