<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
:root{
  --bg:#03070c;
  --panel:#0a121b;
  --text:#f2f6fa;
  --muted:#aebbc7;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#02060b,#050a10);
  color:white;
  padding:20px;
}

.app{
  max-width:700px;
  margin:auto;
}

h1{
  margin:0 0 20px;
}

.top-panel{
  padding:20px;
  border-radius:30px;
  background:#0b1219;
  box-shadow:0 0 30px rgba(0,100,200,.1);
}

.gauges{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.gauge{
  padding:15px;
  border-radius:25px;
  background:#0c141d;
  text-align:center;
  position:relative;
}

/* COLORI DIVERSI */

.ph{
  box-shadow:0 0 20px rgba(0,255,120,.2);
}
.gravity{
  box-shadow:0 0 20px rgba(0,150,255,.2);
}
.temp{
  box-shadow:0 0 20px rgba(255,140,0,.2);
}
.count{
  box-shadow:0 0 20px rgba(180,0,255,.2);
}

.label{
  font-size:12px;
  letter-spacing:2px;
  color:#aaa;
}

.dial{
  width:110px;
  height:110px;
  margin:10px auto;
  border-radius:50%;
  position:relative;
  background:#08111a;
}

/* LANCETTE COLORATE */

.needle{
  position:absolute;
  left:50%;
  bottom:50%;
  width:4px;
  height:45px;
  transform-origin:bottom;
  transform:translateX(-50%) rotate(-60deg);
}

/* COLORI PER STRUMENTO */
.ph .needle{
  background:linear-gradient(#7CFFB2,#00ff88);
  box-shadow:0 0 10px #00ff88;
}
.gravity .needle{
  background:linear-gradient(#9ad4ff,#4da6ff);
  box-shadow:0 0 10px #4da6ff;
}
.temp .needle{
  background:linear-gradient(#ffc47a,#ff8c00);
  box-shadow:0 0 10px #ff8c00;
}
.count .needle{
  background:linear-gradient(#e0a8ff,#b84dff);
  box-shadow:0 0 10px #b84dff;
}

.value{
  font-size:26px;
  font-weight:bold;
}

.main-btn{
  width:100%;
  margin-top:20px;
  padding:18px;
  font-size:22px;
  border:none;
  border-radius:20px;
  background:#2c4a60;
  color:white;
}

.card{
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background:#09111a;
  box-shadow:0 0 15px rgba(0,100,200,.1);
}

</style>
</head>

<body>

<div class="app">

<h1>XA Fermentation</h1>

<div class="top-panel">

<div class="gauges">

<div class="gauge ph">
<div class="label">PH</div>
<div class="dial"><div class="needle" id="needlePh"></div></div>
<div class="value" id="topPh">-</div>
</div>

<div class="gauge gravity">
<div class="label">GRAVITY</div>
<div class="dial"><div class="needle" id="needleGravity"></div></div>
<div class="value" id="topGravity">-</div>
</div>

<div class="gauge temp">
<div class="label">TEMP</div>
<div class="dial"><div class="needle" id="needleTemp"></div></div>
<div class="value" id="topTemp">-</div>
</div>

<div class="gauge count">
<div class="label">BATCHES</div>
<div class="dial"><div class="needle" id="needleCount"></div></div>
<div class="value" id="topCount">0</div>
</div>

</div>

<button class="main-btn" onclick="addBatch()">+ New Batch</button>

</div>

<div id="list"></div>

</div>

<script>

let batches = JSON.parse(localStorage.getItem("batches")) || [];

function save(){
  localStorage.setItem("batches", JSON.stringify(batches));
}

function map(v,min,max){
  if(!v) return -60;
  return ((v-min)/(max-min))*120 -60;
}

function setNeedle(id,val){
  document.getElementById(id).style.transform =
    `translateX(-50%) rotate(${val}deg)`;
}

function updateTop(){

  document.getElementById("topCount").innerText=batches.length;
  setNeedle("needleCount", map(batches.length,0,20));

  if(batches.length>0){
    let b=batches[batches.length-1];

    document.getElementById("topPh").innerText=b.ph;
    document.getElementById("topGravity").innerText=b.gravity;
    document.getElementById("topTemp").innerText=b.temp+"°C";

    setNeedle("needlePh", map(parseFloat(b.ph),0,7));
    setNeedle("needleGravity", map(parseFloat(b.gravity),1,1.08));
    setNeedle("needleTemp", map(parseFloat(b.temp),0,50));
  }

}

function render(){
  let html="";
  batches.forEach((b,i)=>{
    html+=`
    <div class="card" onclick="edit(${i})">
      <b>${b.name}</b><br>
      ${b.type}<br>
      pH: ${b.ph}<br>
      Gravity: ${b.gravity}<br>
      Temp: ${b.temp}°C
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
  updateTop();
}

function addBatch(){
  let name=prompt("Name");
  if(!name)return;

  let type=prompt("Type");
  let ph=prompt("pH");
  let gravity=prompt("Gravity");
  let temp=prompt("Temp °C");

  batches.push({name,type,ph,gravity,temp});
  save();
  render();
}

function edit(i){
  if(confirm("Delete batch?")){
    batches.splice(i,1);
    save();
    render();
  }
}

render();

</script>

</body>
</html>
