<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg:#071629;
      --text:#f4f6f8;
      --muted:#bcc7d2;
      --bezel1:#f2f3f5;
      --bezel2:#a0a6ae;
      --bezel3:#4c525a;
      --bezel4:#262a30;
      --face1:#2a2f35;
      --face2:#13171c;
      --face3:#06080b;
      --scale:#ddd4b7;
      --needle:#d92c2c;
      --needleHi:#ffb3b3;
      --hub1:#ffffff;
      --hub2:#b9bec5;
      --hub3:#565c63;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      padding:28px 16px 40px;
    }

    .app{
      width:min(430px,100%);
      text-align:center;
    }

    .title{
      font-size:26px;
      letter-spacing:2px;
      margin:6px 0 20px;
    }

    .gauge-wrap{
      width:100%;
      max-width:390px;
      margin:0 auto;
    }

    .gauge{
      width:100%;
      height:auto;
      display:block;
      filter:drop-shadow(0 18px 26px rgba(0,0,0,.42));
    }

    .value{
      margin-top:18px;
      font-size:64px;
      line-height:1;
      font-weight:300;
      letter-spacing:1px;
    }

    .sub{
      margin-top:10px;
      font-size:18px;
      color:var(--muted);
    }

    @media (max-width:480px){
      .title{font-size:24px}
      .value{font-size:56px}
      .sub{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">PH</div>

    <div class="gauge-wrap">
      <svg class="gauge" viewBox="0 0 400 400" aria-hidden="true">
        <defs>
          <radialGradient id="bezelGrad" cx="30%" cy="26%">
            <stop offset="0%" stop-color="var(--bezel1)"/>
            <stop offset="32%" stop-color="var(--bezel2)"/>
            <stop offset="72%" stop-color="var(--bezel3)"/>
            <stop offset="100%" stop-color="var(--bezel4)"/>
          </radialGradient>

          <radialGradient id="faceGrad" cx="42%" cy="38%">
            <stop offset="0%" stop-color="var(--face1)"/>
            <stop offset="58%" stop-color="var(--face2)"/>
            <stop offset="100%" stop-color="var(--face3)"/>
          </radialGradient>

          <radialGradient id="hubGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="var(--hub1)"/>
            <stop offset="38%" stop-color="var(--hub2)"/>
            <stop offset="100%" stop-color="var(--hub3)"/>
          </radialGradient>

          <filter id="bigShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8"/>
          </filter>

          <filter id="needleShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.4"/>
          </filter>
        </defs>

        <!-- ombra -->
        <ellipse cx="200" cy="216" rx="132" ry="132" fill="rgba(0,0,0,.32)" filter="url(#bigShadow)"/>

        <!-- ghiera -->
        <circle cx="200" cy="200" r="150" fill="url(#bezelGrad)"/>

        <!-- quadrante -->
        <circle cx="200" cy="200" r="126" fill="#101419"/>
        <circle cx="200" cy="200" r="122" fill="url(#faceGrad)"/>
        <circle cx="200" cy="200" r="121" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.2"/>

        <!-- arco scala più basso -->
        <path
          d="M 84 246 A 128 128 0 0 1 316 246"
          fill="none"
          stroke="var(--scale)"
          stroke-width="4"
          stroke-linecap="round"
        />

        <!-- tacche sicure -->
        <g stroke="var(--scale)" stroke-width="5" stroke-linecap="round">
          <line x1="92"  y1="239" x2="70"  y2="254"/>
          <line x1="131" y1="195" x2="113" y2="182"/>
          <line x1="177" y1="171" x2="170" y2="147"/>
          <line x1="200" y1="166" x2="200" y2="140"/>
          <line x1="223" y1="171" x2="230" y2="147"/>
          <line x1="269" y1="195" x2="287" y2="182"/>
          <line x1="308" y1="239" x2="330" y2="254"/>
        </g>

        <!-- numeri fuori dalla scala -->
        <g fill="var(--scale)" font-size="18" font-weight="700" text-anchor="middle">
          <text x="88"  y="276">2.8</text>
          <text x="148" y="148">3.5</text>
          <text x="252" y="148">4.2</text>
          <text x="312" y="276">5.0</text>
        </g>

        <!-- ombra lancetta -->
        <g transform="rotate(34 200 200)">
          <polygon
            points="196,200 204,200 202,90 198,90"
            fill="rgba(0,0,0,.45)"
            filter="url(#needleShadow)"
            transform="translate(3,2)"
          />
        </g>

        <!-- lancetta -->
        <g transform="rotate(34 200 200)">
          <polygon points="194,200 206,200 202,92 198,92" fill="var(--needle)"/>
          <rect x="199.2" y="96" width="1.6" height="92" rx="0.8" fill="var(--needleHi)" opacity=".82"/>
        </g>

        <!-- base -->
        <circle cx="200" cy="200" r="34" fill="#171b20"/>

        <!-- perno -->
        <circle cx="200" cy="200" r="28" fill="url(#hubGrad)"/>
        <circle cx="200" cy="200" r="28" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="200" cy="200" r="8" fill="rgba(255,255,255,.18)"/>

        <!-- riflessi vetro -->
        <ellipse cx="145" cy="124" rx="54" ry="17" fill="rgba(255,255,255,.14)" transform="rotate(-18 145 124)"/>
        <ellipse cx="258" cy="288" rx="22" ry="7" fill="rgba(255,255,255,.05)" transform="rotate(20 258 288)"/>
      </svg>
    </div>

    <div class="value">3.50</div>
    <div class="sub">ultima misurazione</div>
  </div>
</body>
</html>
