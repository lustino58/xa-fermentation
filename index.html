<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XA Fermentation PRO</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg1:#050b14;
  --bg2:#081c2e;
  --card:#0e2235;
  --red:#ff3b3b;
  --orange:#ff9d2f;
  --yellow:#ffd84a;
  --green:#38d996;
  --blue:#4aa3ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:white;
  padding:20px;
}

/* TITLE */
.title{
  text-align:center;
  font-size:26px;
  letter-spacing:6px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 40px rgba(0,0,0,.6);
}

/* MIXER */
.mixer{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.channel{
  background:#091827;
  border-radius:14px;
  padding:10px;
  text-align:center;
}

.display{
  background:black;
  border-radius:10px;
  padding:10px;
  font-size:20px;
  margin-bottom:8px;
}

/* FADER */
input[type=range]{
  writing-mode: bt-lr;
  -webkit-appearance: slider-vertical;
  height:120px;
}

/* BUTTON */
button{
  padding:12px;
  border:none;
  border-radius:12px;
  margin:5px;
  background:var(--red);
  color:white;
  font-weight:bold;
}

/* INGREDIENTS */
.ingredients{
  margin-top:10px;
}

.ingredients div{
  background:#081421;
  padding:8px;
  border-radius:8px;
  margin:5px 0;
}

/* GRAPH */
canvas{
  width:100%;
  background:black;
  border-radius:10px;
}

/* LIBRARY */
.library{
  display:none;
  max-height:200px;
  overflow:auto;
  margin-top:10px;
}

.library div{
  padding:6px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div class="title">XA FERMENTATION</div>

<!-- MIXER -->
<div class="card mixer">

<div class="channel">
<div class="display" id="phVal">3.5</div>
PH
<input type="range" min="2.8" max="5" step="0.01" value="3.5" oninput="updateVal('ph')">
</div>

<div class="channel">
<div class="display" id="tempVal">20</div>
TEMP
<input type="range" min="0" max="40" value="20" oninput="updateVal('temp')">
</div>

<div class="channel">
<div class="display" id="ogVal">1.040</div>
OG
<input type="range" min="1.000" max="1.100" step="0.001" value="1.040" oninput="updateVal('og')">
</div>

<div class="channel">
<div class="display" id="fgVal">1.010</div>
FG
<input type="range" min="1.000" max="1.100" step="0.001" value="1.010" oninput="updateVal('fg')">
</div>

<div class="channel">
<div class="display" id="abvVal">5%</div>
ABV
<input type="range" min="0" max="15" value="5" oninput="updateVal('abv')">
</div>

<div class="channel">
<div class="display" id="srmVal">10</div>
SRM
<input type="range" min="0" max="40" value="10" oninput="updateVal('srm')">
</div>

</div>

<!-- INGREDIENTI -->
<div class="card">
<h3>Ingredienti</h3>

<button onclick="addIngredient('Mela')">🍎</button>
<button onclick="addIngredient('Pera')">🍐</button>
<button onclick="addIngredient('Tè')">🍵</button>

<div class="ingredients" id="ingredients"></div>
</div>

<!-- LIBRERIA -->
<div class="card">
<button onclick="toggleLib()">Lieviti</button>

<div class="library" id="lib">
<div onclick="addIngredient('Lutra Omega Yeast')">Lutra Omega</div>
<div onclick="addIngredient('Lallemand Nottingham')">Nottingham</div>
<div onclick="addIngredient('US-05')">US-05</div>
</div>
</div>

<!-- GRAFICO -->
<div class="card">
<h3>Fermentazione</h3>
<canvas id="chart"></canvas>
<button onclick="addPoint()">AGGIUNGI PUNTO</button>
</div>

<!-- SALVA -->
<div class="card">
<button onclick="saveRecipe()">SALVA RICETTA</button>
</div>

<script>
let ingredients=[];
let data=[1.050];

function updateVal(type){
  document.getElementById(type+"Val").innerText =
  event.target.value;
}

function addIngredient(name){
  let qty=prompt("Quantità?");
  if(!qty)return;

  let item=name+" - "+qty;
  ingredients.push(item);

  let div=document.createElement("div");
  div.innerText=(ingredients.length)+". "+item;

  document.getElementById("ingredients").appendChild(div);
}

function toggleLib(){
  let l=document.getElementById("lib");
  l.style.display = l.style.display=="block" ? "none":"block";
}

/* GRAFICO */
const ctx=document.getElementById("chart");
const chart=new Chart(ctx,{
type:'line',
data:{
labels:[0],
datasets:[{
label:'Densità',
data:data,
borderColor:'orange'
}]
}
});

function addPoint(){
  let val=prompt("Valore densità?");
  if(!val)return;

  data.push(parseFloat(val));
  chart.data.labels.push(data.length);
  chart.update();
}

/* SAVE */
function saveRecipe(){
  let recipe={
    ph:document.getElementById("phVal").innerText,
    og:document.getElementById("ogVal").innerText,
    fg:document.getElementById("fgVal").innerText,
    ingredients
  };

  localStorage.setItem("recipe",JSON.stringify(recipe));
  alert("Salvata");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
