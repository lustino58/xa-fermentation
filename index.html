<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH</title>

<style>
body{
  margin:0;
  background:#081b2f;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  text-align:center;
}

canvas{
  display:block;
  margin:auto;
}

.value{
  font-size:60px;
  margin-top:10px;
}

.sub{
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>PH</h1>
  <canvas id="c" width="300" height="300"></canvas>
  <div class="value">3.50</div>
  <div class="sub">ultima misurazione</div>
</div>

<script>
const ctx = document.getElementById("c").getContext("2d");

const cx = 150;
const cy = 150;

const min = 2.8;
const max = 5.0;
const value = 3.5;

const start = 135;
const end = 405;

function rad(d){ return d*Math.PI/180; }

function angle(v){
  return rad(start + (v-min)/(max-min)*(end-start));
}

function polar(r,a){
  return {
    x: cx + r*Math.cos(a),
    y: cy + r*Math.sin(a)
  };
}

// fondo
ctx.beginPath();
ctx.arc(cx,cy,120,0,Math.PI*2);
ctx.fillStyle="#000";
ctx.fill();

// arco
ctx.beginPath();
ctx.arc(cx,cy,100,rad(start),rad(end));
ctx.strokeStyle="#e6dcc5";
ctx.lineWidth=6;
ctx.stroke();

// tacche
for(let i=0;i<=20;i++){
  let a = rad(start + i*(end-start)/20);
  let p1 = polar(80,a);
  let p2 = polar(100,a);

  ctx.beginPath();
  ctx.moveTo(p1.x,p1.y);
  ctx.lineTo(p2.x,p2.y);
  ctx.strokeStyle="#e6dcc5";
  ctx.lineWidth = i%5==0 ? 4 : 2;
  ctx.stroke();
}

// numeri
const vals=[2.8,3.5,4.2,5.0];
ctx.fillStyle="#e6dcc5";
ctx.font="14px Arial";
ctx.textAlign="center";

vals.forEach(v=>{
  let a = angle(v);
  let p = polar(115,a);
  ctx.fillText(v.toFixed(1),p.x,p.y);
});

// lancetta
let a = angle(value);
let tip = polar(85,a);

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(tip.x,tip.y);
ctx.strokeStyle="red";
ctx.lineWidth=4;
ctx.stroke();

// centro
ctx.beginPath();
ctx.arc(cx,cy,6,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
</script>

</body>
</html>
