<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#071629,#081b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.app{
  width:360px;
  text-align:center;
}

.title{
  font-size:28px;
  letter-spacing:6px;
  margin-bottom:20px;
}

.card{
  background:#10243a;
  border-radius:30px;
  padding:25px;
}

svg{
  width:100%;
  cursor:pointer;
}

.value{
  font-size:60px;
  margin-top:15px;
}

.sub{
  color:#95a8bb;
}
</style>
</head>

<body>

<div class="app">
<div class="title">PH</div>

<div class="card">

<svg id="gauge" viewBox="0 0 360 260">

<!-- quadrante -->
<circle cx="180" cy="140" r="100" fill="#000"/>

<!-- arco -->
<path d="M60 140 A120 120 0 0 1 300 140"
      stroke="#e6dcc5"
      stroke-width="6"
      fill="none"/>

<g id="ticks"></g>
<g id="labels"></g>

<!-- lancetta -->
<line id="needle"
      x1="180" y1="140"
      x2="180" y2="80"
      stroke="red"
      stroke-width="5"
      stroke-linecap="round"/>

<!-- perno -->
<circle cx="180" cy="140" r="10" fill="#ddd"/>

<!-- display -->
<rect x="140" y="185" width="80" height="28" rx="6"
      fill="#cfc9b2" stroke="#5a5546" stroke-width="2"/>

<text id="display"
      x="180" y="204"
      text-anchor="middle"
      fill="#222"
      font-family="monospace"
      font-size="16">
3.50
</text>

</svg>

<div class="value" id="valueText">3.50</div>
<div class="sub">ultima misurazione</div>

</div>
</div>

<script>
const min=2.8;
const max=5.0;

const cx=180;
const cy=140;

let current=3.5;

// conversione valore → angolo (perfetta)
function deg(v){
  return 180 + (v-min)/(max-min)*180;
}

// coordinate
function polar(angle, radius){
  const a=angle*Math.PI/180;
  return {
    x:cx + radius*Math.cos(a),
    y:cy + radius*Math.sin(a)
  };
}

// TACCHETTE
const ticks=document.getElementById("ticks");

for(let i=0;i<=12;i++){
  let a=180+i*180/12;

  let p1=polar(a,85);
  let p2=polar(a,100);

  let line=document.createElementNS("http://www.w3.org/2000/svg","line");

  line.setAttribute("x1",p1.x);
  line.setAttribute("y1",p1.y);
  line.setAttribute("x2",p2.x);
  line.setAttribute("y2",p2.y);

  line.setAttribute("stroke","#e6dcc5");
  line.setAttribute("stroke-width", i%4==0?4:2);

  ticks.appendChild(line);
}

// NUMERI (🔥 FIX QUI)
const labels=document.getElementById("labels");

[2.8,3.5,4.2,5.0].forEach(v=>{

  let a=deg(v);

  // 👉 QUESTO È IL FIX IMPORTANTE
  let p=polar(a,112); // prima era 120 → troppo fuori

  let t=document.createElementNS("http://www.w3.org/2000/svg","text");

  t.setAttribute("x",p.x);
  t.setAttribute("y",p.y);

  t.setAttribute("text-anchor","middle");
  t.setAttribute("fill","#e6dcc5");
  t.setAttribute("font-size","16");
  t.setAttribute("font-weight","bold");

  t.textContent=v.toFixed(1);

  labels.appendChild(t);
});

// LANCETTA
function setValue(v){
  current=v;

  let a=deg(v);
  let p=polar(a,75);

  let n=document.getElementById("needle");
  n.setAttribute("x2",p.x);
  n.setAttribute("y2",p.y);

  document.getElementById("valueText").textContent=v.toFixed(2);
  document.getElementById("display").textContent=v.toFixed(2);
}

// ANIMAZIONE
function animate(target){
  let start=current;
  let t0=performance.now();

  function step(t){
    let p=Math.min((t-t0)/600,1);
    let val=start+(target-start)*p;

    setValue(val);

    if(p<1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

// CLICK → MUOVE
document.getElementById("gauge").onclick=()=>{
  let v=min+Math.random()*(max-min);
  animate(v);
};

setValue(current);
</script>

</body>
</html>
