<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#03070c;
      --bg2:#08111a;
      --text:#eef5fb;
      --muted:#aab7c4;

      --steel-1:#eef3f7;
      --steel-2:#cfd6dd;
      --steel-3:#a4adb7;
      --steel-4:#7a848f;
      --steel-5:#58616b;
      --steel-6:#394149;

      --red:#ff5c5c;
      --red-soft:#ff8c8c;
      --cyan:#b8f2ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(60,120,180,.15), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:84px;
      height:84px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f3f8fc;
      background:
        linear-gradient(145deg, rgba(210,220,228,.18), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1c2732, #0c131b);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.42),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .panel-shell{
      position:relative;
      border-radius:34px;
      padding:24px 18px 22px;
      overflow:hidden;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,.10) 7%,
          rgba(0,0,0,.06) 16%,
          rgba(255,255,255,.05) 32%,
          rgba(0,0,0,.10) 52%,
          rgba(255,255,255,.04) 72%,
          rgba(0,0,0,.12) 88%,
          rgba(255,255,255,.08) 100%
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.060) 0px,
          rgba(255,255,255,.022) 2px,
          rgba(0,0,0,.034) 4px,
          rgba(255,255,255,.016) 6px,
          rgba(0,0,0,.026) 8px
        ),
        linear-gradient(180deg,
          var(--steel-1) 0%,
          var(--steel-2) 16%,
          #f6f9fb 34%,
          var(--steel-3) 55%,
          #c7d0d7 74%,
          var(--steel-4) 100%
        );
      border:1px solid rgba(255,255,255,.24);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.20),
        inset 0 -18px 28px rgba(0,0,0,.18),
        0 14px 34px rgba(0,0,0,.22);
    }

    .panel-shell::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          transparent 10%,
          rgba(255,255,255,.04) 22%,
          transparent 38%,
          rgba(0,0,0,.04) 54%,
          transparent 70%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
      opacity:.95;
    }

    .screw{
      position:absolute;
      width:21px;
      height:21px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fcfeff 0%, #d3dbe2 18%, #909ba5 46%, #5a636d 72%, #343a42 100%);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.38),
        0 1px 3px rgba(0,0,0,.45);
      z-index:4;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:9px;
      height:1.5px;
      background:#2f3640;
      transform:rotate(-18deg);
      border-radius:2px;
    }

    .screw.tl{ top:10px; left:10px; }
    .screw.tr{ top:10px; right:10px; }
    .screw.bl{ bottom:10px; left:10px; }
    .screw.br{ bottom:10px; right:10px; }

    .instrument-card{
      position:relative;
      z-index:2;
      border-radius:30px;
      padding:18px 14px 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(68,77,87,.60), rgba(28,35,42,.74));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 -18px 26px rgba(0,0,0,.18),
        0 5px 14px rgba(0,0,0,.12);
      text-align:center;
    }

    .instrument-label{
      font-size:14px;
      letter-spacing:8px;
      color:#ffd6d6;
      margin-bottom:8px;
      text-shadow:
        0 0 8px rgba(255,92,92,.35),
        0 0 18px rgba(255,92,92,.20);
    }

    .dial-wrap{
      width:min(86vw, 390px);
      aspect-ratio:1/1;
      margin:0 auto 12px;
      position:relative;
    }

    .dial-svg{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 16px 18px rgba(0,0,0,.16));
    }

    .value{
      font-size:clamp(42px, 9vw, 64px);
      font-weight:700;
      line-height:1;
      margin-bottom:8px;
    }

    .sub{
      font-size:clamp(18px, 3.8vw, 28px);
      color:var(--muted);
      line-height:1.2;
    }

    .note{
      margin-top:18px;
      text-align:center;
      color:#d7e3ee;
      font-size:14px;
      line-height:1.4;
      opacity:.9;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        border-radius:22px;
        font-size:34px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .panel-shell{
        padding:22px 14px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Passo 1 corretto: quadrante PH con interno acciaio satinato, numeri esterni rossi e lancetta rossa</p>
      </div>
    </div>

    <div class="panel-shell">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="instrument-card">
        <div class="instrument-label">P H</div>

        <div class="dial-wrap">
          <svg class="dial-svg" viewBox="0 0 400 400" aria-hidden="true">
            <defs>
              <radialGradient id="bezelGrad" cx="36%" cy="28%">
                <stop offset="0%" stop-color="#edf2f6"/>
                <stop offset="16%" stop-color="#c6ced6"/>
                <stop offset="42%" stop-color="#7d8791"/>
                <stop offset="72%" stop-color="#4c555f"/>
                <stop offset="100%" stop-color="#2f353b"/>
              </radialGradient>

              <linearGradient id="faceSteel" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f5f8fb"/>
                <stop offset="18%" stop-color="#d5dde4"/>
                <stop offset="34%" stop-color="#a3adb8"/>
                <stop offset="52%" stop-color="#edf2f6"/>
                <stop offset="70%" stop-color="#89939e"/>
                <stop offset="100%" stop-color="#5a636d"/>
              </linearGradient>

              <linearGradient id="faceSteel2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,.30)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,.14)"/>
              </linearGradient>

              <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffd9d9"/>
                <stop offset="45%" stop-color="#ff8c8c"/>
                <stop offset="100%" stop-color="#ff5c5c"/>
              </linearGradient>

              <filter id="ringGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5.5" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="4.5" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.6"/>
              </filter>

              <pattern id="steelLines" width="8" height="8" patternUnits="userSpaceOnUse">
                <rect width="8" height="8" fill="transparent"></rect>
                <rect x="0" y="0" width="1" height="8" fill="rgba(255,255,255,.06)"></rect>
                <rect x="4" y="0" width="1" height="8" fill="rgba(0,0,0,.04)"></rect>
              </pattern>
            </defs>

            <!-- anello esterno -->
            <circle cx="200" cy="200" r="150" fill="url(#bezelGrad)"/>
            <circle cx="200" cy="200" r="135" fill="#242c34" opacity=".42"/>
            <circle cx="200" cy="200" r="124" fill="url(#faceSteel)"/>
            <circle cx="200" cy="200" r="124" fill="url(#steelLines)" opacity=".55"/>
            <circle cx="200" cy="200" r="124" fill="url(#faceSteel2)" opacity=".55"/>

            <!-- ring interno azzurro -->
            <circle cx="200" cy="200" r="119" fill="none" stroke="#b8f2ff" stroke-width="4.5" filter="url(#ringGlow)"/>

            <!-- tondo centrale -->
            <circle cx="200" cy="200" r="70" fill="#d9e0e6" opacity=".94"/>
            <circle cx="200" cy="200" r="70" fill="url(#steelLines)" opacity=".40"/>
            <circle cx="200" cy="200" r="34" fill="#edf3f8"/>
            <circle cx="200" cy="200" r="34" fill="none" stroke="rgba(0,0,0,.10)" stroke-width="1.2"/>

            <!-- tacche -->
            <g stroke="#b8f2ff" stroke-linecap="round" filter="url(#ringGlow)">
              <line x1="116" y1="134" x2="92" y2="114" stroke-width="9"/>
              <line x1="138" y1="114" x2="122" y2="92" stroke-width="7"/>
              <line x1="166" y1="101" x2="155" y2="75" stroke-width="9"/>
              <line x1="196" y1="96" x2="195" y2="69" stroke-width="7"/>
              <line x1="226" y1="99" x2="234" y2="74" stroke-width="9"/>
              <line x1="254" y1="110" x2="270" y2="89" stroke-width="7"/>
              <line x1="279" y1="128" x2="301" y2="111" stroke-width="9"/>
              <line x1="297" y1="152" x2="323" y2="141" stroke-width="7"/>
              <line x1="307" y1="181" x2="334" y2="176" stroke-width="9"/>
              <line x1="308" y1="211" x2="334" y2="214" stroke-width="7"/>
              <line x1="299" y1="240" x2="324" y2="251" stroke-width="9"/>
              <line x1="282" y1="264" x2="302" y2="283" stroke-width="7"/>
            </g>

            <!-- numeri esterni rossi -->
            <g fill="#ff8c8c" font-size="19" font-weight="700" text-anchor="middle" filter="url(#redGlow)">
              <text x="252" y="88">2.8</text>
              <text x="309" y="152">3.5</text>
              <text x="319" y="232">4.2</text>
              <text x="266" y="301">5.0</text>
            </g>

            <!-- lancetta rossa -->
            <g transform="rotate(-26 200 200)">
              <line x1="200" y1="200" x2="200" y2="92" stroke="url(#needleGrad)" stroke-width="11" stroke-linecap="round" filter="url(#redGlow)"/>
            </g>

            <!-- mozzo -->
            <circle cx="200" cy="200" r="31" fill="#f4f8fc"/>
            <circle cx="200" cy="200" r="31" fill="none" stroke="rgba(0,0,0,.10)" stroke-width="1.2"/>

            <!-- vetro -->
            <ellipse cx="162" cy="118" rx="70" ry="24" fill="rgba(255,255,255,.18)" transform="rotate(-18 162 118)" filter="url(#glassBlur)"/>
            <ellipse cx="254" cy="254" rx="36" ry="13" fill="rgba(255,255,255,.07)" transform="rotate(22 254 254)" filter="url(#glassBlur)"/>
            <circle cx="200" cy="200" r="124" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="1.3"/>
          </svg>
        </div>

        <div class="value">3.50</div>
        <div class="sub">ultima misurazione</div>
      </div>
    </div>

    <div class="note">
      Qui stiamo sistemando solo il quadrante PH. Se questo va bene, al passo dopo copiamo lo stesso stile sugli altri strumenti.
    </div>
  </div>
</body>
</html>
