<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg:#071629;
      --panel:#0d1b2b;
      --panel-2:#102235;
      --ring:#cfd6dd;
      --ring-dark:#66707a;
      --face:#0b1016;
      --face-2:#151c24;
      --tick:#d8d0b5;
      --text:#f4f6f8;
      --muted:#9aa7b3;
      --needle:#e13333;
      --needle-hi:#ffb0b0;
      --accent:#8ec5ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(40,90,150,.18), transparent 28%),
        linear-gradient(180deg, #071629 0%, #061322 100%);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      padding:28px 16px 40px;
    }

    .app{
      width:min(430px, 100%);
      text-align:center;
    }

    .title{
      font-size:28px;
      letter-spacing:2px;
      margin:8px 0 18px;
      color:var(--text);
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      border:1px solid rgba(255,255,255,.05);
      border-radius:28px;
      padding:22px 14px 22px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 18px 36px rgba(0,0,0,.35);
    }

    .gauge-wrap{
      width:100%;
      max-width:380px;
      margin:0 auto;
    }

    .gauge{
      width:100%;
      height:auto;
      display:block;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.35));
    }

    .value{
      margin-top:14px;
      font-size:64px;
      line-height:1;
      font-weight:300;
      letter-spacing:1px;
      color:var(--text);
    }

    .sub{
      margin-top:10px;
      font-size:18px;
      color:var(--muted);
    }

    @media (max-width:480px){
      .title{font-size:24px;}
      .value{font-size:56px;}
      .sub{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">PH</div>

    <div class="card">
      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 400 400" aria-hidden="true">
          <defs>
            <radialGradient id="ringGrad" cx="32%" cy="28%">
              <stop offset="0%" stop-color="#eef2f5"/>
              <stop offset="28%" stop-color="var(--ring)"/>
              <stop offset="72%" stop-color="var(--ring-dark)"/>
              <stop offset="100%" stop-color="#2b3138"/>
            </radialGradient>

            <radialGradient id="faceGrad" cx="45%" cy="38%">
              <stop offset="0%" stop-color="#202a35"/>
              <stop offset="45%" stop-color="var(--face-2)"/>
              <stop offset="100%" stop-color="var(--face)"/>
            </radialGradient>

            <radialGradient id="hubGrad" cx="35%" cy="35%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="35%" stop-color="#d7dde4"/>
              <stop offset="75%" stop-color="#8d98a2"/>
              <stop offset="100%" stop-color="#525a63"/>
            </radialGradient>

            <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="8"/>
            </filter>

            <filter id="needleShadow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="2.2"/>
            </filter>
          </defs>

          <!-- ombra -->
          <ellipse cx="200" cy="206" rx="136" ry="136" fill="rgba(0,0,0,.35)" filter="url(#shadow)"/>

          <!-- ghiera -->
          <circle cx="200" cy="190" r="148" fill="url(#ringGrad)"/>

          <!-- quadrante -->
          <circle cx="200" cy="190" r="124" fill="#0b1016"/>
          <circle cx="200" cy="190" r="120" fill="url(#faceGrad)"/>
          <circle cx="200" cy="190" r="119" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.2"/>

          <!-- arco principale -->
          <path
            d="M 88 246 A 116 116 0 0 1 312 246"
            fill="none"
            stroke="var(--tick)"
            stroke-width="4"
            stroke-linecap="round"
          />

          <!-- tacche -->
          <g stroke="var(--tick)" stroke-width="5" stroke-linecap="round">
            <line x1="95"  y1="241" x2="76"  y2="255"/>
            <line x1="128" y1="203" x2="111" y2="191"/>
            <line x1="171" y1="180" x2="164" y2="158"/>
            <line x1="200" y1="174" x2="200" y2="150"/>
            <line x1="229" y1="180" x2="236" y2="158"/>
            <line x1="272" y1="203" x2="289" y2="191"/>
            <line x1="305" y1="241" x2="324" y2="255"/>
          </g>

          <!-- numeri -->
          <g fill="var(--tick)" font-size="18" font-weight="700" text-anchor="middle">
            <text x="96"  y="278">2.8</text>
            <text x="150" y="154">3.5</text>
            <text x="250" y="154">4.2</text>
            <text x="304" y="278">5.0</text>
          </g>

          <!-- sottile arco accent -->
          <path
            d="M 129 170 A 80 80 0 0 1 271 170"
            fill="none"
            stroke="rgba(142,197,255,.18)"
            stroke-width="2"
            stroke-linecap="round"
          />

          <!-- ombra lancetta -->
          <g transform="rotate(34 200 190)">
            <polygon
              points="196,190 204,190 202,86 198,86"
              fill="rgba(0,0,0,.45)"
              filter="url(#needleShadow)"
              transform="translate(3,2)"
            />
          </g>

          <!-- lancetta -->
          <g transform="rotate(34 200 190)">
            <polygon points="194,190 206,190 202,88 198,88" fill="var(--needle)"/>
            <rect x="199.15" y="92" width="1.7" height="90" rx="0.85" fill="var(--needle-hi)" opacity=".78"/>
          </g>

          <!-- base -->
          <circle cx="200" cy="190" r="34" fill="#171d24"/>

          <!-- perno -->
          <circle cx="200" cy="190" r="28" fill="url(#hubGrad)"/>
          <circle cx="200" cy="190" r="28" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <circle cx="200" cy="190" r="8" fill="rgba(255,255,255,.20)"/>

          <!-- riflessi vetro -->
          <ellipse cx="148" cy="116" rx="52" ry="16" fill="rgba(255,255,255,.13)" transform="rotate(-18 148 116)"/>
          <ellipse cx="258" cy="266" rx="22" ry="7" fill="rgba(255,255,255,.05)" transform="rotate(20 258 266)"/>
        </svg>
      </div>

      <div class="value">3.50</div>
      <div class="sub">ultima misurazione</div>
    </div>
  </div>
</body>
</html>
