<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
:root{
  --bg:#071629;
  --text:#f3f4f6;
  --muted:#cfd5db;
  --tick:#d8d0b2;
  --num:#e7dcc0;
  --needle:#d92929;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px 15px;
}

.app{
  width:100%;
  max-width:400px;
  text-align:center;
}

.title{
  font-size:22px;
  letter-spacing:2px;
  margin-bottom:20px;
}

svg{
  width:100%;
  filter: drop-shadow(0 18px 25px rgba(0,0,0,.4));
}

.value{
  font-size:64px;
  margin-top:18px;
  font-weight:300;
}

.sub{
  font-size:18px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="app">
<div class="title">PH</div>

<svg viewBox="0 0 400 400">

<!-- ghiera -->
<circle cx="200" cy="200" r="150"
fill="url(#steel)"/>

<!-- quadrante -->
<circle cx="200" cy="200" r="125"
fill="url(#face)"/>

<!-- arco -->
<path d="M 80 260 A 120 120 0 0 1 320 260"
stroke="var(--tick)"
stroke-width="3.5"
fill="none"
stroke-linecap="round"/>

<!-- TACCHETTE -->
<g stroke="var(--tick)" stroke-width="5" stroke-linecap="round">

<line x1="80" y1="260" x2="60" y2="275"/>
<line x1="120" y1="210" x2="105" y2="195"/>
<line x1="170" y1="180" x2="165" y2="155"/>

<line x1="200" y1="175" x2="200" y2="145"/>

<line x1="230" y1="180" x2="235" y2="155"/>
<line x1="280" y1="210" x2="295" y2="195"/>
<line x1="320" y1="260" x2="340" y2="275"/>

</g>

<!-- NUMERI (corretti) -->
<g fill="var(--num)" font-size="20" font-weight="bold" text-anchor="middle">

<text x="85" y="300">2.8</text>
<text x="155" y="165">3.5</text>
<text x="245" y="165">4.2</text>
<text x="315" y="300">5.0</text>

</g>

<!-- LANCETTA -->
<g transform="rotate(35 200 200)">
<polygon points="195,200 205,200 202,95 198,95"
fill="var(--needle)"/>
</g>

<!-- PERNO -->
<circle cx="200" cy="200" r="28"
fill="url(#center)"/>

<!-- RIFLESSI -->
<ellipse cx="150" cy="120" rx="60" ry="18"
fill="rgba(255,255,255,.15)"
transform="rotate(-20 150 120)"/>

<defs>

<radialGradient id="steel">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="40%" stop-color="#bfbfbf"/>
<stop offset="100%" stop-color="#2a2a2a"/>
</radialGradient>

<radialGradient id="face">
<stop offset="0%" stop-color="#2f3338"/>
<stop offset="100%" stop-color="#0f1114"/>
</radialGradient>

<radialGradient id="center">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#555"/>
</radialGradient>

</defs>

</svg>

<div class="value">3.50</div>
<div class="sub">ultima misurazione</div>

</div>

</body>
</html>
