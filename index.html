<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#071629,#081b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.value{
  font-size:60px;
  margin-top:20px;
}

.sub{
  color:#aaa;
}

/* display stile macchina */
.display{
  fill:#dcdcdc;
  stroke:#999;
  stroke-width:2;
  rx:6;
}

.display-text{
  font-size:16px;
  fill:#222;
  font-family:monospace;
  text-anchor:middle;
}
</style>
</head>

<body>

<div class="card">
<h2>PH</h2>

<svg viewBox="0 0 300 300" width="300">

<!-- cerchio -->
<circle cx="150" cy="150" r="110" fill="#000"/>

<!-- arco -->
<path d="M 40 170 A 110 110 0 0 1 260 170"
      stroke="#e6dcc5"
      stroke-width="6"
      fill="none"
      stroke-linecap="round"/>

<!-- numeri -->
<text x="50" y="190" fill="#e6dcc5">2.8</text>
<text x="105" y="95" fill="#e6dcc5">3.5</text>
<text x="190" y="95" fill="#e6dcc5">4.2</text>
<text x="240" y="190" fill="#e6dcc5">5.0</text>

<!-- DISPLAY INTERNO -->
<rect x="110" y="175" width="80" height="30" class="display"/>
<text id="miniValue" x="150" y="195" class="display-text">3.50</text>

<!-- lancetta -->
<line id="needle"
      x1="150" y1="150"
      x2="150" y2="70"
      stroke="red"
      stroke-width="4"
      stroke-linecap="round"/>

<!-- centro -->
<circle cx="150" cy="150" r="8" fill="white"/>

</svg>

<div class="value" id="bigValue">3.50</div>
<div class="sub">ultima misurazione</div>

</div>

<script>
const min = 2.8;
const max = 5.0;

// mezzo cerchio corretto
const startAngle = 150;
const endAngle = 30;

const cx = 150;
const cy = 150;
const radius = 80;

let currentValue = 3.5;

function valueToAngle(value){
  const ratio = (value - min) / (max - min);
  return startAngle + ratio * (endAngle - startAngle);
}

function updateGauge(value){

  const angle = valueToAngle(value) * Math.PI / 180;

  const x = cx + radius * Math.cos(angle);
  const y = cy - radius * Math.sin(angle);

  const needle = document.getElementById("needle");

  needle.setAttribute("x2", x);
  needle.setAttribute("y2", y);

  document.getElementById("bigValue").innerText = value.toFixed(2);
  document.getElementById("miniValue").innerText = value.toFixed(2);
}

// 🔥 ANIMAZIONE LANCETTA
function animateTo(target){

  const start = currentValue;
  const duration = 800;
  const startTime = performance.now();

  function frame(time){
    const progress = Math.min((time - startTime)/duration,1);
    const value = start + (target - start) * progress;

    updateGauge(value);

    if(progress < 1){
      requestAnimationFrame(frame);
    } else {
      currentValue = target;
    }
  }

  requestAnimationFrame(frame);
}

// click per testare movimento
document.body.addEventListener("click", () => {
  const randomPH = (Math.random() * (max - min) + min);
  animateTo(randomPH);
});

// iniziale
updateGauge(currentValue);
</script>

</body>
</html>
