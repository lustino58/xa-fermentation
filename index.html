<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#07101a;
      --text:#eef4fa;
      --muted:#a8b6c4;

      --ph:#8af0bb;
      --ph-ring:#a8e8ff;

      --gravity:#79bfff;
      --gravity-ring:#79bfff;

      --temp:#ffc172;
      --temp-ring:#ffc172;

      --count:#d094ff;
      --count-ring:#d094ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(70,120,180,.14), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:1080px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:10px;
    }

    .lang-btn{
      border:none;
      border-radius:16px;
      padding:10px 14px;
      font-size:14px;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(170,188,204,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #4c6780, #2d465c);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 0 18px rgba(70,140,220,.14);
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:84px;
      height:84px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f2f7fb;
      background:
        linear-gradient(145deg, rgba(210,220,228,.20), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1a2530, #0b1219);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.45),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .dashboard,
    .empty,
    .batch-card,
    .detail-card,
    .chart-card,
    .measurements,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card,
    .alert-box{
      border-radius:26px;
      border:1px solid rgba(180,196,210,.10);
      background:
        linear-gradient(180deg, rgba(130,147,163,.12), rgba(47,58,68,.08)),
        linear-gradient(180deg, #09111a 0%, #060d15 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 24px rgba(0,110,210,.08);
    }

    .dashboard{
      padding:18px;
      margin-bottom:20px;
    }

    /* PANNELLO ACCIAIO SATINATO REALE */
    .metal-panel{
      position:relative;
      border-radius:34px;
      padding:22px 16px 18px;
      margin-bottom:18px;
      overflow:hidden;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,.22) 0%,
          rgba(255,255,255,.08) 7%,
          rgba(0,0,0,.08) 16%,
          rgba(255,255,255,.05) 32%,
          rgba(0,0,0,.10) 52%,
          rgba(255,255,255,.04) 72%,
          rgba(0,0,0,.12) 88%,
          rgba(255,255,255,.08) 100%
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.060) 0px,
          rgba(255,255,255,.024) 2px,
          rgba(0,0,0,.040) 4px,
          rgba(255,255,255,.018) 6px,
          rgba(0,0,0,.032) 8px
        ),
        linear-gradient(180deg,
          #c8d0d7 0%,
          #8d98a3 16%,
          #d5dde4 36%,
          #7c8792 58%,
          #bcc5cc 78%,
          #707b86 100%
        );
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.20),
        inset 0 -18px 28px rgba(0,0,0,.20),
        0 12px 30px rgba(0,0,0,.24);
    }

    .metal-panel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          transparent 10%,
          rgba(255,255,255,.04) 22%,
          transparent 38%,
          rgba(0,0,0,.04) 54%,
          transparent 70%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
      opacity:.95;
    }

    .screw{
      position:absolute;
      width:20px;
      height:20px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fcfeff 0%, #d3dbe2 18%, #909ba5 46%, #5a636d 72%, #343a42 100%);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.38),
        0 1px 3px rgba(0,0,0,.45);
      z-index:4;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:9px;
      height:1.5px;
      background:#2f3640;
      transform:rotate(-20deg);
      border-radius:2px;
    }

    .screw.tl{ top:10px; left:10px; }
    .screw.tr{ top:10px; right:10px; }
    .screw.bl{ bottom:10px; left:10px; }
    .screw.br{ bottom:10px; right:10px; }

    .gauges{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      position:relative;
      z-index:2;
    }

    /* CARD PIÙ METALLICHE, NON NERE */
    .gauge-card{
      border-radius:30px;
      padding:14px 12px 18px;
      text-align:center;
      min-width:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(20,28,36,.82), rgba(8,13,18,.88));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        inset 0 -18px 26px rgba(0,0,0,.32),
        0 4px 14px rgba(0,0,0,.18);
    }

    .gauge-card.alert-warning{ border-color:rgba(255,213,111,.24); }
    .gauge-card.alert-critical{ border-color:rgba(255,113,124,.24); }

    .g-label{
      font-size:11px;
      letter-spacing:5px;
      color:#e5edf5;
      margin-bottom:10px;
    }

    .dial-wrap{
      width:220px;
      height:220px;
      margin:0 auto 8px;
      position:relative;
    }

    .dial-svg{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 12px 16px rgba(0,0,0,.22));
    }

    .g-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .g-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.25;
    }

    .main-btn,
    .nav-btn,
    .small-btn,
    .template-btn{
      border:none;
      color:#eef6fd;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(170,188,204,.18), rgba(42,61,78,.14)),
        linear-gradient(180deg, #4c6780, #2d465c);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 0 18px rgba(70,140,220,.14);
    }

    .main-btn{
      width:100%;
      border-radius:24px;
      padding:18px;
      font-size:22px;
      margin-bottom:12px;
    }

    .nav-btn{
      width:100%;
      border-radius:20px;
      padding:14px;
      font-size:16px;
      margin-bottom:14px;
    }

    .small-btn,
    .template-btn{
      border-radius:18px;
      padding:14px 12px;
      font-size:15px;
      width:100%;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
      line-height:1.3;
    }

    .section-title{
      margin:18px 0 12px;
      color:#dce8f3;
      font-size:13px;
      letter-spacing:5px;
      text-transform:uppercase;
    }

    .empty,
    .batch-card,
    .detail-card,
    .process-card,
    .templates-card,
    .additions-card,
    .filters-card,
    .alert-box{
      padding:18px;
      margin-bottom:14px;
    }

    .empty{
      color:var(--muted);
      text-align:center;
      line-height:1.4;
    }

    .alert-box{
      border-radius:18px;
      line-height:1.45;
      font-size:14px;
    }

    .alert-box.ok{ border-color:rgba(121,240,182,.16); }
    .alert-box.warning{ border-color:rgba(255,213,111,.18); }
    .alert-box.critical{ border-color:rgba(255,113,124,.22); }

    .alert-title{
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }

    .batch-card{ cursor:pointer; }
    .batch-card.status-card-critical{ border-color:rgba(255,113,124,.16); }
    .batch-card.status-card-warning{ border-color:rgba(255,213,111,.14); }

    .batch-top,
    .detail-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .batch-name,
    .detail-name{
      font-size:26px;
      font-weight:700;
      line-height:1.05;
      word-break:break-word;
    }

    .right-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    .type-badge,
    .status-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid rgba(164,185,203,.12);
    }

    .type-badge{
      color:#eaf5ff;
      background:
        linear-gradient(180deg, rgba(120,138,153,.16), rgba(40,55,68,.12)),
        linear-gradient(180deg, #1c3246 0%, #152535 100%);
    }

    .status-active{ color:#dbffe9; background:linear-gradient(180deg, rgba(78,160,112,.22), rgba(30,87,52,.20)); }
    .status-slow{ color:#fff4d1; background:linear-gradient(180deg, rgba(185,142,44,.24), rgba(108,78,18,.20)); }
    .status-critical{ color:#ffe0e0; background:linear-gradient(180deg, rgba(170,66,66,.24), rgba(100,30,30,.20)); }
    .status-complete{ color:#e0f1ff; background:linear-gradient(180deg, rgba(58,110,170,.24), rgba(29,57,94,.20)); }

    .metrics,
    .process-grid,
    .templates-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .metric,
    .process-item{
      background:linear-gradient(180deg, #0f1822 0%, #0a121a 100%);
      border:1px solid rgba(143,164,182,.09);
      border-radius:18px;
      padding:14px 12px;
      min-height:84px;
      min-width:0;
    }

    .metric-label,
    .process-label,
    .templates-title,
    .chart-title,
    .measurements-title,
    .process-title,
    .additions-title,
    .filters-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
      margin-bottom:10px;
      line-height:1.25;
      word-break:break-word;
    }

    .metric-value,
    .process-value{
      font-size:20px;
      font-weight:700;
      line-height:1.25;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .detail-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .chart-card,
    .measurements{
      padding:14px 12px;
      margin-bottom:12px;
    }

    .chart-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-chart{
      background:linear-gradient(180deg, #0b131b, #081018);
      border:1px solid rgba(143,164,182,.08);
      border-radius:16px;
      padding:10px;
      min-width:0;
    }

    .mini-chart svg{
      width:100%;
      height:120px;
      display:block;
    }

    .legend{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.25;
    }

    .template-btn{
      text-align:left;
      min-height:92px;
    }

    .template-name{
      display:block;
      font-size:17px;
      font-weight:700;
      margin-bottom:6px;
      word-break:break-word;
    }

    .template-desc{
      display:block;
      font-size:12px;
      color:#d8e6f3;
      opacity:.9;
      line-height:1.35;
      word-break:break-word;
    }

    .filters-grid{
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:10px;
    }

    .filter-input,
    .filter-select{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d1620;
      color:#eef6fd;
      font-size:14px;
      outline:none;
      min-width:0;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      vertical-align:top;
      text-align:left;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    th{
      color:#dfeaf5;
      font-weight:700;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1.2px;
      line-height:1.2;
    }

    td{
      font-size:14px;
      line-height:1.35;
    }

    tr:last-child td{
      border-bottom:none;
    }

    .muted{
      color:var(--muted);
    }

    .measure-table th:nth-child(1), .measure-table td:nth-child(1){ width:14%; }
    .measure-table th:nth-child(2), .measure-table td:nth-child(2){ width:18%; }
    .measure-table th:nth-child(3), .measure-table td:nth-child(3){ width:22%; }
    .measure-table th:nth-child(4), .measure-table td:nth-child(4){ width:20%; }
    .measure-table th:nth-child(5), .measure-table td:nth-child(5){ width:26%; }

    .additions-table th:nth-child(1), .additions-table td:nth-child(1){ width:12%; }
    .additions-table th:nth-child(2), .additions-table td:nth-child(2){ width:18%; }
    .additions-table th:nth-child(3), .additions-table td:nth-child(3){ width:20%; }
    .additions-table th:nth-child(4), .additions-table td:nth-child(4){ width:14%; }
    .additions-table th:nth-child(5), .additions-table td:nth-child(5){ width:16%; }
    .additions-table th:nth-child(6), .additions-table td:nth-child(6){ width:20%; }

    @media (max-width:900px){
      .filters-grid{ grid-template-columns:1fr; }
    }

    @media (max-width:700px){
      .chart-box,
      .templates-grid,
      .detail-actions{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      body{
        padding:16px 10px 28px;
      }

      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        font-size:34px;
        border-radius:22px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .gauges{
        grid-template-columns:1fr;
      }

      .dial-wrap{
        width:200px;
        height:200px;
      }

      .g-value{
        font-size:28px;
      }

      .batch-top,
      .detail-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .right-stack{
        align-items:flex-start;
      }

      .batch-name,
      .detail-name{
        font-size:22px;
      }

      .metrics,
      .process-grid{
        grid-template-columns:1fr;
      }

      .measure-table{ min-width:520px; }
      .additions-table{ min-width:700px; }
    }
  </style>
</head>

    function t(key){
      return (i18n[appLang] && i18n[appLang][key]) || key;
    }

    function toggleLanguage(){
      appLang = appLang === "en" ? "it" : "en";
      localStorage.setItem("xa_lang", appLang);
      document.documentElement.lang = appLang;
      render();
    }

    function save(){
      localStorage.setItem("batches", JSON.stringify(batches));
    }

    function formatTemp(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + "°C";
    }

    function formatPressure(v){
      if(v === undefined || v === null || v === "") return "-";
      return v + " bar";
    }

    function formatValue(v){
      if(v === undefined || v === null || v === "") return "-";
      return v;
    }

    function parseNum(v){
      const n = parseFloat(String(v).replace(",", "."));
      return isNaN(n) ? null : n;
    }

    function mapValue(value, inMin, inMax, outMin, outMax){
      if(isNaN(value)) return outMin;
      if(value < inMin) value = inMin;
      if(value > inMax) value = inMax;
      return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }

    function getDay(b){
      if(!b.createdAt) return "-";
      const start = new Date(b.createdAt);
      const now = new Date();
      return Math.max(1, Math.floor((now - start) / 86400000) + 1);
    }

    function ensureBatchFields(b){
      if(!b.baseFermentable) b.baseFermentable = "-";
      if(!b.liters) b.liters = "-";
      if(!b.nutrients) b.nutrients = "-";
      if(!b.sugar) b.sugar = "-";
      if(!b.fruit) b.fruit = "-";
      if(!b.botanicals) b.botanicals = "-";
      if(!b.dryAdjunct) b.dryAdjunct = "-";
      if(!b.otherAdditions) b.otherAdditions = "-";
      if(!b.targetPressure) b.targetPressure = "-";
      if(!b.processNotes) b.processNotes = "-";
      if(!b.sensoryNotes) b.sensoryNotes = "-";
      if(!Array.isArray(b.measurements)) b.measurements = [];
      if(!Array.isArray(b.additionsLog)) b.additionsLog = [];
    }

    function getMeasurements(b){
      ensureBatchFields(b);
      return b.measurements;
    }

    function getLatestMeasurement(b){
      const list = getMeasurements(b);
      if(list.length === 0) return null;
      return list[list.length - 1];
    }

    function getABV(b){
      const og = parseNum(b.og);
      const latest = getLatestMeasurement(b);
      const fg = latest ? parseNum(latest.gravity) : null;
      if(og === null || fg === null) return "-";
      return ((og - fg) * 131).toFixed(2) + "%";
    }

    function getStatus(b){
      const latest = getLatestMeasurement(b);
      const og = parseNum(b.og);
      const current = latest ? parseNum(latest.gravity) : null;
      const temp = latest ? parseNum(latest.temp) : null;
      const ph = latest ? parseNum(latest.ph) : null;

      if(temp !== null && (temp < 5 || temp > 40)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };
      if(ph !== null && (ph < 2.8 || ph > 4.6)) return { text:t("statusCritical"), cls:"status-critical", key:"critical" };

      if(og !== null && current !== null){
        const diff = og - current;
        if(diff >= 0.030) return { text:t("statusComplete"), cls:"status-complete", key:"complete" };
        if(diff >= 0.010) return { text:t("statusActive"), cls:"status-active", key:"active" };
        return { text:t("statusSlow"), cls:"status-slow", key:"slow" };
      }

      return { text:t("statusActive"), cls:"status-active", key:"active" };
    }

    function getBatchAlerts(b){
      const alerts = [];
      const latest = getLatestMeasurement(b);
      if(!latest){
        return { level:"ok", messages:[t("alertGood")] };
      }

      const temp = parseNum(latest.temp);
      const ph = parseNum(latest.ph);
      const og = parseNum(b.og);
      const gravity = parseNum(latest.gravity);

      if(temp !== null && temp > 35) alerts.push({ level:"critical", text:t("alertTempHigh") });
      else if(temp !== null && temp > 30) alerts.push({ level:"warning", text:t("alertTempHigh") });

      if(temp !== null && temp < 10) alerts.push({ level:"warning", text:t("alertTempLow") });

      if(ph !== null && ph > 4.4) alerts.push({ level:"warning", text:t("alertPhHigh") });
      if(ph !== null && ph < 2.9) alerts.push({ level:"critical", text:t("alertPhLow") });

      if(og !== null && gravity !== null){
        const diff = og - gravity;
        if(diff < 0.008) alerts.push({ level:"warning", text:t("alertSlow") });
        if(diff >= 0.030) alerts.push({ level:"ok", text:t("alertComplete") });
      }

      if(alerts.some(a => a.level === "critical")){
        return { level:"critical", messages:alerts.map(a => a.text) };
      }
      if(alerts.some(a => a.level === "warning")){
        return { level:"warning", messages:alerts.map(a => a.text) };
      }
      return { level:"ok", messages:alerts.length ? alerts.map(a => a.text) : [t("alertGood")] };
    }

    function getGaugeAlertClass(kind, topBatch){
      if(!topBatch) return "alert-ok";
      const latest = getLatestMeasurement(topBatch);
      if(!latest) return "alert-ok";

      if(kind === "ph"){
        const ph = parseNum(latest.ph);
        if(ph === null) return "alert-ok";
        if(ph < 2.9 || ph > 4.6) return "alert-critical";
        if(ph < 3.1 || ph > 4.3) return "alert-warning";
        return "alert-ok";
      }

      if(kind === "temp"){
        const temp = parseNum(latest.temp);
        if(temp === null) return "alert-ok";
        if(temp < 5 || temp > 40) return "alert-critical";
        if(temp < 10 || temp > 30) return "alert-warning";
        return "alert-ok";
      }

      if(kind === "gravity"){
        const status = getStatus(topBatch);
        if(status.key === "critical") return "alert-critical";
        if(status.key === "slow") return "alert-warning";
        return "alert-ok";
      }

      if(kind === "count"){
        return batches.length > 0 ? "alert-ok" : "alert-warning";
      }

      return "alert-ok";
    }

    function matchesArchiveFilters(b){
      const status = getStatus(b);
      const search = archiveSearch.trim().toLowerCase();

      if(archiveTypeFilter){
        const typeValue = String(b.type || "").toLowerCase();
        if(typeValue !== archiveTypeFilter.toLowerCase()) return false;
      }

      if(archiveStatusFilter){
        if(status.key !== archiveStatusFilter) return false;
      }

      if(search){
        const haystack = [
          b.name, b.type, b.culture, b.baseFermentable, b.nutrients, b.sugar, b.fruit,
          b.botanicals, b.dryAdjunct, b.otherAdditions, b.processNotes, b.sensoryNotes
        ].join(" ").toLowerCase();

        if(!haystack.includes(search)) return false;
      }

      return true;
    }

    function makePath(points, width, height, minVal, maxVal){
      if(points.length === 0) return "";
      if(points.length === 1){
        const y = height - ((points[0] - minVal) / (maxVal - minVal)) * height;
        return `M 10 ${y.toFixed(1)} L ${width - 10} ${y.toFixed(1)}`;
      }

      const usableW = width - 20;
      const usableH = height - 20;

      return points.map((val, idx) => {
        const x = 10 + (usableW / (points.length - 1)) * idx;
        const norm = (val - minVal) / (maxVal - minVal);
        const y = 10 + (usableH - (norm * usableH));
        return `${idx === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(" ");
    }

    function renderMiniChart(values, minVal, maxVal, color){
      const nums = values.map(v => parseNum(v)).filter(v => v !== null);
      const width = 280;
      const height = 120;
      const path = makePath(nums, width, height, minVal, maxVal);

      let dots = "";
      if(nums.length > 0){
        const usableW = width - 20;
        const usableH = height - 20;
        nums.forEach((val, idx) => {
          const x = nums.length === 1 ? width / 2 : 10 + (usableW / (nums.length - 1)) * idx;
          const norm = (val - minVal) / (maxVal - minVal);
          const y = 10 + (usableH - (norm * usableH));
          dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${color}" />`;
        });
      }

      return `
        <svg viewBox="0 0 280 120" preserveAspectRatio="none">
          <line x1="10" y1="10" x2="10" y2="110" stroke="rgba(255,255,255,.08)" />
          <line x1="10" y1="110" x2="270" y2="110" stroke="rgba(255,255,255,.08)" />
          <path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${dots}
        </svg>
      `;
    }

    function gaugeSVG({id,label,color,ringColor,value,display,subtitle,min,max,numbersMap}){
      const angle = mapValue(value ?? min, min, max, -60, 60);
      const cx = 110;
      const cy = 110;
      const rOuter = 94;
      const rBezel = 84;
      const rTick = 62;
      const rNumber = 52;

      let ticks = "";
      for(let i=0;i<=12;i++){
        const a = (-60 + i*10) * Math.PI/180;
        const isSmall = i % 2 !== 0;
        const r1 = isSmall ? rTick-8 : rTick-12;
        const r2 = rTick + 7;
        const x1 = cx + Math.cos(a)*r1;
        const y1 = cy + Math.sin(a)*r1;
        const x2 = cx + Math.cos(a)*r2;
        const y2 = cy + Math.sin(a)*r2;
        ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${ringColor}" stroke-width="${isSmall ? 5 : 6}" stroke-linecap="round" opacity="${isSmall ? .72 : .96}" />`;
      }

      let nums = "";
      numbersMap.forEach(n => {
        const a = n.angle * Math.PI/180;
        const x = cx + Math.cos(a)*rNumber;
        const y = cy + Math.sin(a)*rNumber;
        nums += `<text x="${x}" y="${y}" fill="#eef5fb" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">${n.label}</text>`;
      });

      return `
        <div class="gauge-card ${id}">
          <div class="g-label">${label}</div>
          <div class="dial-wrap">
            <svg class="dial-svg" viewBox="0 0 220 220" aria-hidden="true">
              <defs>
                <radialGradient id="${id}-bezel" cx="35%" cy="28%">
                  <stop offset="0%" stop-color="#e7edf2" stop-opacity=".95"/>
                  <stop offset="20%" stop-color="#b5bec6" stop-opacity=".95"/>
                  <stop offset="55%" stop-color="#646f79" stop-opacity=".98"/>
                  <stop offset="100%" stop-color="#2d3339" stop-opacity="1"/>
                </radialGradient>

                <radialGradient id="${id}-face" cx="50%" cy="38%">
                  <stop offset="0%" stop-color="#101a24"/>
                  <stop offset="55%" stop-color="#0a131b"/>
                  <stop offset="100%" stop-color="#050a10"/>
                </radialGradient>

                <radialGradient id="${id}-core" cx="50%" cy="42%">
                  <stop offset="0%" stop-color="#0b1218"/>
                  <stop offset="60%" stop-color="#05090e"/>
                  <stop offset="100%" stop-color="#02060a"/>
                </radialGradient>

                <radialGradient id="${id}-innerglow" cx="50%" cy="50%">
                  <stop offset="0%" stop-color="${ringColor}" stop-opacity=".22"/>
                  <stop offset="40%" stop-color="${ringColor}" stop-opacity=".10"/>
                  <stop offset="100%" stop-color="${ringColor}" stop-opacity="0"/>
                </radialGradient>

                <linearGradient id="${id}-needle" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#f8fbff"/>
                  <stop offset="35%" stop-color="${color}"/>
                  <stop offset="100%" stop-color="${color}"/>
                </linearGradient>

                <filter id="${id}-glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>

                <filter id="${id}-glassblur" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="1.2"/>
                </filter>
              </defs>

              <!-- housing -->
              <circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="url(#${id}-bezel)" />
              <circle cx="${cx}" cy="${cy}" r="${rBezel}" fill="#0c1319" opacity=".65" />
              <circle cx="${cx}" cy="${cy}" r="${rBezel-6}" fill="url(#${id}-face)" />

              <!-- illuminated ring -->
              <circle cx="${cx}" cy="${cy}" r="${rBezel-8}" fill="none" stroke="${ringColor}" stroke-width="3.5" opacity=".95" filter="url(#${id}-glow)" />
              <circle cx="${cx}" cy="${cy}" r="${rBezel-8}" fill="url(#${id}-innerglow)" opacity=".88" />

              <!-- ticks -->
              ${ticks}

              <!-- numbers -->
              ${nums}

              <!-- center face -->
              <circle cx="${cx}" cy="${cy}" r="38" fill="url(#${id}-core)" />
              <circle cx="${cx}" cy="${cy}" r="19" fill="#0f1821" opacity=".95" />

              <!-- needle -->
              <g transform="rotate(${angle} ${cx} ${cy})">
                <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-64}" stroke="url(#${id}-needle)" stroke-width="8" stroke-linecap="round" filter="url(#${id}-glow)" />
              </g>

              <!-- hub -->
              <circle cx="${cx}" cy="${cy}" r="18" fill="#ddefff" />
              <circle cx="${cx}" cy="${cy}" r="18" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="1"/>

              <!-- glass -->
              <ellipse cx="${cx-16}" cy="${cy-58}" rx="36" ry="11" fill="rgba(255,255,255,.20)" transform="rotate(-18 ${cx-16} ${cy-58})" filter="url(#${id}-glassblur)" />
              <ellipse cx="${cx+34}" cy="${cy+28}" rx="22" ry="8" fill="rgba(255,255,255,.05)" transform="rotate(20 ${cx+34} ${cy+28})" filter="url(#${id}-glassblur)" />
              <circle cx="${cx}" cy="${cy}" r="${rBezel-6}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.2"/>
            </svg>
          </div>
          <div class="g-value">${display}</div>
          <div class="g-sub">${subtitle}</div>
        </div>
      `;
    }

    function dashboardHTML(){
      const topBatch = getTopBatch();
      const latest = topBatch ? getLatestMeasurement(topBatch) : null;

      const ph = latest ? (parseNum(latest.ph) ?? 3.5) : 3.5;
      const gravity = latest ? (parseNum(latest.gravity) ?? 1.000) : 1.000;
      const temp = latest ? (parseNum(latest.temp) ?? 0) : 0;
      const count = batches.length;

      return `
        <div class="dashboard">
          <div class="metal-panel">
            <div class="screw tl"></div>
            <div class="screw tr"></div>
            <div class="screw bl"></div>
            <div class="screw br"></div>

            <div class="gauges">
              ${gaugeSVG({
                id:"ph",
                label:t("ph"),
                color:"var(--ph)",
                ringColor:"var(--ph-ring)",
                value:ph,
                display:topBatch && latest ? formatValue(latest.ph) : "-",
                subtitle:t("latestMeasurement"),
                min:2.8,
                max:5.0,
                numbersMap:[
                  {label:"2.8",angle:-56},
                  {label:"3.5",angle:-22},
                  {label:"4.2",angle:12},
                  {label:"5.0",angle:46}
                ]
              })}

              ${gaugeSVG({
                id:"gravity",
                label:t("gravity").toUpperCase(),
                color:"var(--gravity)",
                ringColor:"var(--gravity-ring)",
                value:gravity,
                display:topBatch && latest ? formatValue(latest.gravity) : "-",
                subtitle:t("latestMeasurement"),
                min:1.000,
                max:1.060,
                numbersMap:[
                  {label:"1.000",angle:-56},
                  {label:"1.020",angle:-22},
                  {label:"1.040",angle:12},
                  {label:"1.060",angle:46}
                ]
              })}

              ${gaugeSVG({
                id:"temp",
                label:t("temp").toUpperCase(),
                color:"var(--temp)",
                ringColor:"var(--temp-ring)",
                value:temp,
                display:topBatch && latest ? formatTemp(latest.temp) : "-",
                subtitle:t("tempScale"),
                min:0,
                max:50,
                numbersMap:[
                  {label:"0",angle:-56},
                  {label:"10",angle:-34},
                  {label:"20",angle:-12},
                  {label:"30",angle:10},
                  {label:"40",angle:32},
                  {label:"50",angle:52}
                ]
              })}

              ${gaugeSVG({
                id:"count",
                label:t("batches").toUpperCase(),
                color:"var(--count)",
                ringColor:"var(--count-ring)",
                value:count,
                display:String(count),
                subtitle:t("stored"),
                min:0,
                max:20,
                numbersMap:[
                  {label:"0",angle:-56},
                  {label:"5",angle:-24},
                  {label:"10",angle:8},
                  {label:"15",angle:34},
                  {label:"20",angle:54}
                ]
              })}
            </div>
          </div>

          ${selectedBatchIndex !== null && topBatch ? alertBoxHTML(topBatch) : ""}

          ${selectedBatchIndex === null
            ? `<button class="main-btn" onclick="addBatch()">${t("newBatch")}</button>
               <div class="hint">${t("tapBatchOpen")}</div>`
            : `<button class="nav-btn" onclick="backToArchive()">${t("backArchive")}</button>
               <div class="hint">${t("dashboardSelected")}</div>`
          }
        </div>
      `;
    }

    function archiveHTML(){
      let html = dashboardHTML();
      html += templatesHTML();
      html += filtersHTML();
      html += `<div class="section-title">${t("archive")}</div>`;

      const filtered = batches.filter(matchesArchiveFilters);

      if(batches.length === 0){
        html += `<div class="empty">${t("noBatches")}</div>`;
      } else if(filtered.length === 0){
        html += `<div class="empty">${t("noFilteredBatches")}</div>`;
      } else {
        filtered.forEach((b) => {
          const i = batches.indexOf(b);
          ensureBatchFields(b);
          const status = getStatus(b);
          const alerts = getBatchAlerts(b);
          const cardClass = alerts.level === "critical" ? "status-card-critical" : (alerts.level === "warning" ? "status-card-warning" : "");
          const latest = getLatestMeasurement(b);

          html += `
            <div class="batch-card ${cardClass}" onclick="openBatch(${i})">
              <div class="batch-top">
                <div class="batch-name">${b.name || "Unnamed"}</div>
                <div class="right-stack">
                  <div class="type-badge">${(b.type || t("typeUnknown")).toUpperCase()}</div>
                  <div class="status-badge ${status.cls}">${status.text}</div>
                </div>
              </div>

              <div class="metrics">
                <div class="metric">
                  <div class="metric-label">${t("day")}</div>
                  <div class="metric-value">${getDay(b)}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("culture")}</div>
                  <div class="metric-value">${formatValue(b.culture)}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("latestPh")}</div>
                  <div class="metric-value">${latest ? formatValue(latest.ph) : "-"}</div>
                </div>
                <div class="metric">
                  <div class="metric-label">${t("latestGravity")}</div>
                  <div class="metric-value">${latest ? formatValue(latest.gravity) : "-"}</div>
                </div>
              </div>
            </div>
          `;
        });
      }

      return html;
    }

    function detailHTML(i){
      const b = batches[i];
      if(!b) return archiveHTML();

      ensureBatchFields(b);
      const status = getStatus(b);
      const latest = getLatestMeasurement(b);
      const measures = getMeasurements(b);
      const phValues = measures.map(m => m.ph);
      const gravityValues = measures.map(m => m.gravity);

      return `
        ${dashboardHTML()}

        <div class="section-title">${t("batchDetail")}</div>

        <div class="detail-card">
          <div class="detail-top">
            <div class="detail-name">${b.name || "Unnamed"}</div>
            <div class="right-stack">
              <div class="type-badge">${(b.type || t("typeUnknown")).toUpperCase()}</div>
              <div class="status-badge ${status.cls}">${status.text}</div>
            </div>
          </div>

          ${alertBoxHTML(b)}

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">${t("day")}</div>
              <div class="metric-value">${getDay(b)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("culture")}</div>
              <div class="metric-value">${formatValue(b.culture)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("og")}</div>
              <div class="metric-value">${formatValue(b.og)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("abv")}</div>
              <div class="metric-value">${getABV(b)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestPh")}</div>
              <div class="metric-value">${latest ? formatValue(latest.ph) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestGravity")}</div>
              <div class="metric-value">${latest ? formatValue(latest.gravity) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestTemp")}</div>
              <div class="metric-value">${latest ? formatTemp(latest.temp) : "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">${t("latestPressure")}</div>
              <div class="metric-value">${latest ? formatPressure(latest.pressure) : "-"}</div>
            </div>
          </div>

          <div class="detail-actions">
            <button class="small-btn" onclick="addMeasurement(${i})">${t("addMeasurement")}</button>
            <button class="small-btn" onclick="addAddition(${i})">${t("addAddition")}</button>
            <button class="small-btn" onclick="editBatch(${i})">${t("editBatch")}</button>
          </div>

          <div class="detail-actions" style="margin-top:-4px;">
            <button class="small-btn" onclick="deleteBatch(${i})">${t("deleteBatch")}</button>
          </div>

          <div class="chart-card">
            <div class="chart-title">${t("labCharts")}</div>
            <div class="chart-box">
              <div class="mini-chart">
                ${renderMiniChart(phValues, 0, 7, "#62f2a2")}
                <div class="legend">${t("phTrend")}</div>
              </div>
              <div class="mini-chart">
                ${renderMiniChart(gravityValues, 1.000, 1.080, "#69b8ff")}
                <div class="legend">${t("gravityTrend")}</div>
              </div>
            </div>
          </div>

          <div class="process-card">
            <div class="process-title">${t("processIngredients")}</div>
            <div class="process-grid">
              <div class="process-item">
                <div class="process-label">${t("baseFermentable")}</div>
                <div class="process-value">${formatValue(b.baseFermentable)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("liters")}</div>
                <div class="process-value">${formatValue(b.liters)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("nutrients")}</div>
                <div class="process-value">${formatValue(b.nutrients)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("sugar")}</div>
                <div class="process-value">${formatValue(b.sugar)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("fruit")}</div>
                <div class="process-value">${formatValue(b.fruit)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("botanicals")}</div>
                <div class="process-value">${formatValue(b.botanicals)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("dryAdjunct")}</div>
                <div class="process-value">${formatValue(b.dryAdjunct)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("otherAdditions")}</div>
                <div class="process-value">${formatValue(b.otherAdditions)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("targetPressure")}</div>
                <div class="process-value">${formatValue(b.targetPressure)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("processNotes")}</div>
                <div class="process-value">${formatValue(b.processNotes)}</div>
              </div>
              <div class="process-item">
                <div class="process-label">${t("sensoryNotes")}</div>
                <div class="process-value">${formatValue(b.sensoryNotes)}</div>
              </div>
            </div>
          </div>

          <div class="additions-card">
            <div class="additions-title">${t("additionsLog")}</div>
            ${additionsTable(b)}
          </div>

          <div class="measurements">
            <div class="measurements-title">${t("dailyMeasurements")}</div>
            ${measurementTable(b)}
          </div>
        </div>
      `;
    }

    function templatesHTML(){
      return `
        <div class="templates-card">
          <div class="templates-title">${t("templates")}</div>
          <div class="templates-grid">
            <button class="template-btn" onclick="createTemplateBatch('cider')">
              <span class="template-name">${t("ciderBase")}</span>
              <span class="template-desc">${t("ciderBaseDesc")}</span>
            </button>
            <button class="template-btn" onclick="createTemplateBatch('kombucha')">
              <span class="template-name">${t("kombuchaBase")}</span>
              <span class="template-desc">${t("kombuchaBaseDesc")}</span>
            </button>
            <button class="template-btn" onclick="createTemplateBatch('lactic')">
              <span class="template-name">${t("lacticApple")}</span>
              <span class="template-desc">${t("lacticAppleDesc")}</span>
            </button>
            <button class="template-btn" onclick="createTemplateBatch('mixed')">
              <span class="template-name">${t("mixedFermentation")}</span>
              <span class="template-desc">${t("mixedFermentationDesc")}</span>
            </button>
          </div>
        </div>
      `;
    }

    function filtersHTML(){
      return `
        <div class="filters-card">
          <div class="filters-title">${t("filters")}</div>
          <div class="filters-grid">
            <input class="filter-input" type="text" placeholder="${t("searchPlaceholder")}"
              value="${archiveSearch.replace(/"/g, "&quot;")}"
              oninput="archiveSearch=this.value; render();">

            <select class="filter-select" onchange="archiveTypeFilter=this.value; render();">
              <option value="" ${archiveTypeFilter === "" ? "selected" : ""}>${t("allTypes")}</option>
              <option value="cider" ${archiveTypeFilter === "cider" ? "selected" : ""}>${t("typeCider")}</option>
              <option value="sidro" ${archiveTypeFilter === "sidro" ? "selected" : ""}>${t("typeCider")}</option>
              <option value="kombucha" ${archiveTypeFilter === "kombucha" ? "selected" : ""}>${t("typeKombucha")}</option>
              <option value="lactic" ${archiveTypeFilter === "lactic" ? "selected" : ""}>${t("typeLactic")}</option>
              <option value="lattico" ${archiveTypeFilter === "lattico" ? "selected" : ""}>${t("typeLactic")}</option>
              <option value="mixed" ${archiveTypeFilter === "mixed" ? "selected" : ""}>${t("typeMixed")}</option>
              <option value="misto" ${archiveTypeFilter === "misto" ? "selected" : ""}>${t("typeMixed")}</option>
            </select>

            <select class="filter-select" onchange="archiveStatusFilter=this.value; render();">
              <option value="" ${archiveStatusFilter === "" ? "selected" : ""}>${t("allStatuses")}</option>
              <option value="active" ${archiveStatusFilter === "active" ? "selected" : ""}>${t("statusActive")}</option>
              <option value="slow" ${archiveStatusFilter === "slow" ? "selected" : ""}>${t("statusSlow")}</option>
              <option value="critical" ${archiveStatusFilter === "critical" ? "selected" : ""}>${t("statusCritical")}</option>
              <option value="complete" ${archiveStatusFilter === "complete" ? "selected" : ""}>${t("statusComplete")}</option>
            </select>
          </div>
        </div>
      `;
    }

    function render(){
      document.documentElement.lang = appLang;
      const app = document.getElementById("appContent");
      const subtitle = document.getElementById("heroSubtitle");
      const langButton = document.getElementById("langButton");

      if(subtitle) subtitle.textContent = t("heroSubtitle");
      if(langButton) langButton.textContent = appLang === "en" ? "IT" : "EN";

      if(selectedBatchIndex === null){
        app.innerHTML = archiveHTML();
      } else {
        app.innerHTML = detailHTML(selectedBatchIndex);
      }
    }

    function addBatch(){
      const name = prompt(t("batchNamePrompt"));
      if(!name) return;

      const type = prompt(t("typePrompt")) || t("typeUnknown");
      const culture = prompt(t("culturePrompt")) || "-";
      const baseFermentable = prompt(t("basePrompt")) || "-";
      const liters = prompt(t("litersPrompt")) || "-";
      const nutrients = prompt(t("nutrientsPrompt")) || "-";
      const sugar = prompt(t("sugarPrompt")) || "-";
      const fruit = prompt(t("fruitPrompt")) || "-";
      const botanicals = prompt(t("botanicalsPrompt")) || "-";
      const dryAdjunct = prompt(t("dryAdjunctPrompt")) || "-";
      const otherAdditions = prompt(t("otherAdditionsPrompt")) || "-";
      const ph = prompt(t("initialPhPrompt")) || "-";
      const gravity = prompt(t("initialGravityPrompt")) || "-";
      const og = prompt(t("ogPrompt")) || gravity || "-";
      const temp = prompt(t("initialTempPrompt")) || "-";
      const pressure = prompt(t("initialPressurePrompt")) || "-";
      const targetPressure = prompt(t("targetPressurePrompt")) || "-";
      const processNotes = prompt(t("processNotesPrompt")) || "-";
      const sensoryNotes = prompt(t("sensoryNotesPrompt")) || "-";

      const createdAt = new Date().toISOString();

      batches.push({
        name,
        type,
        culture,
        baseFermentable,
        liters,
        nutrients,
        sugar,
        fruit,
        botanicals,
        dryAdjunct,
        otherAdditions,
        targetPressure,
        processNotes,
        sensoryNotes,
        og,
        createdAt,
        additionsLog: [],
        measurements: [{
          day: 1,
          ph,
          gravity,
          temp,
          pressure,
          createdAt
        }]
      });

      save();
      render();
    }

    function addMeasurement(i){
      const b = batches[i];
      const latest = getLatestMeasurement(b) || {};
      if(!Array.isArray(b.measurements)) b.measurements = [];

      const day = prompt(t("dayNumberPrompt"), String(getDay(b))) || String(getDay(b));
      const ph = prompt(t("phPrompt"), latest.ph || "-") || latest.ph || "-";
      const gravity = prompt(t("gravityPrompt"), latest.gravity || "-") || latest.gravity || "-";
      const temp = prompt(t("tempPrompt"), latest.temp || "-") || latest.temp || "-";
      const pressure = prompt(t("pressurePrompt"), latest.pressure || "-") || latest.pressure || "-";

      b.measurements.push({
        day,
        ph,
        gravity,
        temp,
        pressure,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function addAddition(i){
      const b = batches[i];
      ensureBatchFields(b);

      const day = prompt(t("additionDayPrompt"), String(getDay(b))) || String(getDay(b));
      const type = prompt(t("additionTypePrompt")) || "-";
      const ingredient = prompt(t("additionIngredientPrompt")) || "-";
      const quantity = prompt(t("additionQuantityPrompt")) || "-";
      const stage = prompt(t("additionStagePrompt")) || "-";
      const notes = prompt(t("additionNotesPrompt")) || "-";

      b.additionsLog.push({
        day,
        type,
        ingredient,
        quantity,
        stage,
        notes,
        createdAt: new Date().toISOString()
      });

      save();
      render();
    }

    function editBatch(i){
      let b = batches[i];
      ensureBatchFields(b);

      b.name = prompt(t("editNamePrompt"), b.name) || b.name;
      b.type = prompt(t("editTypePrompt"), b.type) || b.type;
      b.culture = prompt(t("editCulturePrompt"), b.culture) || b.culture;
      b.baseFermentable = prompt(t("editBasePrompt"), b.baseFermentable) || b.baseFermentable;
      b.liters = prompt(t("editLitersPrompt"), b.liters) || b.liters;
      b.nutrients = prompt(t("editNutrientsPrompt"), b.nutrients) || b.nutrients;
      b.sugar = prompt(t("editSugarPrompt"), b.sugar) || b.sugar;
      b.fruit = prompt(t("editFruitPrompt"), b.fruit) || b.fruit;
      b.botanicals = prompt(t("editBotanicalsPrompt"), b.botanicals) || b.botanicals;
      b.dryAdjunct = prompt(t("editDryAdjunctPrompt"), b.dryAdjunct) || b.dryAdjunct;
      b.otherAdditions = prompt(t("editOtherAdditionsPrompt"), b.otherAdditions) || b.otherAdditions;
      b.og = prompt(t("editOGPrompt"), b.og) || b.og;
      b.targetPressure = prompt(t("editTargetPressurePrompt"), b.targetPressure) || b.targetPressure;
      b.processNotes = prompt(t("editProcessNotesPrompt"), b.processNotes) || b.processNotes;
      b.sensoryNotes = prompt(t("editSensoryNotesPrompt"), b.sensoryNotes) || b.sensoryNotes;

      save();
      render();
    }

    function deleteBatch(i){
      if(confirm(t("deleteConfirm"))){
        batches.splice(i, 1);
        selectedBatchIndex = null;
        save();
        render();
      }
    }

    function openBatch(i){
      selectedBatchIndex = i;
      render();
    }

    function backToArchive(){
      selectedBatchIndex = null;
      render();
    }

    render();
  </script>
</body>
</html>
