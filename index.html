<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#02060b,#0b1622);
  color:white;
  padding:20px;
}

.panel{
  position:relative;
  border-radius:40px;
  height:600px;
  overflow:hidden;

  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0px, rgba(0,0,0,.04) 3px),
    linear-gradient(180deg,#f4f7f9,#9ea6ad,#f4f7f9,#8b949c);

  box-shadow:
    inset 0 2px 6px rgba(255,255,255,.3),
    inset 0 -20px 40px rgba(0,0,0,.3),
    0 20px 40px rgba(0,0,0,.6);
}

/* CORNICE CONTENITORE */
.frame{
  position:absolute;
  inset:14px;
  border-radius:34px;

  box-shadow:
    inset 0 8px 14px rgba(0,0,0,.8),
    inset 0 -2px 3px rgba(255,255,255,.2);
}

/* 🔥 ORO ANTICO REALISTICO */
.gold{
  position:absolute;
  inset:0;
  border-radius:34px;

  background:
    linear-gradient(145deg,
      #2a1f00 0%,
      #5a4300 15%,
      #d4af37 35%,
      #8c6b1f 50%,
      #f1d27a 60%,
      #6f5300 75%,
      #2a1f00 100%
    );

  box-shadow:
    inset 0 3px 4px rgba(255,255,255,.5),
    inset 0 -10px 18px rgba(0,0,0,.9),
    0 6px 18px rgba(0,0,0,.7);
}

/* 🔥 LINEA SEPARAZIONE METALLO */
.gold::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:28px;

  border:2px solid rgba(0,0,0,.6);
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.2);
}

/* INTERNO */
.inner{
  position:absolute;
  inset:22px;
  border-radius:28px;

  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0px, rgba(0,0,0,.03) 3px),
    linear-gradient(180deg,#eef3f7,#aab2ba,#e9eef2,#8f98a1);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.3),
    inset 0 -12px 22px rgba(0,0,0,.3);
}

/* VITI */
.screw{
  position:absolute;
  width:22px;height:22px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#777);
}

.tl{top:10px;left:10px}
.tr{top:10px;right:10px}
.bl{bottom:10px;left:10px}
.br{bottom:10px;right:10px}

.center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.5);
  font-size:26px;
}
</style>
</head>

<body>

<h1>XA Fermentation</h1>

<div class="panel">

  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="frame">
    <div class="gold"></div>
    <div class="inner"></div>
  </div>

  <div class="center">FRAME PRO</div>

</div>

</body>
</html>
