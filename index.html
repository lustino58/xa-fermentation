<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#05090f,#0b1622);
  color:white;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}
.logo{
  width:80px;height:80px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:bold;
  background:linear-gradient(#1e2a36,#0c131b);
}
h1{margin:0;font-size:28px}
.sub{font-size:14px;color:#9fb0c0}

/* PANNELLO */
.panel{
  position:relative;
  border-radius:30px;
  padding:30px;
  background:
    repeating-linear-gradient(90deg,#ffffff10 0px,#00000008 3px),
    linear-gradient(#f0f4f7,#b8c0c7,#e4e9ee,#8d98a3);
  box-shadow:
    inset 0 2px 6px #ffffff50,
    inset 0 -20px 30px #00000030,
    0 20px 40px #00000050;
}

/* VITI */
.screw{
  position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(#fff,#999,#444);
}
.tl{top:10px;left:10px}
.tr{top:10px;right:10px}
.bl{bottom:10px;left:10px}
.br{bottom:10px;right:10px}

/* CARD */
.card{
  background:linear-gradient(#5b646f,#20262d);
  border-radius:30px;
  padding:25px;
  text-align:center;
  box-shadow:
    inset 0 2px 4px #ffffff20,
    inset 0 -20px 30px #00000060;
}

.title{
  letter-spacing:8px;
  margin-bottom:20px;
  color:#dfe6ee;
}

/* QUADRANTE */
.dial{
  width:260px;
  height:260px;
  margin:auto;
  position:relative;
}

/* GHIERA */
.ring{
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ffffff,#999,#444);
  box-shadow:
    inset 0 3px 6px #ffffff40,
    inset 0 -8px 10px #00000090,
    0 10px 20px #00000080;
}

/* INCASSO */
.inner{
  position:absolute;
  top:20px;left:20px;
  right:20px;bottom:20px;
  border-radius:50%;
  background:radial-gradient(circle at 50% 40%,#3a4046,#1b2026);
  box-shadow:
    inset 0 10px 20px #000000cc,
    inset 0 -2px 6px #ffffff10;
}

/* LANCETTA VINTAGE */
.needle{
  position:absolute;
  width:0;
  height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-bottom:110px solid #e53935;
  top:50%;
  left:50%;
  transform-origin:50% 100%;
  transform:translate(-50%,-100%) rotate(30deg);
  filter:drop-shadow(0 3px 4px rgba(0,0,0,0.6));
}

/* PERNO */
.center{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  background:#e6edf4;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  box-shadow:inset 0 2px 4px #00000040;
}

/* VETRO */
.glass{
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 20%,#ffffff30,transparent 60%);
}

/* TESTO */
.value{
  font-size:60px;
  margin-top:20px;
}
.subtext{
  color:#aebbc7;
}

/* MOBILE */
@media(max-width:600px){
  .dial{width:220px;height:220px}
  .value{font-size:50px}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">XA</div>
  <div>
    <h1>XA Fermentation</h1>
    <div class="sub">Step 4: lancetta reale vintage</div>
  </div>
</div>

<div class="panel">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="card">
    <div class="title">P H</div>

    <div class="dial">
      <div class="ring"></div>
      <div class="inner"></div>

      <!-- LANCETTA MIGLIORATA -->
      <div class="needle"></div>

      <div class="center"></div>
      <div class="glass"></div>
    </div>

    <div class="value">3.50</div>
    <div class="subtext">ultima misurazione</div>
  </div>
</div>

</body>
</html>
