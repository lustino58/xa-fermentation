<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XA Fermentation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#05090f,#0b1622);
  color:white;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

.logo{
  width:80px;height:80px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:bold;
  background:linear-gradient(#1e2a36,#0c131b);
}

.panel{
  background:linear-gradient(#f0f4f7,#b8c0c7,#e4e9ee,#8d98a3);
  border-radius:30px;
  padding:30px;
  box-shadow:inset 0 2px 6px rgba(255,255,255,.3),
             inset 0 -20px 30px rgba(0,0,0,.2);
}

.card{
  background:linear-gradient(#646d77,#232930);
  border-radius:30px;
  padding:20px;
  text-align:center;
}

.title{
  letter-spacing:6px;
  margin-bottom:10px;
}

.value{
  font-size:60px;
}

.sub{
  color:#aaa;
}

.dial{
  width:100%;
  max-width:420px;
  margin:auto;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">XA</div>
  <div>
    <h1>XA Fermentation</h1>
    <div>Step definitivo: quadrante grande corretto</div>
  </div>
</div>

<div class="panel">
  <div class="card">

    <div class="title">P H</div>

    <div class="dial">
<svg viewBox="0 0 400 400">

<defs>
<radialGradient id="bezel">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="50%" stop-color="#9ca6b0"/>
<stop offset="100%" stop-color="#2a2a2a"/>
</radialGradient>

<radialGradient id="face">
<stop offset="0%" stop-color="#2c3136"/>
<stop offset="100%" stop-color="#050708"/>
</radialGradient>

<radialGradient id="center">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#888"/>
</radialGradient>
</defs>

<!-- ghiera -->
<circle cx="200" cy="200" r="170" fill="url(#bezel)"/>

<!-- interno -->
<circle cx="200" cy="200" r="140" fill="url(#face)"/>

<!-- tacche (pulite, poche) -->
<g stroke="#d8d2b0" stroke-width="4">
<line x1="200" y1="60" x2="200" y2="90"/>
<line x1="260" y1="80" x2="240" y2="110"/>
<line x1="300" y1="140" x2="270" y2="150"/>
<line x1="300" y1="260" x2="270" y2="250"/>
<line x1="260" y1="320" x2="240" y2="290"/>
<line x1="140" y1="320" x2="160" y2="290"/>
<line x1="100" y1="260" x2="130" y2="250"/>
<line x1="100" y1="140" x2="130" y2="150"/>
<line x1="140" y1="80" x2="160" y2="110"/>
</g>

<!-- lancetta -->
<g transform="rotate(32 200 200)">
<polygon points="195,200 205,200 202,70 198,70" fill="red"/>
<rect x="199" y="75" width="2" height="110" fill="white"/>
</g>

<!-- perno -->
<circle cx="200" cy="200" r="30" fill="url(#center)"/>

</svg>
    </div>

    <div class="value">3.50</div>
    <div class="sub">ultima misurazione</div>

  </div>
</div>

</body>
</html>
