<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XA Fermentation</title>

<style>
:root{
  --bg1:#02060b;
  --bg2:#09111a;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  color:white;
  padding:20px;
  background:
    radial-gradient(circle at top, rgba(70,120,180,.15), transparent 30%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

.app{max-width:900px;margin:auto}

.hero{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:20px;
}

.xa{
  width:80px;height:80px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:bold;
  background:linear-gradient(145deg,#1c2732,#0c131b);
  box-shadow:inset 0 2px 6px rgba(255,255,255,.2);
}

h1{font-size:30px}
p{opacity:.7;font-size:14px;margin-top:6px}

/* ACCIAIO */
.panel{
  position:relative;
  border-radius:36px;
  min-height:600px;
  padding:30px;
  overflow:hidden;

  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.07) 0px,
      rgba(0,0,0,.03) 3px
    ),
    linear-gradient(180deg,#f8fbfd,#aeb6bd,#f3f7fa,#8e98a2);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.3),
    inset 0 -20px 40px rgba(0,0,0,.25),
    0 20px 40px rgba(0,0,0,.4);
}

/* 🔥 BORDO ORO ANTICO SPESSO */
.inner-frame{
  position:absolute;
  inset:30px; /* sopra al bordo → più spesso */
  border-radius:60px;

  background:
    linear-gradient(145deg,
      #3b2a00 0%,
      #7a5a00 10%,
      #caa64a 25%,
      #5e4300 40%,
      #f0d48a 50%,
      #6d4d00 65%,
      #b08a2f 80%,
      #3a2900 100%
    );

  box-shadow:
    inset 0 8px 12px rgba(255,255,255,.4),
    inset 0 -18px 24px rgba(0,0,0,.8),
    0 24px 40px rgba(0,0,0,.7);
}

/* interno acciaio */
.inner-content{
  position:absolute;
  inset:18px; /* lascia bordo spesso */
  border-radius:60px;

  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.06) 0px,
      rgba(0,0,0,.03) 3px
    ),
    linear-gradient(180deg,#eef3f7,#aab2ba,#e9eef2,#8f98a1);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.3),
    inset 0 -10px 20px rgba(0,0,0,.25);
}

/* viti */
.screw{
  position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle,#fff,#777);
}

.tl{top:10px;left:10px}
.tr{top:10px;right:10px}
.bl{bottom:10px;left:10px}
.br{bottom:10px;right:10px}

.center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:rgba(255,255,255,.6);
}

</style>
</head>

<body>

<div class="app">

  <div class="hero">
    <div class="xa">XA</div>
    <div>
      <h1>XA Fermentation</h1>
      <p>Step 2: bordo oro antico spesso</p>
    </div>
  </div>

  <div class="panel">

    <div class="screw tl"></div>
    <div class="screw tr"></div>
    <div class="screw bl"></div>
    <div class="screw br"></div>

    <div class="inner-frame"></div>
    <div class="inner-content"></div>

    <div class="center">
      ORO ANTICO
    </div>

  </div>

</div>

</body>
</html>
