<script>

const cfg = {
  min:1000,
  max:1080,
  value:1050,
  cx:180,
  cy:140,
  r:100,
  start:150,
  end:30
};

function deg(v){
  return cfg.start + (v-cfg.min)/(cfg.max-cfg.min)*(cfg.end-cfg.start);
}

function polar(r,a){
  let rad=a*Math.PI/180;
  return {
    x:cfg.cx + r*Math.cos(rad),
    y:cfg.cy - r*Math.sin(rad)
  }
}

const ticks=document.getElementById("ticks");
const labels=document.getElementById("labels");
const needle=document.getElementById("needle");

/* TICK OGNI 10 */
for(let i=0;i<=8;i++){
  let val=1000+i*10;
  let a=deg(val);
  let p1=polar(80,a);
  let p2=polar(100,a);

  let l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",p1.x);
  l.setAttribute("y1",p1.y);
  l.setAttribute("x2",p2.x);
  l.setAttribute("y2",p2.y);
  l.setAttribute("stroke","#f1c27d");
  l.setAttribute("stroke-width", i%2===0 ? "4" : "2");
  ticks.appendChild(l);
}

/* LABEL SOLO PRINCIPALI */
[1000,1020,1040,1060,1080].forEach(val=>{
  let a=deg(val);
  let p=polar(120,a);

  let txt=document.createElementNS("http://www.w3.org/2000/svg","text");
  txt.setAttribute("x",p.x);
  txt.setAttribute("y",p.y);
  txt.setAttribute("fill","#f1c27d");
  txt.setAttribute("font-size","16");
  txt.setAttribute("font-weight","700");
  txt.setAttribute("text-anchor","middle");

  txt.textContent=(val/1000).toFixed(3);

  labels.appendChild(txt);
});

/* LANCETTA */
function drawNeedle(){
  let a=deg(cfg.value);
  let p=polar(80,a);

  let line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",cfg.cx);
  line.setAttribute("y1",cfg.cy);
  line.setAttribute("x2",p.x);
  line.setAttribute("y2",p.y);
  line.setAttribute("stroke","#ff7a00");
  line.setAttribute("stroke-width","5");

  needle.appendChild(line);
}

drawNeedle();

document.getElementById("val").innerText=(cfg.value/1000).toFixed(3);

</script>
