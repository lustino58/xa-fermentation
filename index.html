<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#02060b;
      --bg2:#08111a;
      --text:#eef5fb;
      --muted:#aab7c4;

      --steel1:#f1f4f7;
      --steel2:#c7d0d8;
      --steel3:#8e98a2;
      --steel4:#535b63;
      --steel5:#2e343a;

      --dial1:#171c22;
      --dial2:#0f1419;
      --dial3:#090d11;

      --tick:#e8d8b2;
      --number:#efe2c4;
      --needle:#ff6e57;
      --needleGlow:rgba(255,110,87,.35);
      --glass:rgba(255,255,255,.18);
      --glow:rgba(255,214,140,.18);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(60,110,170,.14), transparent 28%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      padding:18px 12px 34px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .xa-logo{
      width:84px;
      height:84px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      color:#f3f8fc;
      background:
        linear-gradient(145deg, rgba(210,220,228,.18), rgba(70,80,90,.08)),
        linear-gradient(180deg, #1c2732, #0c131b);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 -10px 16px rgba(0,0,0,.42),
        0 0 20px rgba(70,140,220,.10);
      flex:0 0 auto;
    }

    .hero-text h1{
      margin:0;
      font-size:30px;
      line-height:1;
    }

    .hero-text p{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.35;
      color:var(--muted);
    }

    .instrument-panel{
      position:relative;
      border-radius:36px;
      min-height:700px;
      padding:28px 18px 30px;
      overflow:hidden;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.05) 0px,
          rgba(0,0,0,.03) 3px
        ),
        linear-gradient(180deg,#e8edf2,#aab3bc,#d6dde3,#7f8994);
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.22),
        inset 0 -22px 34px rgba(0,0,0,.20),
        0 18px 38px rgba(0,0,0,.28);
    }

    .instrument-panel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:36px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.06) 0%,
          transparent 12%,
          rgba(255,255,255,.03) 24%,
          transparent 42%,
          rgba(0,0,0,.04) 56%,
          transparent 72%,
          rgba(255,255,255,.03) 100%);
      pointer-events:none;
    }

    .screw{
      position:absolute;
      width:22px;
      height:22px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0%, #dce3e9 18%, #99a3ad 46%, #5f6973 72%, #363d45 100%);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.42),
        0 2px 4px rgba(0,0,0,.35);
      z-index:3;
    }

    .screw::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:11px;
      height:1.6px;
      background:#2f3740;
      transform:rotate(-18deg);
      border-radius:2px;
    }

    .tl{top:12px;left:12px}
    .tr{top:12px;right:12px}
    .bl{bottom:12px;left:12px}
    .br{bottom:12px;right:12px}

    .instrument-card{
      position:relative;
      z-index:2;
      margin:0 auto;
      max-width:620px;
      border-radius:34px;
      padding:24px 18px 30px;
      text-align:center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(28,35,42,.78), rgba(8,12,16,.88));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        inset 0 -20px 30px rgba(0,0,0,.30),
        0 8px 20px rgba(0,0,0,.16);
    }

    .instrument-title{
      font-size:18px;
      letter-spacing:8px;
      color:#e5d8be;
      margin-bottom:14px;
      text-shadow:0 0 10px rgba(255,220,150,.08);
    }

    .dial-wrap{
      width:min(88vw, 480px);
      aspect-ratio:1/1;
      margin:0 auto 18px;
      position:relative;
    }

    .dial-svg{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 16px 18px rgba(0,0,0,.30));
    }

    .value{
      font-size:clamp(48px, 9vw, 74px);
      line-height:1;
      font-weight:700;
      margin-bottom:8px;
    }

    .sub{
      font-size:clamp(18px, 3.6vw, 28px);
      color:var(--muted);
      line-height:1.2;
    }

    .note{
      margin-top:20px;
      text-align:center;
      color:#d7e3ee;
      font-size:14px;
      line-height:1.4;
      opacity:.92;
    }

    @media (max-width:600px){
      .hero{
        align-items:flex-start;
      }

      .xa-logo{
        width:74px;
        height:74px;
        border-radius:22px;
        font-size:34px;
      }

      .hero-text h1{
        font-size:28px;
      }

      .hero-text p{
        font-size:13px;
      }

      .instrument-panel{
        min-height:620px;
        padding:24px 14px 24px;
      }

      .instrument-card{
        padding:20px 12px 24px;
      }

      .instrument-title{
        font-size:16px;
        letter-spacing:6px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="xa-logo">XA</div>
      <div class="hero-text">
        <h1>XA Fermentation</h1>
        <p>Test singolo strumento tondo vintage stile vecchia auto</p>
      </div>
    </div>

    <div class="instrument-panel">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="instrument-card">
        <div class="instrument-title">P H</div>

        <div class="dial-wrap">
          <svg class="dial-svg" viewBox="0 0 500 500" aria-hidden="true">
            <defs>
              <radialGradient id="bezelGrad" cx="35%" cy="28%">
                <stop offset="0%" stop-color="var(--steel1)"/>
                <stop offset="18%" stop-color="var(--steel2)"/>
                <stop offset="52%" stop-color="var(--steel3)"/>
                <stop offset="78%" stop-color="var(--steel4)"/>
                <stop offset="100%" stop-color="var(--steel5)"/>
              </radialGradient>

              <radialGradient id="dialGrad" cx="50%" cy="40%">
                <stop offset="0%" stop-color="var(--dial1)"/>
                <stop offset="60%" stop-color="var(--dial2)"/>
                <stop offset="100%" stop-color="var(--dial3)"/>
              </radialGradient>

              <radialGradient id="warmGlow" cx="50%" cy="50%">
                <stop offset="0%" stop-color="rgba(255,220,150,.14)"/>
                <stop offset="40%" stop-color="rgba(255,220,150,.07)"/>
                <stop offset="100%" stop-color="rgba(255,220,150,0)"/>
              </radialGradient>

              <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffd1c8"/>
                <stop offset="50%" stop-color="#ff8d77"/>
                <stop offset="100%" stop-color="#ff6e57"/>
              </linearGradient>

              <filter id="needleGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="4.5" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.8"/>
              </filter>
            </defs>

            <!-- ghiera metallica -->
            <circle cx="250" cy="250" r="184" fill="url(#bezelGrad)"/>
            <circle cx="250" cy="250" r="170" fill="#1f252c" opacity=".46"/>
            <circle cx="250" cy="250" r="156" fill="url(#dialGrad)"/>

            <!-- glow caldo -->
            <circle cx="250" cy="250" r="150" fill="url(#warmGlow)" opacity=".95"/>

            <!-- anello interno -->
            <circle cx="250" cy="250" r="146" fill="none" stroke="rgba(255,240,210,.10)" stroke-width="2.5"/>

            <!-- tacche -->
            <g stroke="var(--tick)" stroke-linecap="round">
              <line x1="142" y1="135" x2="120" y2="111" stroke-width="10"/>
              <line x1="173" y1="111" x2="160" y2="84" stroke-width="7"/>
              <line x1="209" y1="96" x2="202" y2="67" stroke-width="10"/>
              <line x1="248" y1="91" x2="248" y2="60" stroke-width="7"/>
              <line x1="287" y1="95" x2="294" y2="66" stroke-width="10"/>
              <line x1="323" y1="109" x2="337" y2="83" stroke-width="7"/>
              <line x1="355" y1="132" x2="378" y2="108" stroke-width="10"/>
              <line x1="379" y1="164" x2="405" y2="149" stroke-width="7"/>
              <line x1="393" y1="200" x2="423" y2="192" stroke-width="10"/>
              <line x1="397" y1="240" x2="428" y2="240" stroke-width="7"/>
              <line x1="392" y1="279" x2="422" y2="287" stroke-width="10"/>
              <line x1="377" y1="315" x2="404" y2="329" stroke-width="7"/>
            </g>

            <!-- numeri -->
            <g fill="var(--number)" font-size="24" font-weight="700" text-anchor="middle">
              <text x="147" y="103">2.8</text>
              <text x="232" y="62">3.5</text>
              <text x="326" y="84">4.2</text>
              <text x="405" y="170">5.0</text>
            </g>

            <!-- scritta piccola -->
            <g fill="rgba(255,240,210,.62)" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="2">
              <text x="250" y="138">VINTAGE METER</text>
            </g>

            <!-- zona centro -->
            <circle cx="250" cy="250" r="74" fill="#11161b"/>
            <circle cx="250" cy="250" r="46" fill="#0a0e12"/>

            <!-- lancetta -->
            <g transform="rotate(-18 250 250)">
              <line x1="250" y1="250" x2="250" y2="116" stroke="url(#needleGrad)" stroke-width="12" stroke-linecap="round" filter="url(#needleGlow)"/>
            </g>

            <!-- mozzo -->
            <circle cx="250" cy="250" r="28" fill="#e7edf4"/>
            <circle cx="250" cy="250" r="28" fill="none" stroke="rgba(0,0,0,.16)" stroke-width="1.4"/>

            <!-- vetro -->
            <ellipse cx="202" cy="140" rx="82" ry="28" fill="var(--glass)" transform="rotate(-18 202 140)" filter="url(#glassBlur)"/>
            <ellipse cx="316" cy="332" rx="42" ry="14" fill="rgba(255,255,255,.06)" transform="rotate(20 316 332)" filter="url(#glassBlur)"/>
            <circle cx="250" cy="250" r="156" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="1.4"/>
          </svg>
        </div>

        <div class="value">3.50</div>
        <div class="sub">ultima misurazione</div>
      </div>
    </div>

    <div class="note">
      Qui stiamo testando solo il primo strumento tondo vintage. Quando la base è giusta, facciamo anche densità, temperatura e lotti.
    </div>
  </div>
</body>
</html>
