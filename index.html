<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg1:#071629;
      --bg2:#081b2f;
      --card1:#10243a;
      --card2:#0b1b2c;
      --stroke:rgba(255,255,255,.06);
      --text:#f4f7fb;
      --muted:#95a8bb;
      --scale:#e6dcc5;
      --needle:#ff3b3b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(70,130,210,.16), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px 16px;
    }

    .app{
      width:min(430px,100%);
      text-align:center;
    }

    .title{
      font-size:28px;
      letter-spacing:6px;
      font-weight:300;
      margin-bottom:22px;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, var(--card1), var(--card2));
      border:1px solid var(--stroke);
      border-radius:30px;
      padding:28px 20px 26px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 20px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(16px);
    }

    canvas{
      width:100%;
      max-width:320px;
      height:auto;
      display:block;
      margin:0 auto;
    }

    .value{
      margin-top:18px;
      font-size:64px;
      line-height:1;
      font-weight:200;
      letter-spacing:1px;
    }

    .sub{
      margin-top:10px;
      font-size:18px;
      color:var(--muted);
    }

    @media (max-width:480px){
      .title{font-size:24px;}
      .value{font-size:56px;}
      .sub{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">PH</div>

    <div class="card">
      <canvas id="gauge" width="320" height="320"></canvas>
      <div class="value">3.50</div>
      <div class="sub">ultima misurazione</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gauge");
    const ctx = canvas.getContext("2d");

    const cx = canvas.width / 2;
    const cy = canvas.height / 2 + 6;

    const cfg = {
      min: 2.8,
      max: 5.0,
      value: 3.5,

      // scala approvata
      startDeg: 135,
      endDeg: 405,

      faceRadius: 104,
      bezelRadius: 116,
      arcRadius: 96,
      tickOuter: 96,
      tickInnerMinor: 82,
      tickInnerMajor: 74,

      // numeri più vicini al quadrante
      labelRadius: 108,

      majorValues: [2.8, 3.5, 4.2, 5.0],

      // offset corretti
      labelOffsets: {
        "2.8": { dx: -6, dy: 6, a: 0 },
        "3.5": { dx: -2, dy: -2, a: 0 },
        "4.2": { dx:  2, dy: -2, a: 0 },
        "5.0": { dx:  6, dy: 6, a: 0 }
      }
    };

    function toRad(deg){
      return deg * Math.PI / 180;
    }

    function valueToAngle(value){
      const ratio = (value - cfg.min) / (cfg.max - cfg.min);
      return toRad(cfg.startDeg + ratio * (cfg.endDeg - cfg.startDeg));
    }

    function polar(r, angle){
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function drawLine(p1, p2, width, color){
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    function drawFace(){
      // ombra esterna
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,.45)";
      ctx.shadowBlur = 28;
      ctx.beginPath();
      ctx.arc(cx, cy, cfg.bezelRadius, 0, Math.PI * 2);
      ctx.fillStyle = "#0c1218";
      ctx.fill();
      ctx.restore();

      // ghiera
      const bezel = ctx.createRadialGradient(cx - 28, cy - 28, 8, cx, cy, cfg.bezelRadius);
      bezel.addColorStop(0, "#eef2f5");
      bezel.addColorStop(0.30, "#9ea7b0");
      bezel.addColorStop(0.68, "#4d5660");
      bezel.addColorStop(1, "#232830");

      ctx.beginPath();
      ctx.arc(cx, cy, cfg.bezelRadius, 0, Math.PI * 2);
      ctx.fillStyle = bezel;
      ctx.fill();

      // quadrante
      const face = ctx.createRadialGradient(cx - 14, cy - 16, 12, cx, cy, cfg.faceRadius);
      face.addColorStop(0, "#20262d");
      face.addColorStop(0.55, "#0f1419");
      face.addColorStop(1, "#000000");

      ctx.beginPath();
      ctx.arc(cx, cy, cfg.faceRadius, 0, Math.PI * 2);
      ctx.fillStyle = face;
      ctx.fill();

      // bordo interno
      ctx.beginPath();
      ctx.arc(cx, cy, cfg.faceRadius - 2, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,.08)";
      ctx.lineWidth = 1.4;
      ctx.stroke();

      // riflessi vetro
      ctx.beginPath();
      ctx.ellipse(cx - 34, cy - 40, 58, 24, -0.25, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,.08)";
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(cx + 42, cy + 46, 22, 8, 0.25, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,.04)";
      ctx.fill();
    }

    function drawScale(){
      // arco principale
      ctx.beginPath();
      ctx.arc(cx, cy, cfg.arcRadius, toRad(cfg.startDeg), toRad(cfg.endDeg));
      ctx.strokeStyle = "#e6dcc5";
      ctx.lineWidth = 6;
      ctx.lineCap = "round";
      ctx.stroke();

      // tacche
      for(let i = 0; i <= 20; i++){
        const a = toRad(cfg.startDeg + i * (cfg.endDeg - cfg.startDeg) / 20);
        const major = i % 5 === 0;

        const p1 = polar(major ? cfg.tickInnerMajor : cfg.tickInnerMinor, a);
        const p2 = polar(cfg.tickOuter, a);

        drawLine(p1, p2, major ? 5 : 2.5, "#e6dcc5");
      }
    }

    function drawNeedle(){
      const a = valueToAngle(cfg.value);
      const tip = polar(cfg.arcRadius - 16, a);

      // glow
      ctx.save();
      ctx.shadowColor = "rgba(255,59,59,.35)";
      ctx.shadowBlur = 12;
      drawLine({x:cx, y:cy}, tip, 6, "#ff3b3b");
      ctx.restore();

      // highlight
      ctx.save();
      ctx.strokeStyle = "#ffd0d0";
      ctx.lineWidth = 1.8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx + 1.2, cy - 1.2);
      ctx.lineTo(tip.x + 1.2, tip.y - 1.2);
      ctx.stroke();
      ctx.restore();

      // centro metallico
      const hub = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, 13);
      hub.addColorStop(0, "#fff");
      hub.addColorStop(1, "#777");

      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI * 2);
      ctx.fillStyle = hub;
      ctx.fill();
    }

    function drawLabels(){
      ctx.save();
      ctx.fillStyle = "#e6dcc5";
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      cfg.majorValues.forEach(v => {
        const key = v.toFixed(1);
        const off = cfg.labelOffsets[key] || { dx: 0, dy: 0, a: 0 };
        const a = valueToAngle(v) + toRad(off.a);
        const p = polar(cfg.labelRadius, a);

        // alone dietro al testo
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(0,0,0,.45)";
        ctx.strokeText(key, p.x + off.dx, p.y + off.dy);

        ctx.fillText(key, p.x + off.dx, p.y + off.dy);
      });

      ctx.restore();
    }

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFace();
      drawScale();
      drawNeedle();
      drawLabels();
    }

    draw();
  </script>
</body>
</html>
