<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XA Fermentation</title>
  <style>
    :root{
      --bg:#071629;
      --text:#f3f4f6;
      --muted:#cfd5db;
      --tick:#e8dcc0;
      --needle:#ff3b3b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      width:100%;
      min-height:100vh;
      background:var(--bg);
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px 16px;
    }

    .container{
      width:min(420px,100%);
      text-align:center;
    }

    h1{
      font-weight:300;
      letter-spacing:4px;
      margin-bottom:24px;
      font-size:28px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:24px 20px 28px;
      border-radius:30px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
    }

    canvas{
      width:100%;
      max-width:300px;
      height:auto;
      display:block;
      margin:0 auto;
    }

    .value{
      font-size:60px;
      margin-top:18px;
      line-height:1;
      font-weight:300;
    }

    .sub{
      color:var(--muted);
      margin-top:10px;
      font-size:18px;
    }

    @media (max-width:480px){
      h1{font-size:24px;}
      .value{font-size:52px;}
      .sub{font-size:16px;}
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>PH</h1>

    <div class="card">
      <canvas id="gauge" width="300" height="300"></canvas>
      <div class="value">3.50</div>
      <div class="sub">ultima misurazione</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gauge");
    const ctx = canvas.getContext("2d");

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 110;

    // CORREZIONI GIÀ INSERITE
    const min = 2.8;
    const max = 5.0;

    const startAngle = 135;   // sinistra basso
    const endAngle = 405;     // destra basso

    const value = 3.5;

    function degToRad(deg){
      return deg * Math.PI / 180;
    }

    function valueToAngle(val){
      const ratio = (val - min) / (max - min);
      return degToRad(startAngle + ratio * (endAngle - startAngle));
    }

    function drawTick(angle, inner, outer, width = 3){
      ctx.beginPath();
      ctx.moveTo(
        centerX + inner * Math.cos(angle),
        centerY + inner * Math.sin(angle)
      );
      ctx.lineTo(
        centerX + outer * Math.cos(angle),
        centerY + outer * Math.sin(angle)
      );
      ctx.strokeStyle = "#e8dcc0";
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // sfondo quadrante
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fillStyle = "#000";
      ctx.fill();

      // arco scala
      ctx.beginPath();
      ctx.arc(
        centerX,
        centerY,
        radius - 10,
        degToRad(startAngle),
        degToRad(endAngle)
      );
      ctx.strokeStyle = "#e8dcc0";
      ctx.lineWidth = 6;
      ctx.lineCap = "round";
      ctx.stroke();

      // tacche
      for(let i = 0; i <= 20; i++){
        const angle = degToRad(startAngle + i * (endAngle - startAngle) / 20);
        drawTick(angle, radius - 22, radius - 10, i % 5 === 0 ? 5 : 3);
      }

      // numeri
      const labels = [2.8, 3.5, 4.2, 5.0];
      ctx.fillStyle = "#e8dcc0";
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      labels.forEach(label => {
        const angle = valueToAngle(label);
        const r = radius - 38;
        const x = centerX + r * Math.cos(angle);
        const y = centerY + r * Math.sin(angle);
        ctx.fillText(label.toFixed(1), x, y);
      });

      // lancetta
      const angle = valueToAngle(value);
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(
        centerX + (radius - 28) * Math.cos(angle),
        centerY + (radius - 28) * Math.sin(angle)
      );
      ctx.strokeStyle = "#ff3b3b";
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.stroke();

      // centro
      ctx.beginPath();
      ctx.arc(centerX, centerY, 9, 0, Math.PI * 2);
      ctx.fillStyle = "#d0d0d0";
      ctx.fill();
    }

    draw();
  </script>
</body>
</html>
